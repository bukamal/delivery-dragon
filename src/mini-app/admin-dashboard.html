<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - لوحة الأدمن</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:#f5f7fa;padding:16px}.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}.tab{padding:12px 16px;background:#e0e0e0;border-radius:30px;cursor:pointer;font-weight:500}.tab.active{background:#e67e22;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px}.btn{background:#e67e22;color:#fff;border:none;padding:8px 16px;border-radius:30px;cursor:pointer;margin:2px}.btn-danger{background:#e74c3c}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #ddd;text-align:right}</style></head><body><h2>👑 لوحة الأدمن</h2><div class="tabs"><div class="tab active" data-tab="pending">📋 طلبات تسجيل</div><div class="tab" data-tab="orders">🛒 طلبات للمراجعة</div><div class="tab" data-tab="shops">🏪 المحلات</div><div class="tab" data-tab="riders">🛵 السائقين</div><div class="tab" data-tab="finance">💰 التقارير المالية</div></div><div id="pendingPanel" class="panel active"><div id="pendingContainer"></div></div><div id="ordersPanel" class="panel"><div id="ordersContainer"></div></div><div id="shopsPanel" class="panel"><div id="shopsContainer"></div></div><div id="ridersPanel" class="panel"><div id="ridersContainer"></div></div><div id="financePanel" class="panel"><div id="financeContainer">جاري التحميل...</div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();const API='https://delivery-dragon.vercel.app';let currentOrders=[];document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(tab.dataset.tab+'Panel').classList.add('active');if(tab.dataset.tab==='pending')loadPending();else if(tab.dataset.tab==='orders')loadPendingOrders();else if(tab.dataset.tab==='shops')loadShops();else if(tab.dataset.tab==='riders')loadRiders();else if(tab.dataset.tab==='finance')loadFinance()})});async function loadPending(){const res=await fetch(`${API}/api/admin/pending`,{headers:{'X-Telegram-Init-Data':tg.initData}});const users=await res.json();document.getElementById('pendingContainer').innerHTML=users.map(u=>`<div class="card"><b>${u.name}</b> (${u.role})<br>هاتف: ${u.phone||''}<br><button class="btn" data-id="${u.id}" onclick="approveUser('${u.id}')">✅ موافقة</button></div>`).join('')||'<p>لا توجد طلبات معلقة</p>'}window.approveUser=async id=>{await fetch(`${API}/api/admin/approve`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({user_id:id})});loadPending()};async function loadPendingOrders(){try{const res=await fetch(`${API}/api/admin/orders/pending`,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok){const errText=await res.text();throw new Error(`HTTP ${res.status}: ${errText}`);}const orders=await res.json();console.log('Pending orders:',orders);const container=document.getElementById('ordersContainer');if(!orders.length){container.innerHTML='<p>لا توجد طلبات للمراجعة حالياً.</p>';return}container.innerHTML=orders.map(o=>{let itemsArray=[];try{if(typeof o.items==='string'){itemsArray=JSON.parse(o.items);}else if(Array.isArray(o.items)){itemsArray=o.items;}else if(o.items&&typeof o.items==='object'){itemsArray=Object.values(o.items);}}catch(e){console.error('Failed to parse items:',e);itemsArray=[];}const itemsText=itemsArray.map(i=>`${i.name||'منتج'} ×${i.quantity||1}`).join('، ')||'تفاصيل غير متوفرة';return`<div class="card"><b>طلب #${o.id}</b> - ${o.customer_name||'غير معروف'}<br>🏪 ${o.shop_name||'غير معروف'}<br>📦 ${itemsText}<br>💰 ${o.total_price||0} ل.س<br>📍 ${o.address||'لا يوجد عنوان'}<br><button class="btn" onclick="approveOrder(${o.id})">✅ قبول</button><button class="btn btn-danger" onclick="rejectOrder(${o.id})">❌ رفض</button></div>`}).join('')}catch(error){console.error('loadPendingOrders error:',error);document.getElementById('ordersContainer').innerHTML=`<p>خطأ: ${error.message}</p>`}}window.approveOrder=async id=>{await fetch(`${API}/api/admin/orders/${id}/approve`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});loadPendingOrders()};window.rejectOrder=async id=>{await fetch(`${API}/api/admin/orders/${id}/reject`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});loadPendingOrders()};async function loadShops(){const res=await fetch(`${API}/api/admin/shops`,{headers:{'X-Telegram-Init-Data':tg.initData}});const shops=await res.json();let html='<table><tr><th>الاسم</th><th>المالك</th><th>الهاتف</th><th>الحالة</th><th>إجراءات</th></tr>';shops.forEach(s=>{html+=`<tr><td>${s.shop_name}</td><td>${s.owner_name}</td><td>${s.phone||''}</td><td><span style="background:${s.is_open?'#27ae60':'#f1c40f'};color:white;padding:4px 8px;border-radius:20px">${s.is_open?'مفتوح':'مغلق'}</span></td><td><button class="btn" onclick="editShop(${s.id})">✏️</button><button class="btn btn-danger" onclick="deleteShop(${s.id})">🗑️</button></td></tr>`});html+='</table>';document.getElementById('shopsContainer').innerHTML=html}window.editShop=id=>tg.showPopup({title:'تعديل',message:'قريباً'});window.deleteShop=async id=>{if(!confirm('حذف المحل؟'))return;await fetch(`${API}/api/admin/shops/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadShops()};async function loadRiders(){const res=await fetch(`${API}/api/admin/riders`,{headers:{'X-Telegram-Init-Data':tg.initData}});const riders=await res.json();let html='<table><tr><th>الاسم</th><th>الهاتف</th><th>المركبة</th><th>الحالة</th><th>إجراءات</th></tr>';riders.forEach(r=>{html+=`<tr><td>${r.name}</td><td>${r.phone||''}</td><td>${r.vehicle_type||''}</td><td><span style="background:${r.is_approved?'#27ae60':'#f1c40f'};color:white;padding:4px 8px;border-radius:20px">${r.is_approved?'مفعل':'غير مفعل'}</span></td><td><button class="btn" onclick="editRider(${r.id})">✏️</button><button class="btn btn-danger" onclick="deleteRider(${r.id})">🗑️</button></td></tr>`});html+='</table>';document.getElementById('ridersContainer').innerHTML=html}window.editRider=id=>tg.showPopup({title:'تعديل',message:'قريباً'});window.deleteRider=async id=>{if(!confirm('حذف السائق؟'))return;await fetch(`${API}/api/admin/riders/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadRiders()};async function loadFinance(){const container=document.getElementById('financeContainer');container.innerHTML='<p>جاري تحميل التقارير...</p>';try{const summaryRes=await fetch(`${API}/api/admin/finance`,{headers:{'X-Telegram-Init-Data':tg.initData}});const summary=await summaryRes.json();const today=new Date();const lastMonth=new Date(today);lastMonth.setDate(today.getDate()-30);const startDate=lastMonth.toISOString().split('T')[0];const endDate=today.toISOString().split('T')[0];const ordersRes=await fetch(`${API}/api/admin/completed-orders?startDate=${startDate}&endDate=${endDate}`,{headers:{'X-Telegram-Init-Data':tg.initData}});const orders=await ordersRes.json();currentOrders=orders;let tableRows='';orders.forEach(o=>{tableRows+=`<tr><td>${o.id}</td><td>${o.customer_name||''}</td><td>${o.shop_name||''}</td><td>${o.total_price||0} ل.س</td><td>${o.platform_commission||0} ل.س</td><td>${o.shop_net||0} ل.س</td><td>${o.rider_fee||0} ل.س</td><td>${new Date(o.created_at).toLocaleDateString('ar-SY')}</td></tr>`});const html=`<div class="card"><h3>ملخص الأرباح</h3><p>إجمالي عمولات المنصة: ${summary.total_platform_fees||0} ل.س</p><p>مستحقات المتاجر المعلقة: ${summary.pending_shop_payouts||0} ل.س</p><p>مستحقات السائقين المعلقة: ${summary.pending_rider_payouts||0} ل.س</p></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><h3>الطلبات المكتملة</h3><div><input type="date" id="startDate" value="${startDate}"><input type="date" id="endDate" value="${endDate}"><button class="btn" onclick="filterOrders()">تصفية</button><button class="btn" onclick="exportToCSV()">تصدير CSV</button></div></div><div style="overflow-x:auto;"><table><tr><th>رقم</th><th>الزبون</th><th>المتجر</th><th>الإجمالي</th><th>العمولة</th><th>صافي التاجر</th><th>أجرة السائق</th><th>التاريخ</th></tr>${tableRows}</table></div></div>`;container.innerHTML=html}catch(error){container.innerHTML=`<p>خطأ: ${error.message}</p>`}}window.filterOrders=async()=>{const start=document.getElementById('startDate').value;const end=document.getElementById('endDate').value;if(!start||!end)return;const res=await fetch(`${API}/api/admin/completed-orders?startDate=${start}&endDate=${end}`,{headers:{'X-Telegram-Init-Data':tg.initData}});const orders=await res.json();currentOrders=orders;let tableRows='';orders.forEach(o=>{tableRows+=`<tr><td>${o.id}</td><td>${o.customer_name||''}</td><td>${o.shop_name||''}</td><td>${o.total_price||0} ل.س</td><td>${o.platform_commission||0} ل.س</td><td>${o.shop_net||0} ل.س</td><td>${o.rider_fee||0} ل.س</td><td>${new Date(o.created_at).toLocaleDateString('ar-SY')}</td></tr>`});document.querySelector('#financeContainer table tbody').innerHTML=tableRows};window.exportToCSV=()=>{let csv='رقم,الزبون,المتجر,الإجمالي,العمولة,صافي التاجر,أجرة السائق,التاريخ\n';currentOrders.forEach(o=>{csv+=`${o.id},${o.customer_name},${o.shop_name},${o.total_price},${o.platform_commission},${o.shop_net},${o.rider_fee},${new Date(o.created_at).toLocaleDateString('ar-SY')}\n`});const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='orders.csv';link.click()};loadPending();</script></body></html>
