<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>لوحة الأدمن</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Tajawal', sans-serif; background: var(--tg-theme-bg-color, #f5f7fa); color: var(--tg-theme-text-color, #1e1e2f); padding: 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 12px 16px; background: var(--tg-theme-secondary-bg-color, #e0e0e0); border-radius: 30px; cursor: pointer; font-weight: 500; }
    .tab.active { background: var(--tg-theme-button-color, #e67e22); color: white; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: var(--tg-theme-secondary-bg-color, white); border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 8px; text-align: right; border-bottom: 1px solid var(--tg-theme-hint-color, #ddd); }
    .btn { background: var(--tg-theme-button-color, #e67e22); color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; margin: 2px; }
    .btn-danger { background: #e74c3c; }
    .badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; }
    .badge-success { background: #27ae60; color: white; }
    .badge-warning { background: #f1c40f; color: black; }
  </style>
</head>
<body>
<h2>👑 لوحة الأدمن</h2>
<div class="tabs">
  <div class="tab active" data-tab="pending">📋 طلبات معلقة</div>
  <div class="tab" data-tab="shops">🏪 المحلات</div>
  <div class="tab" data-tab="riders">🛵 السائقين</div>
  <div class="tab" data-tab="finance">💰 المالية</div>
</div>

<!-- طلبات التسجيل المعلقة -->
<div id="pendingPanel" class="panel active">
  <div id="pendingContainer"></div>
</div>

<!-- المحلات -->
<div id="shopsPanel" class="panel">
  <div id="shopsContainer"></div>
</div>

<!-- السائقين -->
<div id="ridersPanel" class="panel">
  <div id="ridersContainer"></div>
</div>

<!-- المالية -->
<div id="financePanel" class="panel">
  <div class="card" id="financeContainer">جاري التحميل...</div>
</div>

<script>
  const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
  const API = 'https://delivery-dragon.vercel.app';

  // التبويبات
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
      
      if (tab.dataset.tab === 'pending') loadPending();
      else if (tab.dataset.tab === 'shops') loadShops();
      else if (tab.dataset.tab === 'riders') loadRiders();
      else if (tab.dataset.tab === 'finance') loadFinance();
    });
  });

  // --- طلبات التسجيل المعلقة ---
  async function loadPending() {
    const res = await fetch(`${API}/api/admin/pending`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const users = await res.json();
    const html = users.map(u => `
      <div class="card">
        <b>${u.name}</b> (${u.role})<br>هاتف: ${u.phone || ''}<br>
        <button class="btn" data-id="${u.id}" onclick="approveUser('${u.id}')">✅ موافقة</button>
      </div>
    `).join('');
    document.getElementById('pendingContainer').innerHTML = html || '<p>لا توجد طلبات معلقة</p>';
  }
  window.approveUser = async (id) => {
    await fetch(`${API}/api/admin/approve`, { method:'POST', headers: { 'Content-Type':'application/json', 'X-Telegram-Init-Data': tg.initData }, body: JSON.stringify({ user_id: id }) });
    loadPending();
  };

  // --- المحلات ---
  async function loadShops() {
    const res = await fetch(`${API}/api/admin/shops`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const shops = await res.json();
    let html = '<table><tr><th>الاسم</th><th>المالك</th><th>الهاتف</th><th>الحالة</th><th>إجراءات</th></tr>';
    shops.forEach(s => {
      html += `<tr><td>${s.shop_name}</td><td>${s.owner_name}</td><td>${s.phone || ''}</td>
        <td><span class="badge ${s.is_open ? 'badge-success' : 'badge-warning'}">${s.is_open ? 'مفتوح' : 'مغلق'}</span></td>
        <td>
          <button class="btn" onclick="editShop(${s.id})">✏️</button>
          <button class="btn btn-danger" onclick="deleteShop(${s.id})">🗑️</button>
        </td></tr>`;
    });
    html += '</table>';
    document.getElementById('shopsContainer').innerHTML = html;
  }
  window.editShop = (id) => {
    tg.showPopup({ title: 'تعديل المحل', message: 'سيتم فتح نافذة التعديل قريباً.' });
    // يمكنك إضافة نافذة منبثقة تحتوي على نموذج تعديل
  };
  window.deleteShop = async (id) => {
    if (!confirm('هل أنت متأكد من حذف المحل؟')) return;
    await fetch(`${API}/api/admin/shops/${id}`, { method:'DELETE', headers: { 'X-Telegram-Init-Data': tg.initData } });
    loadShops();
  };

  // --- السائقين ---
  async function loadRiders() {
    const res = await fetch(`${API}/api/admin/riders`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const riders = await res.json();
    let html = '<table><tr><th>الاسم</th><th>الهاتف</th><th>المركبة</th><th>الحالة</th><th>إجراءات</th></tr>';
    riders.forEach(r => {
      html += `<tr><td>${r.name}</td><td>${r.phone || ''}</td><td>${r.vehicle_type || ''}</td>
        <td><span class="badge ${r.is_approved ? 'badge-success' : 'badge-warning'}">${r.is_approved ? 'مفعل' : 'غير مفعل'}</span></td>
        <td>
          <button class="btn" onclick="editRider(${r.id})">✏️</button>
          <button class="btn btn-danger" onclick="deleteRider(${r.id})">🗑️</button>
        </td></tr>`;
    });
    html += '</table>';
    document.getElementById('ridersContainer').innerHTML = html;
  }
  window.editRider = (id) => {
    tg.showPopup({ title: 'تعديل السائق', message: 'سيتم فتح نافذة التعديل قريباً.' });
  };
  window.deleteRider = async (id) => {
    if (!confirm('هل أنت متأكد من حذف السائق؟')) return;
    await fetch(`${API}/api/admin/riders/${id}`, { method:'DELETE', headers: { 'X-Telegram-Init-Data': tg.initData } });
    loadRiders();
  };

  // --- المالية ---
  async function loadFinance() {
    const res = await fetch(`${API}/api/admin/finance`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const data = await res.json();
    document.getElementById('financeContainer').innerHTML = `
      <p>إجمالي عمولات المنصة: ${data.total_platform_fees || 0} ل.س</p>
      <p>مستحقات المتاجر المعلقة: ${data.pending_shop_payouts || 0} ل.س</p>
      <p>مستحقات السائقين المعلقة: ${data.pending_rider_payouts || 0} ل.س</p>
    `;
  }

  // تحميل البيانات الافتراضية
  loadPending();
</script>
</body>
</html>
