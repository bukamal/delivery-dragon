<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | لوحة الأدمن</title><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="https://unpkg.com/lucide@latest"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);color:var(--tg-theme-text-color,#1a1a2c);padding:0 0 20px}.app-header{display:flex;align-items:center;padding:16px 20px;background:var(--tg-theme-secondary-bg-color,#fff);border-bottom:1px solid #ddd;position:sticky;top:0;z-index:10}.app-header h1{font-size:1.7rem;color:#e67e22;margin-right:12px}.back-btn{background:0 0;border:none;color:#e67e22;font-size:1.8rem;cursor:pointer}.container{padding:16px;max-width:800px;margin:0 auto}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}.tab{padding:10px 16px;background:var(--tg-theme-secondary-bg-color,#fff);border-radius:30px;cursor:pointer;border:1px solid #ddd}.tab.active{background:#e67e22;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.02)}.btn{background:#e67e22;color:#fff;border:none;padding:8px 16px;border-radius:30px;cursor:pointer;margin:2px}.btn-danger{background:#e74c3c}.badge{padding:4px 8px;border-radius:20px;font-size:.8rem}.badge-success{background:#27ae60;color:#fff}.badge-warning{background:#f1c40f}.shop-grid{display:grid;gap:16px}</style></head><body><div class="app-header"><button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button><h1>🦅 شاهين | الأدمن</h1></div><div class="container"><div class="tabs"><div class="tab active" data-tab="pending">📋 تسجيل</div><div class="tab" data-tab="orders">🛒 مراجعة</div><div class="tab" data-tab="shops">🏪 متاجر</div><div class="tab" data-tab="riders">🛵 سائقين</div><div class="tab" data-tab="cities">🌍 مدن</div><div class="tab" data-tab="finance">💰 مالية</div></div><div id="pendingPanel" class="panel active"></div><div id="ordersPanel" class="panel"></div><div id="shopsPanel" class="panel"></div><div id="ridersPanel" class="panel"></div><div id="citiesPanel" class="panel"></div><div id="financePanel" class="panel"></div></div><script>const tg=Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';const tabs=document.querySelectorAll('.tab');tabs.forEach(t=>t.onclick=()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(t.dataset.tab+'Panel').classList.add('active');if(t.dataset.tab==='pending')loadPending();else if(t.dataset.tab==='orders')loadPendingOrders();else if(t.dataset.tab==='shops')loadShops();else if(t.dataset.tab==='riders')loadRiders();else if(t.dataset.tab==='cities')loadCitiesZones();else if(t.dataset.tab==='finance')loadFinance()});async function loadPending(){const r=await fetch(`${API}/api/admin/pending`,{headers:{'X-Telegram-Init-Data':tg.initData}});const u=await r.json();const h=u.map(x=>`<div class="card"><b>${x.name}</b> (${x.role})<br>📞 ${x.phone||''}<br><button class="btn" onclick="approve(${x.id})">✅ موافقة</button></div>`).join('')||'<p>لا طلبات</p>';document.getElementById('pendingPanel').innerHTML=h}window.approve=async id=>{await fetch(`${API}/api/admin/approve`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({user_id:id})});loadPending()};async function loadPendingOrders(){const r=await fetch(`${API}/api/admin/orders/pending`,{headers:{'X-Telegram-Init-Data':tg.initData}});const o=await r.json();const h=o.map(x=>`<div class="card"><b>#${x.id}</b> - ${x.customer_name}<br>🏪 ${x.shop_name}<br>💰 ${x.total_price} ل.س<br><button class="btn" onclick="approveOrder(${x.id})">قبول</button><button class="btn btn-danger" onclick="rejectOrder(${x.id})">رفض</button></div>`).join('')||'<p>لا طلبات</p>';document.getElementById('ordersPanel').innerHTML=h}window.approveOrder=async id=>{await fetch(`${API}/api/admin/orders/${id}/approve`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});loadPendingOrders()};window.rejectOrder=async id=>{await fetch(`${API}/api/admin/orders/${id}/reject`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});loadPendingOrders()};async function loadShops(){const r=await fetch(`${API}/api/admin/shops`,{headers:{'X-Telegram-Init-Data':tg.initData}});const s=await r.json();let h='<div class="shop-grid">';s.forEach(x=>{h+=`<div class="card" style="display:flex;align-items:center;gap:16px"><div style="font-size:44px">🏪</div><div style="flex:1"><b>${x.shop_name}</b><br>👤 ${x.owner_name}<br>📍 ${x.city_name||''}<br><span class="badge ${x.is_open?'badge-success':'badge-warning'}">${x.is_open?'مفتوح':'مغلق'}</span></div><button class="btn btn-danger" onclick="deleteShop(${x.id})"><i data-lucide="trash-2"></i></button></div>`});h+='</div>';document.getElementById('shopsPanel').innerHTML=h;if(typeof lucide!=='undefined')lucide.createIcons()}window.deleteShop=async id=>{tg.showConfirm('⚠️ حذف المتجر سيؤدي إلى حذف جميع منتجاته وطلباته، وسيتحول المالك إلى زبون عادي. هل أنت متأكد؟',async confirmed=>{if(!confirmed)return;await fetch(`${API}/api/admin/shops/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadShops()})};async function loadRiders(){const r=await fetch(`${API}/api/admin/riders`,{headers:{'X-Telegram-Init-Data':tg.initData}});const d=await r.json();let h='<div class="shop-grid">';d.forEach(x=>{h+=`<div class="card" style="display:flex;align-items:center;gap:16px"><div style="font-size:44px">🛵</div><div style="flex:1"><b>${x.name}</b><br>📞 ${x.phone||''}<br>🚲 ${x.vehicle_type||''}<br><span class="badge ${x.is_approved?'badge-success':'badge-warning'}">${x.is_approved?'مفعل':'غير مفعل'}</span></div><button class="btn btn-danger" onclick="deleteRider(${x.id})"><i data-lucide="trash-2"></i></button></div>`});h+='</div>';document.getElementById('ridersPanel').innerHTML=h;if(typeof lucide!=='undefined')lucide.createIcons()}window.deleteRider=async id=>{tg.showConfirm('⚠️ حذف السائق سيؤدي إلى تحويله إلى زبون عادي. هل أنت متأكد؟',async confirmed=>{if(!confirmed)return;await fetch(`${API}/api/admin/riders/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadRiders()})};async function loadCitiesZones(){const c=await fetch(`${API}/api/admin/cities`,{headers:{'X-Telegram-Init-Data':tg.initData}});const cities=await c.json();const z=await fetch(`${API}/api/admin/zones`,{headers:{'X-Telegram-Init-Data':tg.initData}});const zones=await z.json();let h='<h3>🌍 المدن</h3><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">';cities.forEach(c=>{h+=`<span class="badge badge-success">${c.name}</span>`});h+='</div><h3>📍 مناطق التوصيل</h3>';zones.forEach(z=>{h+=`<div class="card"><b>${z.city_name}</b> - ${z.zone_name} (${z.base_fee} ل.س) <button class="btn btn-danger" onclick="deleteZone(${z.id})"><i data-lucide="trash-2"></i></button></div>`});document.getElementById('citiesPanel').innerHTML=h;if(typeof lucide!=='undefined')lucide.createIcons()}window.deleteZone=async id=>{await fetch(`${API}/api/admin/zones/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadCitiesZones()};async function loadFinance(){const r=await fetch(`${API}/api/admin/finance`,{headers:{'X-Telegram-Init-Data':tg.initData}});const d=await r.json();document.getElementById('financePanel').innerHTML=`<div class="card"><h3>📊 ملخص الأرباح</h3><p>💰 إجمالي العمولات: ${d.total_platform_fees||0} ل.س</p><p>🏪 مستحقات المتاجر: ${d.pending_shop_payouts||0} ل.س</p><p>🛵 مستحقات السائقين: ${d.pending_rider_payouts||0} ل.س</p></div>`}loadPending()</script></body></html>
