<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - لوحة الأدمن</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:#f5f7fa;padding:16px}.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}.tab{padding:12px 16px;background:#e0e0e0;border-radius:30px;cursor:pointer;font-weight:500}.tab.active{background:#e67e22;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px}.btn{background:#e67e22;color:#fff;border:none;padding:8px 16px;border-radius:30px;cursor:pointer;margin:2px}.btn-danger{background:#e74c3c}</style></head><body><h2>👑 لوحة الأدمن</h2><div class="tabs"><div class="tab active" data-tab="pending">📋 طلبات تسجيل</div><div class="tab" data-tab="orders">🛒 طلبات للمراجعة</div><div class="tab" data-tab="shops">🏪 المحلات</div><div class="tab" data-tab="riders">🛵 السائقين</div><div class="tab" data-tab="finance">💰 المالية</div></div><div id="pendingPanel" class="panel active"><div id="pendingContainer"></div></div><div id="ordersPanel" class="panel"><div id="ordersContainer"></div></div><div id="shopsPanel" class="panel"><div id="shopsContainer"></div></div><div id="ridersPanel" class="panel"><div id="ridersContainer"></div></div><div id="financePanel" class="panel"><div class="card" id="financeContainer">جاري التحميل...</div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();const API='https://delivery-dragon.vercel.app';document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(tab.dataset.tab+'Panel').classList.add('active');if(tab.dataset.tab==='pending')loadPending();else if(tab.dataset.tab==='orders')loadPendingOrders();else if(tab.dataset.tab==='shops')loadShops();else if(tab.dataset.tab==='riders')loadRiders();else if(tab.dataset.tab==='finance')loadFinance()})});async function loadPending(){const res=await fetch(`${API}/api/admin/pending`,{headers:{'X-Telegram-Init-Data':tg.initData}});const users=await res.json();document.getElementById('pendingContainer').innerHTML=users.map(u=>`<div class="card"><b>${u.name}</b> (${u.role})<br>هاتف: ${u.phone||''}<br><button class="btn" data-id="${u.id}" onclick="approveUser('${u.id}')">✅ موافقة</button></div>`).join('')||'<p>لا توجد طلبات معلقة</p>'}window.approveUser=async id=>{await fetch(`${API}/api/admin/approve`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({user_id:id})});loadPending()};async function loadPendingOrders(){try{const res=await fetch(`${API}/api/admin/orders/pending`,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok)throw new Error(`HTTP ${res.status}`);const orders=await res.json();console.log('Pending orders:',orders);const container=document.getElementById('ordersContainer');if(orders.length===0){container.innerHTML='<p>لا توجد طلبات للمراجعة حالياً.</p>';return}container.innerHTML=orders.map(o=>{const items=JSON.parse(o.items).map(i=>`${i.name} ×${i.quantity}`).join('، ');return`<div class="card"><b>طلب #${o.id}</b> - ${o.customer_name}<br>🏪 ${o.shop_name}<br>📦 ${items}<br>💰 ${o.total_price} ل.س<br>📍 ${o.address}<br><button class="btn" onclick="approveOrder(${o.id})">✅ قبول</button><button class="btn btn-danger" onclick="rejectOrder(${o.id})">❌ رفض</button></div>`}).join('')}catch(error){console.error('loadPendingOrders error:',error);document.getElementById('ordersContainer').innerHTML='<p>خطأ في تحميل الطلبات.</p>'}}window.approveOrder=async id=>{await fetch(`${API}/api/admin/orders/${id}/approve`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});loadPendingOrders()};window.rejectOrder=async id=>{await fetch(`${API}/api/admin/orders/${id}/reject`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});loadPendingOrders()};async function loadShops(){const res=await fetch(`${API}/api/admin/shops`,{headers:{'X-Telegram-Init-Data':tg.initData}});const shops=await res.json();let html='<table style="width:100%;border-collapse:collapse"><tr><th>الاسم</th><th>المالك</th><th>الهاتف</th><th>الحالة</th><th>إجراءات</th></tr>';shops.forEach(s=>{html+=`<tr><td>${s.shop_name}</td><td>${s.owner_name}</td><td>${s.phone||''}</td><td><span style="background:${s.is_open?'#27ae60':'#f1c40f'};color:white;padding:4px 8px;border-radius:20px">${s.is_open?'مفتوح':'مغلق'}</span></td><td><button class="btn" onclick="editShop(${s.id})">✏️</button><button class="btn btn-danger" onclick="deleteShop(${s.id})">🗑️</button></td></tr>`});html+='</table>';document.getElementById('shopsContainer').innerHTML=html}window.editShop=id=>tg.showPopup({title:'تعديل',message:'قريباً'});window.deleteShop=async id=>{if(!confirm('حذف المحل؟'))return;await fetch(`${API}/api/admin/shops/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadShops()};async function loadRiders(){const res=await fetch(`${API}/api/admin/riders`,{headers:{'X-Telegram-Init-Data':tg.initData}});const riders=await res.json();let html='<table style="width:100%"><tr><th>الاسم</th><th>الهاتف</th><th>المركبة</th><th>الحالة</th><th>إجراءات</th></tr>';riders.forEach(r=>{html+=`<tr><td>${r.name}</td><td>${r.phone||''}</td><td>${r.vehicle_type||''}</td><td><span style="background:${r.is_approved?'#27ae60':'#f1c40f'};color:white;padding:4px 8px;border-radius:20px">${r.is_approved?'مفعل':'غير مفعل'}</span></td><td><button class="btn" onclick="editRider(${r.id})">✏️</button><button class="btn btn-danger" onclick="deleteRider(${r.id})">🗑️</button></td></tr>`});html+='</table>';document.getElementById('ridersContainer').innerHTML=html}window.editRider=id=>tg.showPopup({title:'تعديل',message:'قريباً'});window.deleteRider=async id=>{if(!confirm('حذف السائق؟'))return;await fetch(`${API}/api/admin/riders/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadRiders()};async function loadFinance(){const res=await fetch(`${API}/api/admin/finance`,{headers:{'X-Telegram-Init-Data':tg.initData}});const d=await res.json();document.getElementById('financeContainer').innerHTML=`<p>إجمالي العمولات: ${d.total_platform_fees||0} ل.س</p><p>مستحقات المتاجر: ${d.pending_shop_payouts||0} ل.س</p><p>مستحقات السائقين: ${d.pending_rider_payouts||0} ل.س</p>`}loadPending();</script></body></html>
