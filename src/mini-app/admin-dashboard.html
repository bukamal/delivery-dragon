<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | لوحة الأدمن</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css?v=2.0.0">
</head>
<body>
<div class="admin-layout">
  <!-- الشريط الجانبي -->
  <div class="admin-sidebar" id="sidebar">
    <div class="sidebar-header">🦅 شاهين</div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link active" data-page="dashboard"><i data-lucide="layout-dashboard"></i><span>الرئيسية</span></a>
      <a href="#" class="sidebar-link" data-page="pending"><i data-lucide="clock"></i><span>طلبات التسجيل</span></a>
      <a href="#" class="sidebar-link" data-page="orders"><i data-lucide="shopping-bag"></i><span>مراجعة الطلبات</span></a>
      <div class="sidebar-group">
        <span class="sidebar-group-title">المستخدمين</span>
        <a href="#" class="sidebar-link" data-page="shops"><i data-lucide="store"></i> المتاجر</a>
        <a href="#" class="sidebar-link" data-page="riders"><i data-lucide="bike"></i> السائقين</a>
      </div>
      <div class="sidebar-group">
        <span class="sidebar-group-title">الإعدادات</span>
        <a href="#" class="sidebar-link" data-page="cities"><i data-lucide="map-pin"></i> المدن</a>
        <a href="#" class="sidebar-link" data-page="zones"><i data-lucide="layers"></i> المناطق</a>
      </div>
      <a href="#" class="sidebar-link" data-page="finance"><i data-lucide="dollar-sign"></i><span>المالية</span></a>
      <a href="#" class="sidebar-link" data-page="reports"><i data-lucide="bar-chart"></i><span>التقارير</span></a>
      <a href="#" class="sidebar-link" data-page="ratings"><i data-lucide="star"></i><span>التقييمات</span></a>
      <a href="#" class="sidebar-link" data-page="support"><i data-lucide="message-circle"></i><span>الدعم الفني</span></a>
    </nav>
  </div>
  
  <!-- المحتوى الرئيسي -->
  <div class="admin-main">
    <div class="app-header">
      <button class="sidebar-toggle" id="sidebarToggle"><i data-lucide="menu"></i></button>
      <h1 id="pageTitle">الرئيسية</h1>
      <div style="width:40px;"></div>
    </div>
    <div class="admin-content" id="adminContent">
      <!-- يتم تحميل المحتوى ديناميكياً -->
    </div>
  </div>
</div>

<!-- مودالات (مدينة، منطقة) -->
<div id="cityModal" class="modal" style="display:none"><div class="modal-content"><h3 id="cityModalTitle">إضافة مدينة</h3><input type="text" id="cityNameInput" placeholder="اسم المدينة"><label><input type="checkbox" id="cityActiveCheckbox" checked> نشط</label><input type="hidden" id="cityIdInput"><button class="btn btn-block" onclick="saveCity()">حفظ</button><button class="btn btn-block" onclick="closeCityModal()" style="background:var(--gray-500); margin-top:8px;">إلغاء</button></div></div>
<div id="zoneModal" class="modal" style="display:none"><div class="modal-content"><h3 id="zoneModalTitle">إضافة منطقة</h3><select id="zoneCitySelect"></select><input type="text" id="zoneNameInput" placeholder="اسم المنطقة"><input type="number" id="zoneFeeInput" placeholder="رسوم التوصيل (ل.س)"><label><input type="checkbox" id="zoneActiveCheckbox" checked> نشط</label><input type="hidden" id="zoneIdInput"><button class="btn btn-block" onclick="saveZone()">حفظ</button><button class="btn btn-block" onclick="closeZoneModal()" style="background:var(--gray-500); margin-top:8px;">إلغاء</button></div></div>

<script>
  const tg = Telegram.WebApp; tg.ready(); tg.BackButton.show(); tg.BackButton.onClick(() => history.back());
  const API = 'https://delivery-dragon.vercel.app';
  
  const sidebar = document.getElementById('sidebar');
  const toggleBtn = document.getElementById('sidebarToggle');
  const links = document.querySelectorAll('.sidebar-link');
  const pageTitle = document.getElementById('pageTitle');
  const contentArea = document.getElementById('adminContent');
  
  toggleBtn.onclick = () => sidebar.classList.toggle('open');
  
  links.forEach(link => {
    link.onclick = (e) => {
      e.preventDefault();
      links.forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      const page = link.dataset.page;
      pageTitle.innerText = link.querySelector('span')?.innerText || link.innerText.trim();
      loadPage(page);
      if (window.innerWidth <= 768) sidebar.classList.remove('open');
    };
  });
  
  async function loadPage(page) {
    switch(page) {
      case 'dashboard': loadDashboard(); break;
      case 'pending': loadPending(); break;
      case 'orders': loadPendingOrders(); break;
      case 'shops': loadShops(); break;
      case 'riders': loadRiders(); break;
      case 'cities': loadCities(); break;
      case 'zones': loadZones(); break;
      case 'finance': loadFinance(); break;
      case 'reports': loadCompletedOrders(); break;
      case 'ratings': loadRatings(); break;
      case 'support': loadSupportUsers(); break;
      default: contentArea.innerHTML = '<p>قيد التطوير</p>';
    }
  }
  
  // ========== الصفحة الرئيسية ==========
  async function loadDashboard() {
    contentArea.innerHTML = '<div class="skeleton" style="height:200px;"></div>';
    try {
      const [statsRes, recentOrdersRes] = await Promise.all([
        fetch(`${API}/api/admin/stats`, { headers: { 'X-Telegram-Init-Data': tg.initData } }),
        fetch(`${API}/api/admin/orders/pending?limit=5`, { headers: { 'X-Telegram-Init-Data': tg.initData } })
      ]);
      const stats = await statsRes.json();
      const recentOrders = await recentOrdersRes.json();
      
      let html = `
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-value">${stats.today_orders || 0}</div><div class="kpi-label">طلبات اليوم</div></div>
          <div class="kpi-card"><div class="kpi-value">${stats.today_revenue || 0} ل.س</div><div class="kpi-label">إيرادات اليوم</div></div>
          <div class="kpi-card"><div class="kpi-value">${stats.pending_shops || 0}</div><div class="kpi-label">متاجر معلقة</div></div>
          <div class="kpi-card"><div class="kpi-value">${stats.pending_riders || 0}</div><div class="kpi-label">سائقين معلقين</div></div>
        </div>
        <div class="card">
          <h3>📋 آخر طلبات بانتظار المراجعة</h3>
          ${recentOrders.length ? recentOrders.map(o => `<div class="flex-between" style="padding:8px 0; border-bottom:1px solid var(--gray-200);"><span>#${o.id} - ${o.customer_name} | ${o.shop_name}</span><span>${o.total_price} ل.س</span></div>`).join('') : '<p>لا توجد طلبات معلقة</p>'}
        </div>
      `;
      contentArea.innerHTML = html;
    } catch(e) { contentArea.innerHTML = '<div class="empty-state">تعذر تحميل البيانات</div>'; }
  }
  
  // ========== طلبات التسجيل ==========
  async function loadPending() {
    const r = await fetch(`${API}/api/admin/pending`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const u = await r.json();
    let html = '<div class="shop-grid">';
    u.forEach(x => { html += `<div class="card"><b>${x.name}</b> (${x.role})<br>📞 ${x.phone||''}<br><button class="btn btn-block" onclick="approve(${x.id})">✅ موافقة</button></div>`; });
    html += u.length ? '' : '<p>لا طلبات</p></div>';
    contentArea.innerHTML = html;
  }
  window.approve = async id => { await fetch(`${API}/api/admin/approve`, { method:'POST', headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify({user_id:id}) }); loadPending(); };
  
  // ========== مراجعة الطلبات ==========
  async function loadPendingOrders() {
    const r = await fetch(`${API}/api/admin/orders/pending`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const o = await r.json();
    let html = o.map(x => `<div class="card"><b>#${x.id}</b> - ${x.customer_name}<br>🏪 ${x.shop_name}<br>💰 ${x.total_price} ل.س<br><button class="btn btn-block" onclick="approveOrder(${x.id})">قبول</button><button class="btn btn-danger btn-block" onclick="rejectOrder(${x.id})">رفض</button></div>`).join('') || '<p>لا طلبات</p>';
    contentArea.innerHTML = html;
  }
  window.approveOrder = async id => { await fetch(`${API}/api/admin/orders/${id}/approve`, { method:'POST', headers:{'X-Telegram-Init-Data':tg.initData} }); loadPendingOrders(); };
  window.rejectOrder = async id => { await fetch(`${API}/api/admin/orders/${id}/reject`, { method:'POST', headers:{'X-Telegram-Init-Data':tg.initData} }); loadPendingOrders(); };
  
  // ========== المتاجر ==========
  async function loadShops() {
    const r = await fetch(`${API}/api/admin/shops`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const s = await r.json();
    let html = '<div class="search-bar"><input type="text" placeholder="بحث عن متجر..." id="shopSearch" class="search-input"></div><div class="shop-grid">';
    s.forEach(x => { html += `<div class="card flex-between shop-item"><div class="flex"><span style="font-size:44px;">🏪</span><div><b>${x.shop_name}</b><br>👤 ${x.owner_name}<br>📍 ${x.city_name||''}<br><span class="badge ${x.is_open?'badge-success':'badge-warning'}">${x.is_open?'مفتوح':'مغلق'}</span></div></div><button class="btn btn-danger" onclick="deleteShop(${x.id})"><i data-lucide="trash-2"></i></button></div>`; });
    html += s.length ? '' : '<p>لا متاجر</p></div>';
    contentArea.innerHTML = html;
    document.getElementById('shopSearch')?.addEventListener('input', e => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.shop-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(term) ? 'flex' : 'none');
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  window.deleteShop = async id => { tg.showConfirm('⚠️ حذف المتجر؟', async c => { if(!c) return; await fetch(`${API}/api/admin/shops/${id}`, { method:'DELETE', headers:{'X-Telegram-Init-Data':tg.initData} }); loadShops(); }); };
  
  // ========== السائقين ==========
  async function loadRiders() {
    const r = await fetch(`${API}/api/admin/riders`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const d = await r.json();
    let html = '<div class="search-bar"><input type="text" placeholder="بحث عن سائق..." id="riderSearch"></div><div class="shop-grid">';
    d.forEach(x => { html += `<div class="card flex-between rider-item"><div class="flex"><span style="font-size:44px;">🛵</span><div><b>${x.name}</b><br>📞 ${x.phone||''}<br>🚲 ${x.vehicle_type||''} ${x.vehicle_number||''}<br><span class="badge ${x.is_approved?'badge-success':'badge-warning'}">${x.is_approved?'مفعل':'غير مفعل'}</span></div></div><button class="btn btn-danger" onclick="deleteRider(${x.id})"><i data-lucide="trash-2"></i></button></div>`; });
    html += d.length ? '' : '<p>لا سائقين</p></div>';
    contentArea.innerHTML = html;
    document.getElementById('riderSearch')?.addEventListener('input', e => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.rider-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(term) ? 'flex' : 'none');
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  window.deleteRider = async id => { tg.showConfirm('⚠️ حذف السائق؟', async c => { if(!c) return; await fetch(`${API}/api/admin/riders/${id}`, { method:'DELETE', headers:{'X-Telegram-Init-Data':tg.initData} }); loadRiders(); }); };
  
  // ========== المدن ==========
  async function loadCities() {
    const r = await fetch(`${API}/api/admin/cities`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const cities = await r.json();
    let html = '<button class="btn btn-block" onclick="openCityModal()">➕ إضافة مدينة</button><div class="shop-grid" style="margin-top:16px">';
    cities.forEach(c => { html += `<div class="card flex-between"><div><b>${c.name}</b> ${c.is_active?'✅':'❌'}</div><div><button class="btn" onclick="editCity(${c.id},'${c.name}',${c.is_active})">✏️</button><button class="btn btn-danger" onclick="deleteCity(${c.id})">🗑️</button></div></div>`; });
    html += '</div>';
    contentArea.innerHTML = html;
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  window.openCityModal = (id=null, name='', active=true) => { document.getElementById('cityModalTitle').innerText = id ? 'تعديل مدينة' : 'إضافة مدينة'; document.getElementById('cityIdInput').value = id || ''; document.getElementById('cityNameInput').value = name; document.getElementById('cityActiveCheckbox').checked = active; document.getElementById('cityModal').style.display = 'flex'; };
  window.editCity = (id, name, active) => openCityModal(id, name, active);
  window.closeCityModal = () => document.getElementById('cityModal').style.display = 'none';
  window.saveCity = async () => { const id = document.getElementById('cityIdInput').value, name = document.getElementById('cityNameInput').value.trim(), is_active = document.getElementById('cityActiveCheckbox').checked; if (!name) return tg.showAlert('أدخل اسم المدينة'); const url = id ? `${API}/api/admin/cities/${id}` : `${API}/api/admin/cities`, method = id ? 'PUT' : 'POST'; await fetch(url, { method, headers: { 'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData }, body: JSON.stringify({ name, is_active }) }); closeCityModal(); loadCities(); };
  window.deleteCity = async id => { tg.showConfirm('حذف المدينة؟', async ok => { if(ok){ await fetch(`${API}/api/admin/cities/${id}`, { method:'DELETE', headers:{'X-Telegram-Init-Data':tg.initData} }); loadCities(); } }); };
  
  // ========== المناطق ==========
  async function loadZones() {
    const [zRes, cRes] = await Promise.all([fetch(`${API}/api/admin/zones`, { headers: { 'X-Telegram-Init-Data': tg.initData } }), fetch(`${API}/api/admin/cities`, { headers: { 'X-Telegram-Init-Data': tg.initData } })]);
    const zones = await zRes.json(); const cities = await cRes.json(); window.citiesList = cities;
    let html = '<button class="btn btn-block" onclick="openZoneModal()">➕ إضافة منطقة</button><div class="shop-grid" style="margin-top:16px">';
    zones.forEach(z => { html += `<div class="card"><b>${z.city_name}</b> - ${z.zone_name}<br>💰 ${z.base_fee} ل.س ${z.is_active?'✅':'❌'}<br><button class="btn" onclick="editZone(${z.id},${z.city_id},'${z.zone_name}',${z.base_fee},${z.is_active})">✏️</button><button class="btn btn-danger" onclick="deleteZone(${z.id})">🗑️</button></div>`; });
    html += '</div>';
    contentArea.innerHTML = html;
  }
  window.openZoneModal = (id=null, city_id='', name='', fee='', active=true) => { const sel = document.getElementById('zoneCitySelect'); sel.innerHTML = window.citiesList.map(c => `<option value="${c.id}" ${c.id==city_id?'selected':''}>${c.name}</option>`).join(''); document.getElementById('zoneModalTitle').innerText = id ? 'تعديل منطقة' : 'إضافة منطقة'; document.getElementById('zoneIdInput').value = id || ''; document.getElementById('zoneNameInput').value = name; document.getElementById('zoneFeeInput').value = fee; document.getElementById('zoneActiveCheckbox').checked = active; document.getElementById('zoneModal').style.display = 'flex'; };
  window.editZone = (id, city_id, name, fee, active) => openZoneModal(id, city_id, name, fee, active);
  window.closeZoneModal = () => document.getElementById('zoneModal').style.display = 'none';
  window.saveZone = async () => { const id = document.getElementById('zoneIdInput').value, city_id = document.getElementById('zoneCitySelect').value, zone_name = document.getElementById('zoneNameInput').value.trim(), base_fee = parseFloat(document.getElementById('zoneFeeInput').value), is_active = document.getElementById('zoneActiveCheckbox').checked; if (!city_id || !zone_name || isNaN(base_fee)) return tg.showAlert('جميع الحقول مطلوبة'); const url = id ? `${API}/api/admin/zones/${id}` : `${API}/api/admin/zones`, method = id ? 'PUT' : 'POST'; await fetch(url, { method, headers: { 'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData }, body: JSON.stringify({ city_id, zone_name, base_fee, is_active }) }); closeZoneModal(); loadZones(); };
  window.deleteZone = async id => { tg.showConfirm('حذف المنطقة؟', async ok => { if(ok){ await fetch(`${API}/api/admin/zones/${id}`, { method:'DELETE', headers:{'X-Telegram-Init-Data':tg.initData} }); loadZones(); } }); };
  
  // ========== المالية ==========
  async function loadFinance() {
    const r = await fetch(`${API}/api/admin/finance`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const d = await r.json();
    contentArea.innerHTML = `<div class="card"><h3>📊 ملخص الأرباح</h3><p>💰 إجمالي العمولات: ${d.total_platform_fees||0} ل.س</p><p>🏪 مستحقات المتاجر: ${d.pending_shop_payouts||0} ل.س</p><p>🛵 مستحقات السائقين: ${d.pending_rider_payouts||0} ل.س</p></div>`;
  }
  
  // ========== التقارير (الطلبات المكتملة) ==========
  async function loadCompletedOrders() {
    const r = await fetch(`${API}/api/admin/completed-orders`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const orders = await r.json();
    let html = orders.map(o => `<div class="card"><b>#${o.id}</b> - ${o.customer_name}<br>🏪 ${o.shop_name}<br>🛵 ${o.rider_name||'-'}<br>💰 ${o.total_price} ل.س (عمولة: ${o.platform_commission} ل.س)<br>📅 ${new Date(o.created_at).toLocaleDateString('ar-SY')}</div>`).join('') || '<p>لا طلبات مكتملة</p>';
    contentArea.innerHTML = html;
  }
  
  // ========== التقييمات ==========
  async function loadRatings() {
    const r = await fetch(`${API}/api/admin/ratings`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const ratings = await r.json();
    let html = ratings.map(r => `<div class="card"><b>طلب #${r.order_id}</b> | ${r.from_name} قيّم ${r.to_name}<br>⭐ ${r.rating}/5 - ${r.comment||''}<br><button class="btn btn-danger" onclick="deleteRating(${r.id})">حذف</button></div>`).join('') || '<p>لا تقييمات</p>';
    contentArea.innerHTML = html;
  }
  window.deleteRating = async id => { await fetch(`${API}/api/admin/ratings/${id}`, { method:'DELETE', headers:{'X-Telegram-Init-Data':tg.initData} }); loadRatings(); };
  
  // ========== الدعم الفني ==========
  let selectedSupportUserId = null;
  async function loadSupportUsers() {
    const res = await fetch(`${API}/api/admin/support/users`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const users = await res.json();
    let html = '<div style="display:flex; gap:16px; height:80vh;"><div style="width:35%; border-left:1px solid var(--gray-200); padding-left:8px; overflow-y:auto;">';
    users.forEach(u => { html += `<div class="card" style="cursor:pointer;" onclick="selectSupportUser(${u.id})"><b>${u.name}</b> (${u.role})<br>${u.unread_count > 0 ? '<span class="badge badge-warning">' + u.unread_count + ' جديد</span>' : ''}<div style="font-size:0.8rem;">${u.phone||''}</div></div>`; });
    html += '</div><div style="width:65%;" id="supportChatArea"><p style="text-align:center;padding:40px;">اختر محادثة</p></div></div>';
    contentArea.innerHTML = html;
  }
  window.selectSupportUser = async (userId) => { selectedSupportUserId = userId; await loadSupportChat(userId); };
  async function loadSupportChat(userId) {
    const area = document.getElementById('supportChatArea'); area.innerHTML = '<div class="skeleton" style="height:100px;"></div>';
    const res = await fetch(`${API}/api/admin/support/messages/${userId}`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const messages = await res.json();
    let html = `<div class="chat-messages">`;
    messages.forEach(m => { const isAdmin = m.is_from_admin; html += `<div class="chat-bubble ${isAdmin ? 'admin' : 'user'}"><div style="font-size:0.7rem; opacity:0.8;">${isAdmin ? 'الدعم' : m.user_name} - ${new Date(m.created_at).toLocaleTimeString('ar-SY')}</div>${m.message}</div>`; });
    html += `</div><div class="chat-input-area"><input type="text" id="adminReplyInput" placeholder="اكتب رداً..."><button class="btn" onclick="sendAdminReply(${userId})">إرسال</button></div>`;
    area.innerHTML = html; if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  window.sendAdminReply = async (userId) => { const input = document.getElementById('adminReplyInput'); const message = input.value.trim(); if (!message) return; await fetch(`${API}/api/admin/support/messages/${userId}`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData }, body: JSON.stringify({ message }) }); input.value = ''; loadSupportChat(userId); loadSupportUsers(); };

  // بدء الصفحة الرئيسية وإنشاء الأيقونات
  loadDashboard();
  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
