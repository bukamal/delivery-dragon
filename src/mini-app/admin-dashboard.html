<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة الأدمن</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal';background:#f5f7fb;padding:16px}.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px}.tab{padding:10px 16px;background:#fff;border-radius:30px;white-space:nowrap}.active{background:#e67e22;color:#fff}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px}.btn{background:#e67e22;color:#fff;border:none;padding:8px 16px;border-radius:30px;margin:2px}.btn-danger{background:#e74c3c}table{width:100%;border-collapse:collapse}</style></head><body><h2>👑 لوحة الأدمن</h2><div class="tabs"><div class="tab active" data-tab="pending">📋 تسجيل</div><div class="tab" data-tab="orders">🛒 مراجعة</div><div class="tab" data-tab="shops">🏪 متاجر</div><div class="tab" data-tab="riders">🛵 سائقين</div><div class="tab" data-tab="cities">🌍 مدن</div><div class="tab" data-tab="finance">💰 مالية</div></div><div id="pendingPanel"></div><div id="ordersPanel" style="display:none"></div><div id="shopsPanel" style="display:none"></div><div id="ridersPanel" style="display:none"></div><div id="citiesPanel" style="display:none"></div><div id="financePanel" style="display:none"></div><script>const tg=Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';const tabs=document.querySelectorAll('.tab');tabs.forEach(t=>t.onclick=()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');['pending','orders','shops','riders','cities','finance'].forEach(p=>document.getElementById(p+'Panel').style.display='none');document.getElementById(t.dataset.tab+'Panel').style.display='block';if(t.dataset.tab==='pending')loadPending();else if(t.dataset.tab==='orders')loadPendingOrders();else if(t.dataset.tab==='shops')loadShops();else if(t.dataset.tab==='riders')loadRiders();else if(t.dataset.tab==='cities')loadCitiesZones();else if(t.dataset.tab==='finance')loadFinance()});async function loadPending(){const r=await fetch(`${API}/api/admin/pending`,{headers:{'X-Telegram-Init-Data':tg.initData}});const u=await r.json();document.getElementById('pendingPanel').innerHTML=u.map(x=>`<div class="card"><b>${x.name}</b> (${x.role})<br>📞 ${x.phone||''}<br><button class="btn" onclick="approve(${x.id})">موافقة</button></div>`).join('')||'<p>لا طلبات</p>'}window.approve=async id=>{await fetch(`${API}/api/admin/approve`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({user_id:id})});loadPending()};async function loadPendingOrders(){const r=await fetch(`${API}/api/admin/orders/pending`,{headers:{'X-Telegram-Init-Data':tg.initData}});const o=await r.json();document.getElementById('ordersPanel').innerHTML=o.map(x=>`<div class="card"><b>#${x.id}</b> - ${x.customer_name}<br>🏪 ${x.shop_name}<br>💰 ${x.total_price} ل.س<br><button class="btn" onclick="approveOrder(${x.id})">قبول</button><button class="btn btn-danger" onclick="rejectOrder(${x.id})">رفض</button></div>`).join('')||'<p>لا طلبات</p>'}window.approveOrder=async id=>{await fetch(`${API}/api/admin/orders/${id}/approve`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});loadPendingOrders()};window.rejectOrder=async id=>{await fetch(`${API}/api/admin/orders/${id}/reject`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});loadPendingOrders()};async function loadShops(){const r=await fetch(`${API}/api/admin/shops`,{headers:{'X-Telegram-Init-Data':tg.initData}});const s=await r.json();let h='<table><tr><th>المتجر</th><th>المالك</th><th></th></tr>';s.forEach(x=>{h+=`<tr><td>${x.shop_name}</td><td>${x.owner_name}</td><td><button class="btn btn-danger" onclick="deleteShop(${x.id})">حذف</button></td></tr>`});h+='</table>';document.getElementById('shopsPanel').innerHTML=h}window.deleteShop=async id=>{if(confirm('حذف؟')){await fetch(`${API}/api/admin/shops/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadShops()}};async function loadRiders(){const r=await fetch(`${API}/api/admin/riders`,{headers:{'X-Telegram-Init-Data':tg.initData}});const d=await r.json();let h='<table><tr><th>الاسم</th><th>الهاتف</th><th></th></tr>';d.forEach(x=>{h+=`<tr><td>${x.name}</td><td>${x.phone||''}</td><td><button class="btn btn-danger" onclick="deleteRider(${x.id})">حذف</button></td></tr>`});h+='</table>';document.getElementById('ridersPanel').innerHTML=h}window.deleteRider=async id=>{if(confirm('حذف؟')){await fetch(`${API}/api/admin/riders/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadRiders()}};async function loadCitiesZones(){const c=await fetch(`${API}/api/admin/cities`,{headers:{'X-Telegram-Init-Data':tg.initData}});const cities=await c.json();const z=await fetch(`${API}/api/admin/zones`,{headers:{'X-Telegram-Init-Data':tg.initData}});const zones=await z.json();document.getElementById('citiesPanel').innerHTML=`<h3>مدن</h3>${cities.map(c=>`<span class="tab">${c.name}</span>`).join('')}<h3>مناطق</h3>${zones.map(z=>`<div class="card">${z.city_name} - ${z.zone_name} (${z.base_fee} ل.س) <button class="btn btn-danger" onclick="deleteZone(${z.id})">حذف</button></div>`).join('')}`}window.deleteZone=async id=>{await fetch(`${API}/api/admin/zones/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadCitiesZones()};async function loadFinance(){const r=await fetch(`${API}/api/admin/finance`,{headers:{'X-Telegram-Init-Data':tg.initData}});const d=await r.json();document.getElementById('financePanel').innerHTML=`<p>العمولات: ${d.total_platform_fees||0} ل.س</p>`}loadPending()</script></body></html>
