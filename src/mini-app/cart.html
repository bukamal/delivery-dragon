<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | السلة</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css?v=2.0.0">
  <style>
    .cart-item { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: var(--radius-xl); padding: var(--space-4); margin-bottom: var(--space-3); display: flex; gap: var(--space-3); border: 1px solid var(--gray-200); }
    .cart-item-img { width: 60px; height: 60px; border-radius: var(--radius-lg); object-fit: cover; background: var(--gray-200); }
    .cart-item-info { flex: 1; }
    .cart-item-actions { display: flex; align-items: center; gap: var(--space-3); margin-top: var(--space-2); }
    .qty-btn { background: var(--primary); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; cursor: pointer; box-shadow: var(--shadow-md); }
    .summary { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: var(--radius-2xl); padding: var(--space-6); margin: var(--space-6) 0; box-shadow: var(--shadow-lg); }
    .locate-btn { background: var(--info); color: white; border: none; padding: var(--space-3) var(--space-4); border-radius: var(--radius-full); width: 100%; margin: var(--space-2) 0; cursor: pointer; }
    .readonly-field { background: var(--gray-100); color: var(--gray-600); }
    .zone-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .zone-chip { padding: 10px 16px; border: 1px solid var(--gray-300); border-radius: 40px; background: var(--tg-theme-secondary-bg-color, #fff); color: inherit; cursor: pointer; }
    .zone-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  </style>
</head>
<body>
<div class="app-header">
  <button class="back-btn" id="backBtn"><i data-lucide="arrow-right"></i></button>
  <h1>🦅 شاهين</h1>
</div>
<div class="container">
  <h2 style="margin-bottom: var(--space-4);"><i data-lucide="shopping-cart"></i> سلة المشتريات</h2>
  <div id="itemsContainer"><div class="skeleton" style="height:80px;"></div></div>
  <div class="summary">
    <div class="flex-between"><span>المجموع</span><span id="subtotal">0</span> ل.س</div>
    <select id="citySelect"><option>اختر المدينة</option></select>
    <label>📍 منطقة التوصيل</label>
    <div id="zoneChips" class="zone-chips">اختر المدينة أولاً</div>
    <input type="hidden" id="zoneSelect">
    <div class="flex-between"><span>التوصيل (يحسب آلياً)</span><span id="deliveryFee">0</span> ل.س</div>
    <div class="flex-between" style="font-weight:700; margin-top:10px"><span>الإجمالي</span><span id="total">0</span> ل.س</div>
    <input type="text" id="addressInput" placeholder="العنوان التفصيلي">
    <button type="button" id="locateBtn" class="locate-btn"><i data-lucide="map-pin"></i> تحديد موقع التسليم (إجباري)</button>
    <input type="hidden" id="deliveryLat">
    <input type="hidden" id="deliveryLng">
    <input type="text" id="cityDisplay" placeholder="المدينة" readonly class="readonly-field">
    <div id="locationStatus" style="font-size:0.9rem; margin-top:4px; color:var(--primary);"></div>
  </div>
  <button class="btn btn-success btn-block" id="orderBtn"><i data-lucide="check-circle"></i> تأكيد الطلب</button>
</div>
<script>
  const tg = window.Telegram.WebApp; tg.ready(); tg.BackButton.show(); tg.BackButton.onClick(() => history.back());
  document.getElementById('backBtn').onclick = () => history.back();
  const API = 'https://delivery-dragon.vercel.app';
  let cart = JSON.parse(localStorage.getItem('dragon_cart')) || [];
  if (!cart.length) location.href = 'customer-home.html';
  let deliveryFee = 0, currentTotal = 0, currentCityId = null;

  async function fetchProductImage(productId) {
    try {
      const res = await fetch(`${API}/api/shop/products/${productId}`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
      if (res.ok) { const p = await res.json(); return p.image_url; }
    } catch(e) {}
    return null;
  }

  async function render() {
    let html = '', subtotal = 0;
    for (const item of cart) {
      subtotal += item.price * item.quantity;
      const imageUrl = item.imageUrl || await fetchProductImage(item.id);
      item.imageUrl = imageUrl;
      localStorage.setItem('dragon_cart', JSON.stringify(cart));
      html += `<div class="cart-item">
        ${imageUrl ? `<img src="${imageUrl}" class="cart-item-img">` : '<div class="cart-item-img" style="display:flex; align-items:center; justify-content:center; color:#aaa;">📷</div>'}
        <div class="cart-item-info">
          <b>${item.name}</b> ${item.optionName ? '(' + item.optionName + ')' : ''}<br>
          ${item.price} ل.س
          <div class="cart-item-actions">
            <button class="qty-btn" onclick="update(${cart.indexOf(item)},-1)">−</button>
            <span>${item.quantity}</span>
            <button class="qty-btn" onclick="update(${cart.indexOf(item)},1)">+</button>
            <button class="btn btn-outline" onclick="remove(${cart.indexOf(item)})"><i data-lucide="trash-2"></i></button>
          </div>
        </div>
      </div>`;
    }
    document.getElementById('itemsContainer').innerHTML = html;
    document.getElementById('subtotal').innerText = subtotal;
    updateTotal(subtotal);
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  window.update = (i, d) => { if (cart[i].quantity + d > 0) cart[i].quantity += d; else cart.splice(i,1); localStorage.setItem('dragon_cart', JSON.stringify(cart)); render(); };
  window.remove = i => { tg.showConfirm('حذف المنتج؟', ok => { if (ok) { cart.splice(i,1); localStorage.setItem('dragon_cart', JSON.stringify(cart)); render(); } }); };

  async function loadCities() {
    const res = await fetch(`${API}/api/cities`);
    const cities = await res.json();
    const sel = document.getElementById('citySelect');
    cities.forEach(c => sel.add(new Option(c.name, c.id)));
    if (cities.length) { sel.value = cities[0].id; currentCityId = cities[0].id; loadZones(currentCityId); }
  }

  async function loadZones(cityId) {
    const container = document.getElementById('zoneChips');
    container.innerHTML = '<span>جاري تحميل المناطق...</span>';
    const res = await fetch(`${API}/api/zones?city_id=${cityId}`);
    const zones = await res.json();
    if (!zones.length) {
      container.innerHTML = '<span>⚠️ لا توجد مناطق محددة لهذه المدينة بعد.</span>';
      document.getElementById('zoneSelect').value = '';
      deliveryFee = 0;
      document.getElementById('deliveryFee').innerText = deliveryFee;
      updateTotal(parseFloat(document.getElementById('subtotal').innerText));
      return;
    }
    let html = '';
    zones.forEach((z, i) => {
      html += `<button class="zone-chip ${i===0?'active':''}" data-id="${z.id}" data-fee="${z.base_fee}">${z.zone_name} (${z.base_fee} ل.س)</button>`;
    });
    container.innerHTML = html;
    document.getElementById('zoneSelect').value = zones[0]?.id || '';
    deliveryFee = zones[0]?.base_fee || 0;
    document.getElementById('deliveryFee').innerText = deliveryFee;
    updateTotal(parseFloat(document.getElementById('subtotal').innerText));
    document.querySelectorAll('.zone-chip').forEach(chip => {
      chip.onclick = () => {
        document.querySelectorAll('.zone-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        document.getElementById('zoneSelect').value = chip.dataset.id;
        deliveryFee = parseFloat(chip.dataset.fee);
        document.getElementById('deliveryFee').innerText = deliveryFee;
        updateTotal(parseFloat(document.getElementById('subtotal').innerText));
      };
    });
  }

  function updateTotal(sub) { currentTotal = sub + deliveryFee; document.getElementById('total').innerText = currentTotal; }

  document.getElementById('citySelect').onchange = e => { currentCityId = e.target.value; loadZones(currentCityId); };

  document.getElementById('locateBtn').onclick = () => {
    if (!navigator.geolocation) { tg.showAlert('متصفحك لا يدعم تحديد الموقع'); return; }
    document.getElementById('locationStatus').innerText = 'جاري تحديد الموقع...';
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      document.getElementById('deliveryLat').value = lat;
      document.getElementById('deliveryLng').value = lng;
      document.getElementById('locationStatus').innerHTML = '✅ تم تحديد الموقع، جاري تحديد المدينة...';
      try {
        const nominatimRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`);
        const data = await nominatimRes.json();
        const city = data.address.city || data.address.town || data.address.village || data.address.state || 'غير معروفة';
        document.getElementById('cityDisplay').value = city;
        document.getElementById('locationStatus').innerHTML = `✅ تم تحديد الموقع والمدينة: ${city}`;
        tg.showPopup({ title: '✅ تم التحديد', message: `تم تحديد موقعك والمدينة: ${city}` });
      } catch (error) {
        document.getElementById('cityDisplay').value = 'غير معروفة';
        document.getElementById('locationStatus').innerHTML = '✅ تم تحديد الموقع، ولكن تعذر تحديد المدينة تلقائياً.';
      }
    }, err => { document.getElementById('locationStatus').innerText = '❌ فشل تحديد الموقع: ' + err.message; });
  };

  document.getElementById('orderBtn').onclick = async () => {
    const addr = document.getElementById('addressInput').value.trim(); if (!addr) return tg.showAlert('أدخل العنوان');
    const delivery_latitude = document.getElementById('deliveryLat').value;
    const delivery_longitude = document.getElementById('deliveryLng').value;
    if (!delivery_latitude || !delivery_longitude) return tg.showAlert('الرجاء تحديد موقع التسليم');
    const items = cart.map(i => ({ id: i.id, quantity: i.quantity }));
    const city_name = document.getElementById('cityDisplay').value;
    const zone_id = document.getElementById('zoneSelect').value;
    tg.MainButton.showProgress();
    try {
      const res = await fetch(`${API}/api/orders`, { method: 'POST', headers: { 'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData }, body: JSON.stringify({ shop_id: cart[0].shopId, items, zone_id: zone_id || null, address: addr, delivery_latitude, delivery_longitude, city_name: city_name }) });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'فشل الطلب'); }
      const data = await res.json();
      cart = []; localStorage.removeItem('dragon_cart');
      
      let paymentHtml = '';
      if (data.payment && data.payment.name && data.payment.wallet) {
        paymentHtml = `<div style="background:var(--gray-100); border-radius:var(--radius-xl); padding:20px; margin:20px 0; text-align:left; direction:ltr;">
            <p><strong>اسم المستلم:</strong> ${data.payment.name}</p>
            <p><strong>رقم المحفظة:</strong> <span id="walletNumber">${data.payment.wallet}</span> <button onclick="copyWallet()" class="btn btn-outline" style="margin-right:10px;">📋 نسخ</button></p>
            <p style="color:var(--primary);">${data.payment.instructions}</p>
          </div>`;
      }
      document.body.innerHTML = `<div style="text-align:center;padding:40px"><h2>✅ تم إنشاء الطلب #${data.order_id}</h2><p>المبلغ الإجمالي: ${currentTotal} ل.س</p>${paymentHtml}<p>📸 بعد الدفع، أرسل لقطة شاشة الإشعار في البوت</p><button class="btn btn-block" onclick="Telegram.WebApp.close()">فتح البوت</button></div>`;
      window.copyWallet = function() { const wallet = document.getElementById('walletNumber').innerText; navigator.clipboard?.writeText(wallet).then(() => tg.showPopup({ title: '✅ تم النسخ', message: 'رقم المحفظة جاهز للصق' })).catch(() => tg.showAlert('تعذر النسخ')); };
    } catch(e) { tg.MainButton.hideProgress(); tg.showAlert('❌ ' + e.message); }
  };

  render(); loadCities();
</script>
</body>
</html>
