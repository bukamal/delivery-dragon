<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | السلة</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf2 100%); color: #1e1e2f; padding-bottom:24px; }
    .app-header { display:flex; align-items:center; padding:20px 24px; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border-bottom:1px solid rgba(0,0,0,0.04); position:sticky; top:0; z-index:10; }
    .app-header h1 { font-size:2.2rem; font-weight:800; background: linear-gradient(135deg, #e67e22, #f39c12); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:12px; }
    .back-btn { background:none; border:none; color:#e67e22; font-size:2rem; cursor:pointer; }
    .container { padding:20px 16px; max-width:600px; margin:0 auto; }
    .cart-item { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border-radius:24px; padding:18px; margin-bottom:14px; display:flex; gap:14px; border:1px solid rgba(255,255,255,0.5); box-shadow:0 8px 16px -6px rgba(0,0,0,0.04); }
    .cart-item-img { width:70px; height:70px; border-radius:18px; object-fit:cover; background:#e0e4e8; }
    .cart-item-info { flex:1; }
    .cart-item-actions { display:flex; align-items:center; gap:14px; margin-top:10px; }
    .qty-btn { background:#e67e22; color:#fff; border:none; width:40px; height:40px; border-radius:50%; font-size:22px; cursor:pointer; box-shadow:0 6px 12px rgba(230,126,34,0.2); }
    .summary { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border-radius:28px; padding:26px; margin:28px 0; border:1px solid rgba(255,255,255,0.5); box-shadow:0 12px 24px -8px rgba(0,0,0,0.06); }
    input, select { width:100%; padding:16px; border-radius:60px; border:1px solid rgba(0,0,0,0.08); background:rgba(255,255,255,0.5); margin:12px 0; }
    .locate-btn { background:#3498db; color:#fff; border:none; padding:18px; border-radius:60px; width:100%; cursor:pointer; font-weight:600; box-shadow:0 8px 16px rgba(52,152,219,0.2); }
    .order-btn { background:#27ae60; color:#fff; border:none; padding:20px; border-radius:60px; width:100%; font-size:1.2rem; font-weight:700; cursor:pointer; box-shadow:0 12px 20px rgba(39,174,96,0.2); }
    .readonly-field { background:#f0f2f5; color:#64748b; }
    .skeleton { height:90px; background:linear-gradient(90deg, #e0e4e8 25%, #f0f2f5 50%, #e0e4e8 75%); background-size:200% 100%; animation:loading 1.5s infinite; border-radius:24px; }
    @keyframes loading { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
<div class="app-header">
  <button class="back-btn" id="backBtn"><i data-lucide="arrow-right"></i></button>
  <h1>🦅 شاهين</h1>
</div>
<div class="container">
  <h2 style="margin-bottom:20px;"><i data-lucide="shopping-cart"></i> سلة المشتريات</h2>
  <div id="itemsContainer"><div class="skeleton"></div></div>
  <div class="summary">
    <div style="display:flex; justify-content:space-between;"><span>المجموع</span><span id="subtotal">0</span> ل.س</div>
    <div style="display:flex; justify-content:space-between; margin-top:10px;"><span>التوصيل (يحسب آلياً)</span><span id="deliveryFee">0</span> ل.س</div>
    <div style="display:flex; justify-content:space-between; font-weight:800; margin-top:18px;"><span>الإجمالي</span><span id="total">0</span> ل.س</div>
    <input type="text" id="addressInput" placeholder="العنوان التفصيلي">
    <button type="button" id="locateBtn" class="locate-btn"><i data-lucide="map-pin"></i> تحديد موقع التسليم (إجباري)</button>
    <input type="hidden" id="deliveryLat"><input type="hidden" id="deliveryLng">
    <input type="text" id="cityDisplay" placeholder="المدينة" readonly class="readonly-field">
    <div id="locationStatus" style="font-size:0.9rem; margin-top:6px; color:#e67e22;"></div>
  </div>
  <button class="order-btn" id="orderBtn"><i data-lucide="check-circle"></i> تأكيد الطلب</button>
</div>
<script>
  const tg = Telegram.WebApp; tg.ready();
  if (tg.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(() => history.back()); }
  document.getElementById('backBtn').onclick = () => history.back();
  const API = 'https://delivery-dragon.vercel.app';
  let cart = JSON.parse(localStorage.getItem('dragon_cart')) || [];
  if (!cart.length) location.href = 'customer-home.html';
  let deliveryFee = 0, currentTotal = 0;

  async function fetchProductImage(productId) {
    try { const res = await fetch(`${API}/api/shop/products/${productId}`, { headers: { 'X-Telegram-Init-Data': tg.initData } }); if(res.ok) { const p = await res.json(); return p.image_url; } } catch(e) {}
    return null;
  }

  async function render() {
    let html = '', subtotal = 0;
    for (const item of cart) {
      subtotal += item.price * item.quantity;
      const imageUrl = item.imageUrl || await fetchProductImage(item.id);
      item.imageUrl = imageUrl;
      localStorage.setItem('dragon_cart', JSON.stringify(cart));
      html += `<div class="cart-item">
        ${imageUrl ? `<img src="${imageUrl}" class="cart-item-img">` : '<div class="cart-item-img" style="display:flex; align-items:center; justify-content:center;">📷</div>'}
        <div class="cart-item-info">
          <b>${item.name}</b> ${item.optionName ? '('+item.optionName+')' : ''}<br>
          ${item.price} ل.س
          <div class="cart-item-actions">
            <button class="qty-btn" onclick="update(${cart.indexOf(item)},-1)">−</button><span>${item.quantity}</span>
            <button class="qty-btn" onclick="update(${cart.indexOf(item)},1)">+</button>
            <button onclick="remove(${cart.indexOf(item)})"><i data-lucide="trash-2"></i></button>
          </div>
        </div>
      </div>`;
    }
    document.getElementById('itemsContainer').innerHTML = html;
    document.getElementById('subtotal').innerText = subtotal;
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  window.update = (i, d) => { if (cart[i].quantity + d > 0) cart[i].quantity += d; else cart.splice(i,1); localStorage.setItem('dragon_cart', JSON.stringify(cart)); render(); };
  window.remove = i => { tg.showConfirm('حذف المنتج؟', ok => { if(ok) { cart.splice(i,1); localStorage.setItem('dragon_cart', JSON.stringify(cart)); render(); } }); };

  document.getElementById('locateBtn').onclick = () => {
    if (!navigator.geolocation) { tg.showAlert('متصفحك لا يدعم تحديد الموقع'); return; }
    document.getElementById('locationStatus').innerText = 'جاري تحديد الموقع...';
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      document.getElementById('deliveryLat').value = lat;
      document.getElementById('deliveryLng').value = lng;
      document.getElementById('locationStatus').innerHTML = '✅ تم تحديد الموقع، جاري تحديد المدينة...';
      try {
        const nominatimRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`);
        const data = await nominatimRes.json();
        const city = data.address.city || data.address.town || data.address.village || data.address.state || 'غير معروفة';
        document.getElementById('cityDisplay').value = city;
        document.getElementById('locationStatus').innerHTML = `✅ تم تحديد الموقع والمدينة: ${city}`;
        tg.showPopup({ title:'✅ تم التحديد', message:`تم تحديد موقعك والمدينة: ${city}` });
      } catch (error) { document.getElementById('cityDisplay').value = 'غير معروفة'; }
    }, err => { document.getElementById('locationStatus').innerText = '❌ فشل تحديد الموقع: ' + err.message; });
  };

  document.getElementById('orderBtn').onclick = async () => {
    const addr = document.getElementById('addressInput').value.trim(); if(!addr) return tg.showAlert('أدخل العنوان');
    const delivery_latitude = document.getElementById('deliveryLat').value;
    const delivery_longitude = document.getElementById('deliveryLng').value;
    if(!delivery_latitude || !delivery_longitude) return tg.showAlert('الرجاء تحديد موقع التسليم');
    const items = cart.map(i => ({ id: i.id, quantity: i.quantity }));
    const city_name = document.getElementById('cityDisplay').value;
    tg.MainButton.showProgress();
    try {
      const res = await fetch(`${API}/api/orders`, { method:'POST', headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify({ shop_id: cart[0].shopId, items, address: addr, delivery_latitude, delivery_longitude, city_name }) });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'فشل الطلب'); }
      const data = await res.json();
      cart = []; localStorage.removeItem('dragon_cart');
      let paymentHtml = '';
      if (data.payment?.name && data.payment?.wallet) {
        paymentHtml = `<div style="background:#f8f9fa; border-radius:24px; padding:22px; margin:24px 0; text-align:left; direction:ltr;">
          <p><strong>اسم المستلم:</strong> ${data.payment.name}</p>
          <p><strong>رقم المحفظة:</strong> <span id="walletNumber">${data.payment.wallet}</span> <button onclick="copyWallet()" style="background:#e67e22; color:#fff; border:none; padding:8px 16px; border-radius:30px;">📋 نسخ</button></p>
          <p style="color:#e67e22;">${data.payment.instructions}</p>
        </div>`;
      }
      document.body.innerHTML = `<div style="text-align:center;padding:48px"><h2>✅ تم إنشاء الطلب #${data.order_id}</h2><p>المبلغ: ${currentTotal} ل.س</p>${paymentHtml}<p>📸 أرسل لقطة الدفع في البوت</p><button class="order-btn" onclick="Telegram.WebApp.close()">فتح البوت</button></div>`;
      window.copyWallet = function() { const wallet = document.getElementById('walletNumber').innerText; navigator.clipboard?.writeText(wallet).then(() => tg.showPopup({ title:'✅ تم النسخ', message:'رقم المحفظة جاهز للصق' })).catch(() => tg.showAlert('تعذر النسخ')); };
    } catch(e) { tg.MainButton.hideProgress(); tg.showAlert('❌ ' + e.message); }
  };
  render();
</script>
</body>
</html>
