<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين | السلة</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);padding:16px;color:var(--tg-theme-text-color,#1e1e2f)}.cart-item{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:20px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.03))}.item-controls{display:flex;align-items:center;gap:12px}.qty-btn{background:#e67e22;color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer}.summary{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:24px;padding:20px;margin:20px 0}select,input{width:100%;padding:16px;border-radius:16px;border:1px solid #ccc;margin:8px 0;background:var(--tg-theme-bg-color,#fff);color:inherit}.order-btn{background:#27ae60;color:#fff;border:none;padding:18px;border-radius:60px;width:100%;font-size:1.2rem;font-weight:700;cursor:pointer}.instruction-box{background:var(--tg-theme-secondary-bg-color,#f8f9fa);padding:16px;border-radius:12px;margin:20px 0}.skeleton-cart{height:70px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px;margin-bottom:12px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><button onclick="history.back()" style="background:transparent;border:none;color:#e67e22;font-size:1.2rem">← العودة</button><h2>🛒 سلة المشتريات</h2><div id="itemsContainer"><div class="skeleton-cart"></div><div class="skeleton-cart"></div></div><div class="summary"><div style="display:flex;justify-content:space-between"><span>المجموع</span><span id="subtotal">0</span> ل.س</div><select id="citySelect"><option value="">اختر المدينة...</option></select><select id="zoneSelect" disabled><option>اختر المدينة أولاً</option></select><div style="display:flex;justify-content:space-between"><span>التوصيل</span><span id="deliveryFee">0</span> ل.س</div><div style="display:flex;justify-content:space-between;font-weight:700;margin-top:10px"><span>الإجمالي</span><span id="total">0</span> ل.س</div><input type="text" id="addressInput" placeholder="العنوان التفصيلي"><button class="order-btn" id="orderBtn">🚀 تأكيد الطلب</button></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';let cart=JSON.parse(localStorage.getItem('dragon_cart'))||[];if(!cart.length){document.body.innerHTML='<h2>السلة فارغة</h2><a href="customer-home.html">تصفح المطاعم</a>'}let deliveryFee=0;let currentTotal=0;let currentCityId=null;function render(){let html='',subtotal=0;cart.forEach((item,idx)=>{subtotal+=item.price*item.quantity;html+=`<div class="cart-item"><div><b>${item.name}</b><br>${item.price} ل.س</div><div class="item-controls"><button class="qty-btn" onclick="updateQty(${idx},-1)">−</button><span>${item.quantity}</span><button class="qty-btn" onclick="updateQty(${idx},1)">+</button><button onclick="removeItem(${idx})">🗑️</button></div></div>`});document.getElementById('itemsContainer').innerHTML=html;document.getElementById('subtotal').innerText=subtotal;updateTotal(subtotal)}window.updateQty=(i,d)=>{if(cart[i].quantity+d>0)cart[i].quantity+=d;else cart.splice(i,1);localStorage.setItem('dragon_cart',JSON.stringify(cart));render()};window.removeItem=i=>{tg.showConfirm('إزالة المنتج من السلة؟',confirmed=>{if(confirmed){cart.splice(i,1);localStorage.setItem('dragon_cart',JSON.stringify(cart));render()}})};async function loadCities(){try{const res=await fetch(`${API}/api/cities`);if(!res.ok)throw new Error('تعذر تحميل المدن');const cities=await res.json();const sel=document.getElementById('citySelect');cities.forEach(c=>sel.add(new Option(c.name,c.id)));if(cities.length){sel.value=cities[0].id;currentCityId=cities[0].id;loadZones(currentCityId)}}catch(e){tg.showAlert(`⚠️ ${e.message}`)}}document.getElementById('citySelect').addEventListener('change',e=>{currentCityId=e.target.value;loadZones(currentCityId)});async function loadZones(cityId){const zoneSel=document.getElementById('zoneSelect');zoneSel.innerHTML='<option>جاري التحميل...</option>';zoneSel.disabled=true;try{const res=await fetch(`${API}/api/zones?city_id=${cityId}`);if(!res.ok)throw new Error('تعذر تحميل المناطق');const zones=await res.json();zoneSel.innerHTML='';zones.forEach(z=>zoneSel.add(new Option(`${z.zone_name} (${z.base_fee} ل.س)`,z.id)));if(zones.length){deliveryFee=zones[0].base_fee;document.getElementById('deliveryFee').innerText=deliveryFee}zoneSel.disabled=false;updateTotal(parseFloat(document.getElementById('subtotal').innerText))}catch(e){zoneSel.innerHTML='<option>خطأ في التحميل</option>';tg.showAlert(`⚠️ ${e.message}`)}}document.getElementById('zoneSelect').addEventListener('change',e=>{deliveryFee=parseFloat(e.target.options[e.target.selectedIndex].text.match(/\d+/)[0]);document.getElementById('deliveryFee').innerText=deliveryFee;updateTotal(parseFloat(document.getElementById('subtotal').innerText))});function updateTotal(sub){currentTotal=sub+deliveryFee;document.getElementById('total').innerText=currentTotal}document.getElementById('orderBtn').onclick=async()=>{const addr=document.getElementById('addressInput').value.trim();if(!addr)return tg.showAlert('أدخل العنوان');if(!currentCityId)return tg.showAlert('اختر المدينة');const zoneId=document.getElementById('zoneSelect').value;const items=cart.map(i=>({id:i.id,quantity:i.quantity}));tg.MainButton.showProgress();try{const res=await fetch(`${API}/api/orders`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({shop_id:cart[0].shopId,items,zone_id:zoneId,address:addr,city_id:currentCityId})});if(!res.ok){const err=await res.json();throw new Error(err.error||'فشل الطلب')}const data=await res.json();cart=[];localStorage.removeItem('dragon_cart');document.body.innerHTML=`<div style="text-align:center;padding:40px 20px"><h2>✅ تم إنشاء الطلب #${data.order_id}</h2><p style="margin:20px 0">المبلغ: ${currentTotal} ل.س</p><div class="instruction-box"><p style="font-weight:bold">📸 الخطوة التالية:</p><p>اسحب التطبيق للأسفل (لتصغيره) ثم أرسل لقطة شاشة الدفع في محادثة البوت.</p></div><button class="order-btn" onclick="window.Telegram.WebApp.close()">🚀 فتح البوت الآن</button><p style="margin-top:16px;color:var(--tg-theme-hint-color,#666)">أو اسحب للأسفل لتصغير التطبيق</p></div>`}catch(e){tg.MainButton.hideProgress();tg.showAlert(`❌ ${e.message}`)}};render();loadCities()</script></body></html>
