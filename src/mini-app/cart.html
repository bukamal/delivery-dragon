<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>السلة</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>body{font-family:'Segoe UI'; padding:16px; background:#f4f6f9;} .item{background:white; border-radius:12px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between;} .summary{background:white; border-radius:16px; padding:16px; margin:20px 0;} input,select{width:100%; padding:14px; border-radius:12px; border:1px solid #ccc; margin-bottom:12px;} .btn{background:#27ae60; color:white; padding:16px; border:none; border-radius:60px; width:100%; font-size:18px;}</style></head>
<body><a href="customer-home.html">← العودة</a><h2>🛒 سلة المشتريات</h2><div id="items"></div><div class="summary"><div>المجموع: <span id="subtotal">0</span> ل.س</div><div><label>📍 المنطقة</label><select id="zone"></select></div><div>التوصيل: <span id="fee">0</span> ل.س</div><div><b>الإجمالي: <span id="total">0</span> ل.س</b></div><input id="address" placeholder="العنوان التفصيلي"><button class="btn" id="orderBtn">🚀 تأكيد الطلب والدفع</button></div>
<script>
    const tg = window.Telegram.WebApp; tg.ready();
    const API = window.location.origin;
    let cart = JSON.parse(localStorage.getItem('dragon_cart')) || [];
    if (!cart.length) { document.body.innerHTML = '<h2>السلة فارغة</h2><a href="customer-home.html">تصفح المطاعم</a>'; }
    let zones = [], deliveryFee = 0;
    
    function render() {
        let html = '', subtotal = 0;
        cart.forEach((item, idx) => {
            subtotal += item.price * item.quantity;
            html += `<div class="item"><div><b>${item.name}</b><br>${item.price} ل.س</div><div><button onclick="changeQty(${idx},-1)">−</button> ${item.quantity} <button onclick="changeQty(${idx},1)">+</button> <button onclick="removeItem(${idx})">🗑️</button></div></div>`;
        });
        document.getElementById('items').innerHTML = html;
        document.getElementById('subtotal').innerText = subtotal;
        updateTotal(subtotal);
    }
    window.changeQty = (i, d) => {
        if (cart[i].quantity + d > 0) cart[i].quantity += d;
        else cart.splice(i, 1);
        localStorage.setItem('dragon_cart', JSON.stringify(cart));
        render();
    };
    window.removeItem = (i) => { cart.splice(i, 1); localStorage.setItem('dragon_cart', JSON.stringify(cart)); render(); };
    
    async function loadZones() {
        const res = await fetch(`${API}/api/zones`);
        zones = await res.json();
        const sel = document.getElementById('zone');
        zones.forEach(z => sel.add(new Option(`${z.zone_name} (${z.base_fee} ل.س)`, z.id)));
        deliveryFee = zones[0]?.base_fee || 0;
        document.getElementById('fee').innerText = deliveryFee;
        sel.onchange = (e) => {
            deliveryFee = parseFloat(sel.options[sel.selectedIndex].text.match(/\d+/)[0]);
            document.getElementById('fee').innerText = deliveryFee;
            updateTotal(parseFloat(document.getElementById('subtotal').innerText));
        };
    }
    function updateTotal(sub) { document.getElementById('total').innerText = sub + deliveryFee; }
    
    document.getElementById('orderBtn').onclick = async () => {
        const addr = document.getElementById('address').value.trim();
        if (!addr) return tg.showAlert('أدخل العنوان');
        const zoneId = document.getElementById('zone').value;
        const items = cart.map(i => ({ id: i.id, quantity: i.quantity }));
        const res = await fetch(`${API}/api/orders`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData },
            body: JSON.stringify({ shop_id: cart[0].shopId, items, zone_id: zoneId, address: addr })
        });
        const data = await res.json();
        if (data.order_id) {
            cart = [];
            localStorage.removeItem('dragon_cart');
            tg.showAlert(`طلب #${data.order_id}. تابع الدفع.`);
            tg.close();
        } else {
            tg.showAlert('خطأ في إنشاء الطلب');
        }
    };
    render();
    loadZones();
</script></body></html>
