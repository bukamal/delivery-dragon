<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - السلة</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:#f5f7fa;padding:16px;color:#1e1e2f}.cart-item{background:#fff;border-radius:20px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}.item-controls{display:flex;align-items:center;gap:12px}.qty-btn{background:#e67e22;color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer}.summary{background:#fff;border-radius:24px;padding:20px;margin:20px 0}select,input{width:100%;padding:16px;border-radius:16px;border:1px solid #ccc;margin:8px 0}.order-btn{background:#27ae60;color:#fff;border:none;padding:18px;border-radius:60px;width:100%;font-size:1.2rem;font-weight:700;cursor:pointer}</style></head><body><button onclick="history.back()" style="background:0 0;border:none;color:#e67e22;font-size:1.2rem">← العودة</button><h2>🛒 سلة المشتريات</h2><div id="itemsContainer"></div><div class="summary"><div style="display:flex;justify-content:space-between"><span>المجموع</span><span id="subtotal">0</span> ل.س</div><select id="zoneSelect"></select><div style="display:flex;justify-content:space-between"><span>التوصيل</span><span id="deliveryFee">0</span> ل.س</div><div style="display:flex;justify-content:space-between;font-weight:700;margin-top:10px"><span>الإجمالي</span><span id="total">0</span> ل.س</div><input type="text" id="addressInput" placeholder="العنوان التفصيلي"><button class="order-btn" id="orderBtn">🚀 تأكيد الطلب</button></div><script>const tg=window.Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';let cart=JSON.parse(localStorage.getItem('dragon_cart'))||[];if(!cart.length){document.body.innerHTML='<h2>السلة فارغة</h2><a href="customer-home.html">تصفح المطاعم</a>'}let deliveryFee=0;function render(){let html='',subtotal=0;cart.forEach((item,idx)=>{subtotal+=item.price*item.quantity;html+=`<div class="cart-item"><div><b>${item.name}</b><br>${item.price} ل.س</div><div class="item-controls"><button class="qty-btn" onclick="updateQty(${idx},-1)">−</button><span>${item.quantity}</span><button class="qty-btn" onclick="updateQty(${idx},1)">+</button><button onclick="removeItem(${idx})">🗑️</button></div></div>`});document.getElementById('itemsContainer').innerHTML=html;document.getElementById('subtotal').innerText=subtotal;updateTotal(subtotal)}window.updateQty=(i,d)=>{if(cart[i].quantity+d>0)cart[i].quantity+=d;else cart.splice(i,1);localStorage.setItem('dragon_cart',JSON.stringify(cart));render()};window.removeItem=i=>{cart.splice(i,1);localStorage.setItem('dragon_cart',JSON.stringify(cart));render()};async function loadZones(){const res=await fetch(`${API}/api/zones`);const zones=await res.json();const sel=document.getElementById('zoneSelect');zones.forEach(z=>sel.add(new Option(`${z.zone_name} (${z.base_fee} ل.س)`,z.id)));if(zones.length){deliveryFee=zones[0].base_fee;document.getElementById('deliveryFee').innerText=deliveryFee}sel.onchange=e=>{deliveryFee=parseFloat(sel.options[sel.selectedIndex].text.match(/\d+/)[0]);document.getElementById('deliveryFee').innerText=deliveryFee;updateTotal(parseFloat(document.getElementById('subtotal').innerText))}}function updateTotal(sub){document.getElementById('total').innerText=sub+deliveryFee}document.getElementById('orderBtn').onclick=async()=>{const addr=document.getElementById('addressInput').value.trim();if(!addr)return tg.showAlert('أدخل العنوان');const zoneId=document.getElementById('zoneSelect').value;const items=cart.map(i=>({id:i.id,quantity:i.quantity}));const res=await fetch(`${API}/api/orders`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({shop_id:cart[0].shopId,items,zone_id:zoneId,address:addr})});if(res.ok){const data=await res.json();cart=[];localStorage.removeItem('dragon_cart');tg.showAlert(`تم إنشاء الطلب #${data.order_id}. الرجاء إرسال لقطة شاشة الدفع للبوت.`);tg.close()}else{const err=await res.json();tg.showAlert(`❌ خطأ: ${err.error||'فشل الطلب'}`)}};render();loadZones()</script></body></html>
