<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | السلة</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);color:var(--tg-theme-text-color,#1a1a2c);padding:0 0 30px}.app-header{display:flex;align-items:center;padding:16px 20px;background:var(--tg-theme-secondary-bg-color,#fff);border-bottom:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.05));position:sticky;top:0;z-index:10}.app-header h1{font-size:1.8rem;font-weight:700;color:#e67e22;margin-right:16px}.back-btn{background:0 0;border:none;color:#e67e22;font-size:1.5rem;cursor:pointer;padding:8px}.container{padding:20px 16px;max-width:600px;margin:0 auto}.cart-item{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:20px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}.qty-btn{background:#e67e22;color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer}.summary{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:24px;padding:24px;margin:24px 0}select,input{width:100%;padding:16px;border-radius:16px;border:1px solid #ccc;margin:12px 0;background:var(--tg-theme-bg-color,#fff);color:inherit}.order-btn{background:#27ae60;color:#fff;border:none;padding:18px;border-radius:60px;width:100%;font-size:1.2rem;font-weight:700;cursor:pointer}.skeleton{height:80px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="app-header"><button class="back-btn" onclick="history.back()">←</button><h1>🦅 شاهين</h1></div><div class="container"><h2>🛒 السلة</h2><div id="itemsContainer"><div class="skeleton"></div></div><div class="summary"><div style="display:flex;justify-content:space-between"><span>المجموع</span><span id="subtotal">0</span> ل.س</div><select id="citySelect"><option>اختر المدينة</option></select><select id="zoneSelect" disabled><option>اختر المدينة أولاً</option></select><div style="display:flex;justify-content:space-between"><span>التوصيل</span><span id="deliveryFee">0</span> ل.س</div><div style="display:flex;justify-content:space-between;font-weight:700;margin-top:10px"><span>الإجمالي</span><span id="total">0</span> ل.س</div><input id="addressInput" placeholder="العنوان التفصيلي"></div><button class="order-btn" id="orderBtn">🚀 تأكيد الطلب</button></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';let cart=JSON.parse(localStorage.getItem('dragon_cart'))||[];if(!cart.length)location='customer-home.html';let deliveryFee=0,currentTotal=0,cityId=null;function render(){let h='',sub=0;cart.forEach((i,idx)=>{sub+=i.price*i.quantity;h+=`<div class="cart-item"><div><b>${i.name}</b><br>${i.price} ل.س</div><div style="display:flex;gap:12px"><button class="qty-btn" onclick="update(${idx},-1)">−</button><span>${i.quantity}</span><button class="qty-btn" onclick="update(${idx},1)">+</button><button onclick="remove(${idx})">🗑️</button></div></div>`});document.getElementById('itemsContainer').innerHTML=h;document.getElementById('subtotal').innerText=sub;updateTotal(sub)}window.update=(i,d)=>{if(cart[i].quantity+d>0)cart[i].quantity+=d;else cart.splice(i,1);localStorage.setItem('dragon_cart',JSON.stringify(cart));render()};window.remove=i=>{tg.showConfirm('حذف؟',ok=>{if(ok){cart.splice(i,1);localStorage.setItem('dragon_cart',JSON.stringify(cart));render()}})};async function loadCities(){const r=await fetch(`${API}/api/cities`);const cities=await r.json();const s=document.getElementById('citySelect');cities.forEach(c=>s.add(new Option(c.name,c.id)));if(cities.length){s.value=cities[0].id;cityId=cities[0].id;loadZones(cityId)}}async function loadZones(id){const s=document.getElementById('zoneSelect');s.innerHTML='<option>جاري التحميل...</option>';const r=await fetch(`${API}/api/zones?city_id=${id}`);const zones=await r.json();s.innerHTML='';zones.forEach(z=>s.add(new Option(`${z.zone_name} (${z.base_fee} ل.س)`,z.id)));if(zones.length){deliveryFee=zones[0].base_fee;document.getElementById('deliveryFee').innerText=deliveryFee;updateTotal(parseFloat(document.getElementById('subtotal').innerText))}s.disabled=false}function updateTotal(sub){currentTotal=sub+deliveryFee;document.getElementById('total').innerText=currentTotal}document.getElementById('citySelect').onchange=e=>{cityId=e.target.value;loadZones(cityId)};document.getElementById('zoneSelect').onchange=e=>{deliveryFee=parseFloat(e.target.options[e.target.selectedIndex].text.match(/\d+/)[0]);document.getElementById('deliveryFee').innerText=deliveryFee;updateTotal(parseFloat(document.getElementById('subtotal').innerText))};document.getElementById('orderBtn').onclick=async()=>{const addr=document.getElementById('addressInput').value.trim();if(!addr)return tg.showAlert('أدخل العنوان');if(!cityId)return tg.showAlert('اختر مدينة');const zone=document.getElementById('zoneSelect').value;const items=cart.map(i=>({id:i.id,quantity:i.quantity}));tg.MainButton.showProgress();try{const r=await fetch(`${API}/api/orders`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({shop_id:cart[0].shopId,items,zone_id:zone,address:addr,city_id:cityId})});if(!r.ok)throw new Error((await r.json()).error);const d=await r.json();cart=[];localStorage.removeItem('dragon_cart');document.body.innerHTML=`<div style="text-align:center;padding:40px"><h2>✅ تم الطلب #${d.order_id}</h2><p>${currentTotal} ل.س</p><p>📸 أرسل لقطة الدفع في البوت</p><button class="order-btn" onclick="Telegram.WebApp.close()">فتح البوت</button></div>`}catch(e){tg.MainButton.hideProgress();tg.showAlert('❌ '+e.message)}};render();loadCities()</script></body></html>
