<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - المطاعم</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f8f9fc);color:var(--tg-theme-text-color,#1e1e2f);padding:16px 16px 90px}.header{display:flex;align-items:center;gap:10px;margin-bottom:16px}.header h2{font-size:1.8rem;color:#d35400}.city-selector{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:30px;padding:12px 20px;margin-bottom:16px;border:1px solid #ddd}select{width:100%;padding:12px;border-radius:30px;border:1px solid #ccc;background:0 0;color:inherit}.search-bar{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:30px;padding:12px 20px;margin-bottom:20px;display:flex;gap:12px;border:1px solid #ddd}.search-bar input{flex:1;border:none;background:0 0;outline:0;color:inherit}.shop-grid{display:grid;gap:16px}.shop-card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:24px;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.02);display:flex;align-items:center;gap:16px;cursor:pointer;transition:.2s}.shop-card:active{transform:scale(.98);background:#f0f0f0}.shop-icon{font-size:40px;background:#f0f2f5;width:60px;height:60px;border-radius:20px;display:flex;align-items:center;justify-content:center}.shop-info h3{font-size:1.2rem;margin-bottom:4px}.shop-info p{color:#666;font-size:.9rem}.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#1e1e2f;color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}.cart-btn{background:#e67e22;border:none;color:#fff;padding:12px 28px;border-radius:40px;font-weight:700;cursor:pointer}.skeleton-shop{height:90px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:24px;margin-bottom:16px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="header"><h2>🦅 شاهين</h2><span style="color:#e67e22">نحن أسرع إليك</span></div><div class="city-selector"><select id="citySelect"><option value="">اختر المدينة...</option></select></div><div class="search-bar"><span>🔍</span><input type="text" id="searchInput" placeholder="ابحث عن مطعم..."></div><div class="shop-grid" id="shopsContainer"><div class="skeleton-shop"></div><div class="skeleton-shop"></div><div class="skeleton-shop"></div></div><div class="cart-bar"><span>🛒 السلة (<span id="cartCount">0</span>)</span><button class="cart-btn" id="viewCartBtn">عرض السلة</button></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();const API='https://delivery-dragon.vercel.app';let shops=[];let cart=JSON.parse(localStorage.getItem('dragon_cart'))||[];let currentCityId=null;function updateCartCount(){document.getElementById('cartCount').innerText=cart.reduce((s,i)=>s+i.quantity,0)}async function loadCities(){try{const res=await fetch(`${API}/api/cities`);if(!res.ok)throw new Error('تعذر تحميل المدن');const cities=await res.json();const sel=document.getElementById('citySelect');cities.forEach(c=>sel.add(new Option(c.name,c.id)));if(cities.length){sel.value=cities[0].id;currentCityId=cities[0].id;loadShops()}}catch(e){document.getElementById('shopsContainer').innerHTML=`<p style="color:red">⚠️ ${e.message}</p>`}}document.getElementById('citySelect').addEventListener('change',e=>{currentCityId=e.target.value;loadShops()});async function loadShops(){if(!currentCityId)return;try{const res=await fetch(`${API}/api/shops?city_id=${currentCityId}`);if(!res.ok)throw new Error('تعذر تحميل المطاعم');shops=await res.json();renderShops(shops)}catch(e){document.getElementById('shopsContainer').innerHTML=`<p style="color:red">⚠️ ${e.message}<br><button onclick="loadShops()" style="margin-top:12px;padding:8px 20px;background:#e67e22;color:white;border:none;border-radius:30px;">إعادة المحاولة</button></p>`}}function renderShops(filtered){const html=filtered.map(s=>`<div class="shop-card" onclick="location.href='shop-menu.html?id=${s.id}&name=${encodeURIComponent(s.shop_name)}'"><div class="shop-icon">${s.icon||'🏪'}</div><div class="shop-info"><h3>${s.shop_name}</h3><p>${s.address||''}</p></div></div>`).join('');document.getElementById('shopsContainer').innerHTML=html||'<p>لا توجد نتائج</p>'}document.getElementById('searchInput').addEventListener('input',e=>{renderShops(shops.filter(s=>s.shop_name.toLowerCase().includes(e.target.value.toLowerCase())))});document.getElementById('viewCartBtn').onclick=()=>location.href='cart.html';loadCities();updateCartCount()</script></body></html>
