<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | استكشف المتاجر</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: var(--tg-theme-bg-color, #f0f2f5); color: var(--tg-theme-text-color, #1e1e2f); padding-bottom:80px; }
    .app-header { display:flex; align-items:center; padding:16px 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom:1px solid rgba(0,0,0,0.05); position:sticky; top:0; z-index:10; }
    .app-header h1 { font-size:2rem; font-weight:700; color:#e67e22; margin-right:12px; }
    .back-btn { background:none; border:none; color:#e67e22; font-size:2rem; cursor:pointer; display:flex; align-items:center; }
    .container { padding:16px; max-width:600px; margin:0 auto; }
    .city-chip { background:rgba(255,255,255,0.7); backdrop-filter:blur(8px); border-radius:40px; padding:4px 4px 4px 20px; margin-bottom:20px; border:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; }
    .city-chip select { flex:1; padding:12px 0; border:none; background:transparent; color:inherit; font-family:inherit; outline:none; font-weight:500; }
    .search-box { background:rgba(255,255,255,0.7); backdrop-filter:blur(8px); border-radius:40px; padding:8px 20px; margin-bottom:24px; display:flex; align-items:center; border:1px solid rgba(0,0,0,0.05); }
    .search-box input { flex:1; border:none; background:transparent; outline:none; font-family:inherit; padding:12px 0; }
    .filter-chips { display:flex; gap:8px; overflow-x:auto; padding:4px 0 16px; }
    .filter-chip { padding:8px 16px; background:rgba(255,255,255,0.7); backdrop-filter:blur(4px); border-radius:40px; white-space:nowrap; border:1px solid rgba(0,0,0,0.05); cursor:pointer; font-weight:500; }
    .filter-chip.active { background:#e67e22; color:#fff; border-color:#e67e22; }
    .shop-grid { display:grid; gap:16px; }
    .shop-card { background:rgba(255,255,255,0.7); backdrop-filter:blur(12px); border-radius:24px; padding:16px; display:flex; align-items:center; gap:16px; cursor:pointer; border:1px solid rgba(255,255,255,0.5); box-shadow:0 8px 20px rgba(0,0,0,0.02); transition:0.2s; }
    .shop-card:active { transform:scale(0.98); background:rgba(255,255,255,0.9); }
    .shop-icon { font-size:44px; background:var(--tg-theme-bg-color, #fff); width:70px; height:70px; border-radius:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 8px rgba(0,0,0,0.02); }
    .shop-info h3 { font-size:1.2rem; margin-bottom:4px; }
    .shop-info p { color:#7f8c8d; font-size:0.9rem; display:flex; align-items:center; gap:4px; }
    .favorite-btn { background:none; border:none; font-size:24px; cursor:pointer; margin-left:8px; }
    .cart-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(30,30,47,0.9); backdrop-filter:blur(12px); color:#fff; padding:12px 24px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(255,255,255,0.1); z-index:15; }
    .cart-btn { background:#e67e22; border:none; color:#fff; padding:12px 32px; border-radius:60px; font-weight:700; cursor:pointer; }
    .skeleton { height:100px; background:linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%); background-size:200% 100%; animation:loading 1.5s infinite; border-radius:24px; }
    @keyframes loading { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .empty-state { text-align:center; padding:40px; color:#95a5a6; }
    .pull-indicator { text-align:center; padding:8px; color:#95a5a6; font-size:0.9rem; }
  </style>
</head>
<body>
<div class="app-header">
  <button class="back-btn" id="backBtn"><i data-lucide="arrow-right"></i></button>
  <h1>🦅 شاهين</h1>
</div>
<div class="container" id="pullContainer">
  <div class="pull-indicator" id="pullIndicator">↓ اسحب للتحديث</div>
  <div class="city-chip">
    <select id="citySelect"><option value="">اختر المدينة...</option></select>
  </div>
  <div class="filter-chips" id="categoryFilter"></div>
  <div class="search-box">
    <i data-lucide="search"></i>
    <input type="text" id="searchInput" placeholder="ابحث عن متجر...">
  </div>
  <div class="shop-grid" id="shopsContainer">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div>
<div class="cart-bar">
  <span><i data-lucide="shopping-cart"></i> السلة (<span id="cartCount">0</span>)</span>
  <button class="cart-btn" id="viewCartBtn">عرض السلة</button>
</div>
<script>
  const tg = Telegram.WebApp; tg.ready(); tg.expand();
  if (tg.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(() => window.history.back()); }
  document.getElementById('backBtn').onclick = () => window.history.back();
  const API = 'https://delivery-dragon.vercel.app';
  let shops = [], categories = [], cart = JSON.parse(localStorage.getItem('dragon_cart')) || [], currentCityId = null, selectedCategory = null;
  let favorites = JSON.parse(localStorage.getItem('shahin_favorites')) || [];
  let touchStartY = 0, pullDistance = 0, isPulling = false;
  const container = document.getElementById('pullContainer');
  const indicator = document.getElementById('pullIndicator');

  function showToast(msg) { /* ... */ }
  function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantity,0); }
  async function loadCategories() { const r = await fetch(`${API}/api/categories`); categories = await r.json(); renderCategoryFilters(); }
  function renderCategoryFilters() {
    const cont = document.getElementById('categoryFilter');
    cont.innerHTML = `<div class="filter-chip ${!selectedCategory?'active':''}" onclick="filterByCategory(null)">الكل</div>`;
    categories.forEach(c => cont.innerHTML += `<div class="filter-chip ${selectedCategory===c.id?'active':''}" onclick="filterByCategory(${c.id})">${c.icon} ${c.name}</div>`);
  }
  window.filterByCategory = (catId) => { selectedCategory = catId; renderCategoryFilters(); loadShops(); };
  async function loadCities() {
    const res = await fetch(`${API}/api/cities`); const cities = await res.json();
    const sel = document.getElementById('citySelect'); cities.forEach(c => sel.add(new Option(c.name, c.id)));
    if (cities.length) { sel.value = cities[0].id; currentCityId = cities[0].id; loadShops(); }
  }
  async function loadShops() {
    if (!currentCityId) return;
    const cont = document.getElementById('shopsContainer');
    cont.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    let url = `${API}/api/shops?city_id=${currentCityId}`;
    if (selectedCategory) url += `&category_id=${selectedCategory}`;
    const res = await fetch(url); shops = await res.json();
    renderShops(shops);
  }
  function renderShops(list) {
    const cont = document.getElementById('shopsContainer');
    if (!list.length) { cont.innerHTML = '<div class="empty-state">😕 لا توجد متاجر</div>'; return; }
    cont.innerHTML = list.map(s => {
      const isFav = favorites.includes(s.id);
      return `<div class="shop-card" onclick="location.href='shop-menu.html?id=${s.id}&name=${encodeURIComponent(s.shop_name)}'">
        <div class="shop-icon">${s.icon || '🏪'}</div>
        <div class="shop-info" style="flex:1"><h3>${s.shop_name}</h3><p>📍 ${s.address || ''}</p></div>
        <button class="favorite-btn" onclick="event.stopPropagation(); toggleFavorite(${s.id})">${isFav?'❤️':'🤍'}</button>
      </div>`;
    }).join('');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  window.toggleFavorite = (shopId) => {
    if (favorites.includes(shopId)) favorites = favorites.filter(id => id !== shopId);
    else favorites.push(shopId);
    localStorage.setItem('shahin_favorites', JSON.stringify(favorites));
    renderShops(shops);
  };
  document.getElementById('citySelect').onchange = e => { currentCityId = e.target.value; loadShops(); };
  document.getElementById('searchInput').oninput = e => renderShops(shops.filter(s => s.shop_name.includes(e.target.value)));
  document.getElementById('viewCartBtn').onclick = () => location.href = 'cart.html';

  // Pull to refresh
  container.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  container.addEventListener('touchmove', e => {
    if (window.scrollY > 0) return;
    const currentY = e.touches[0].clientY;
    pullDistance = Math.max(0, currentY - touchStartY);
    if (pullDistance > 20 && !isPulling) { isPulling = true; indicator.style.opacity = '1'; }
    if (isPulling) { indicator.innerText = pullDistance > 60 ? '✓ حرر للتحديث' : '↓ اسحب للتحديث'; e.preventDefault(); }
  }, { passive: false });
  container.addEventListener('touchend', () => {
    if (isPulling && pullDistance > 60) { loadShops(); }
    indicator.innerText = '↓ اسحب للتحديث'; indicator.style.opacity = '0.5';
    isPulling = false; pullDistance = 0;
  });

  loadCategories(); loadCities(); updateCartCount();
</script>
</body>
</html>
