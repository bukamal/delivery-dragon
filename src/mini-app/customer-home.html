<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | المتاجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);color:var(--tg-theme-text-color,#1a1a2c);padding:0 0 90px}.app-header{display:flex;align-items:center;padding:16px 20px;background:var(--tg-theme-secondary-bg-color,#fff);border-bottom:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.05));position:sticky;top:0;z-index:10}.app-header h1{font-size:1.8rem;font-weight:700;color:#e67e22;margin-right:16px}.back-btn{background:0 0;border:none;color:#e67e22;font-size:1.5rem;cursor:pointer;padding:8px}.container{padding:16px;max-width:600px;margin:0 auto}.city-selector{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:60px;padding:6px 6px 6px 20px;margin-bottom:20px;border:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.05));display:flex;align-items:center}select{flex:1;padding:12px 0;border:none;background:0 0;color:inherit;font-family:inherit;font-size:1rem;outline:0}.search-bar{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:60px;padding:6px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px;border:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.05))}input{flex:1;border:none;background:0 0;outline:0;color:inherit;font-family:inherit;font-size:1rem}.shop-grid{display:grid;gap:16px}.shop-card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:24px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.03);display:flex;align-items:center;gap:16px;cursor:pointer;transition:.2s}.shop-card:active{transform:scale(.98)}.shop-icon{font-size:44px;background:var(--tg-theme-bg-color,#f0f2f5);width:70px;height:70px;border-radius:20px;display:flex;align-items:center;justify-content:center}.shop-info h3{font-size:1.2rem;font-weight:700}.shop-info p{color:var(--tg-theme-hint-color,#7f8c8d);font-size:.9rem}.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--tg-theme-secondary-bg-color,#1a1a2c);color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}.cart-btn{background:#e67e22;border:none;color:#fff;padding:12px 32px;border-radius:60px;font-weight:700;cursor:pointer}.skeleton{height:90px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:24px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="app-header"><button class="back-btn" onclick="history.back()">←</button><h1>🦅 شاهين</h1></div><div class="container"><div class="city-selector"><select id="citySelect"><option value="">اختر المدينة...</option></select></div><div class="search-bar"><span>🔍</span><input id="searchInput" placeholder="ابحث عن متجر..."></div><div class="shop-grid" id="shopsContainer"><div class="skeleton"></div><div class="skeleton"></div></div></div><div class="cart-bar"><span>🛒 (<span id="cartCount">0</span>)</span><button class="cart-btn" id="viewCartBtn">عرض السلة</button></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';let shops=[],cart=JSON.parse(localStorage.getItem('dragon_cart'))||[],cityId=null;function updateCount(){document.getElementById('cartCount').innerText=cart.reduce((s,i)=>s+i.quantity,0)}async function loadCities(){const r=await fetch(`${API}/api/cities`);const cities=await r.json();const s=document.getElementById('citySelect');cities.forEach(c=>s.add(new Option(c.name,c.id)));if(cities.length){s.value=cities[0].id;cityId=cities[0].id;loadShops()}}async function loadShops(){const c=document.getElementById('shopsContainer');c.innerHTML='<div class="skeleton"></div><div class="skeleton"></div>';const r=await fetch(`${API}/api/shops?city_id=${cityId}`);shops=await r.json();renderShops(shops)}function renderShops(list){const c=document.getElementById('shopsContainer');if(!list.length){c.innerHTML='<p style="text-align:center;padding:40px">😕 لا توجد متاجر</p>';return}c.innerHTML=list.map(s=>`<div class="shop-card" onclick="location.href='shop-menu.html?id=${s.id}&name=${encodeURIComponent(s.shop_name)}'"><div class="shop-icon">${s.icon||'🏪'}</div><div class="shop-info"><h3>${s.shop_name}</h3><p>📍 ${s.address||''}</p></div></div>`).join('')}document.getElementById('citySelect').onchange=e=>{cityId=e.target.value;loadShops()};document.getElementById('searchInput').oninput=e=>{renderShops(shops.filter(s=>s.shop_name.includes(e.target.value)))};document.getElementById('viewCartBtn').onclick=()=>location.href='cart.html';loadCities();updateCount()</script></body></html>
