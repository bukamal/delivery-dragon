<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | استكشف المتاجر</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .city-chip { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: var(--radius-full); padding: var(--space-1) var(--space-1) var(--space-1) var(--space-5); margin-bottom: var(--space-5); border: 1px solid var(--gray-200); display: flex; align-items: center; }
    .city-chip select { flex: 1; padding: var(--space-2) 0; border: none; background: transparent; color: inherit; font-family: inherit; outline: none; }
    .search-box { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: var(--radius-full); padding: var(--space-2) var(--space-5); margin-bottom: var(--space-6); display: flex; align-items: center; border: 1px solid var(--gray-200); }
    .search-box input { flex: 1; border: none; background: transparent; outline: none; font-family: inherit; padding: var(--space-3) 0; margin:0; }
    .shop-icon { font-size: 44px; background: var(--tg-theme-bg-color, #f0f2f5); width: 70px; height: 70px; border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; }
    .shop-info h3 { font-size: var(--text-lg); margin-bottom: var(--space-1); }
    .shop-info p { color: var(--gray-600); font-size: var(--text-sm); display: flex; align-items: center; gap: var(--space-1); }
    .cart-bar { position: fixed; bottom: 80px; left: 0; right: 0; background: var(--tg-theme-secondary-bg-color, var(--secondary)); color: white; padding: var(--space-3) var(--space-6); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 15; }
  </style>
</head>
<body class="has-bottom-nav">
<div class="app-header">
  <h1>🦅 شاهين</h1>
</div>
<div class="container">
  <div class="city-chip">
    <select id="citySelect"><option value="">اختر المدينة...</option></select>
  </div>
  <div class="search-box">
    <i data-lucide="search"></i>
    <input type="text" id="searchInput" placeholder="ابحث عن متجر...">
  </div>
  <div class="shop-grid" id="shopsContainer">
    <div class="skeleton" style="height:100px;"></div>
    <div class="skeleton" style="height:100px;"></div>
    <div class="skeleton" style="height:100px;"></div>
  </div>
</div>
<div class="cart-bar">
  <span><i data-lucide="shopping-cart"></i> السلة (<span id="cartCount">0</span>)</span>
  <button class="cart-btn" id="viewCartBtn">عرض السلة</button>
</div>
<script src="bottom-nav.js"></script>
<script>
  const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
  const API = 'https://delivery-dragon.vercel.app';
  let shops = [], cart = JSON.parse(localStorage.getItem('dragon_cart')) || [], currentCityId = null;
  function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s,i) => s + i.quantity, 0); }
  async function loadCities() {
    const res = await fetch(`${API}/api/cities`);
    const cities = await res.json();
    const sel = document.getElementById('citySelect');
    cities.forEach(c => sel.add(new Option(c.name, c.id)));
    if (cities.length) { sel.value = cities[0].id; currentCityId = cities[0].id; loadShops(); }
  }
  async function loadShops() {
    if (!currentCityId) return;
    const container = document.getElementById('shopsContainer');
    container.innerHTML = '<div class="skeleton" style="height:100px;"></div><div class="skeleton" style="height:100px;"></div><div class="skeleton" style="height:100px;"></div>';
    try {
      const res = await fetch(`${API}/api/shops?city_id=${currentCityId}`);
      shops = await res.json();
      renderShops(shops);
    } catch(e) { container.innerHTML = `<div class="empty-state">⚠️ ${e.message}</div>`; }
  }
  function renderShops(list) {
    const container = document.getElementById('shopsContainer');
    if (!list.length) { container.innerHTML = '<div class="empty-state">😕 لا توجد متاجر في هذه المدينة</div>'; return; }
    container.innerHTML = list.map(s => `
      <div class="card flex" style="cursor:pointer;" onclick="location.href='shop-menu.html?id=${s.id}&name=${encodeURIComponent(s.shop_name)}'">
        <div class="shop-icon">${s.icon || '🏪'}</div>
        <div class="shop-info"><h3>${s.shop_name}</h3><p>📍 ${s.address || ''}</p></div>
      </div>`).join('');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  document.getElementById('citySelect').onchange = e => { currentCityId = e.target.value; loadShops(); };
  document.getElementById('searchInput').oninput = e => { renderShops(shops.filter(s => s.shop_name.includes(e.target.value))); };
  document.getElementById('viewCartBtn').onclick = () => location.href = 'cart.html';
  loadCities(); updateCartCount();
</script>
</body>
</html>
