<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | استكشف المتاجر</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .filter-chips { display: flex; gap: var(--space-2); overflow-x: auto; padding: var(--space-2) 0; margin-bottom: var(--space-3); }
    .filter-chip { padding: var(--space-1) var(--space-3); background: var(--tg-theme-secondary-bg-color, #fff); border-radius: var(--radius-full); border: 1px solid var(--gray-200); white-space: nowrap; }
    .filter-chip.active { background: var(--primary); color: white; }
    .favorite-btn { background: none; border: none; font-size: 24px; cursor: pointer; margin-left: var(--space-2); }
    .shop-card { display: flex; align-items: center; gap: var(--space-3); }
  </style>
</head>
<body class="has-bottom-nav">
<div class="app-header"><h1>🦅 شاهين</h1></div>
<div class="container" id="pullContainer">
  <div class="pull-indicator" id="pullIndicator">↓ اسحب للتحديث</div>
  <div class="city-chip"><select id="citySelect"><option>اختر المدينة...</option></select></div>
  <div class="filter-chips" id="categoryFilter"></div>
  <div class="search-box"><i data-lucide="search"></i><input type="text" id="searchInput" placeholder="ابحث عن متجر..."></div>
  <div class="shop-grid" id="shopsContainer"><div class="skeleton" style="height:100px;"></div></div>
</div>
<div class="cart-bar"><span><i data-lucide="shopping-cart"></i> السلة (<span id="cartCount">0</span>)</span><button class="cart-btn" id="viewCartBtn">عرض السلة</button></div>
<script src="bottom-nav.js"></script>
<script>
  const tg = Telegram.WebApp; tg.ready(); tg.expand();
  const API = 'https://delivery-dragon.vercel.app';
  let shops = [], categories = [], cart = JSON.parse(localStorage.getItem('dragon_cart')) || [], currentCityId = null, selectedCategory = null;
  let favorites = JSON.parse(localStorage.getItem('shahin_favorites')) || [];
  
  function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantity,0); }
  async function loadCategories() { const r = await fetch(`${API}/api/categories`); categories = await r.json(); renderCategoryFilters(); }
  function renderCategoryFilters() {
    const container = document.getElementById('categoryFilter');
    container.innerHTML = `<div class="filter-chip ${!selectedCategory?'active':''}" onclick="filterByCategory(null)">الكل</div>`;
    categories.forEach(c => container.innerHTML += `<div class="filter-chip ${selectedCategory===c.id?'active':''}" onclick="filterByCategory(${c.id})">${c.icon} ${c.name}</div>`);
  }
  window.filterByCategory = (catId) => { selectedCategory = catId; renderCategoryFilters(); loadShops(); };
  
  async function loadCities() {
    const res = await fetch(`${API}/api/cities`); const cities = await res.json();
    const sel = document.getElementById('citySelect'); cities.forEach(c => sel.add(new Option(c.name, c.id)));
    if (cities.length) { sel.value = cities[0].id; currentCityId = cities[0].id; loadShops(); }
  }
  async function loadShops() {
    if (!currentCityId) return;
    const container = document.getElementById('shopsContainer'); container.innerHTML = '<div class="skeleton" style="height:100px;"></div>';
    let url = `${API}/api/shops?city_id=${currentCityId}`;
    if (selectedCategory) url += `&category_id=${selectedCategory}`;
    const res = await fetch(url); shops = await res.json();
    renderShops(shops);
  }
  function renderShops(list) {
    const container = document.getElementById('shopsContainer');
    if (!list.length) { container.innerHTML = '<div class="empty-state">😕 لا توجد متاجر</div>'; return; }
    container.innerHTML = list.map(s => {
      const isFav = favorites.includes(s.id);
      return `<div class="card shop-card" onclick="location.href='shop-menu.html?id=${s.id}&name=${encodeURIComponent(s.shop_name)}'"><div class="shop-icon">${s.icon||'🏪'}</div><div class="shop-info" style="flex:1"><h3>${s.shop_name}</h3><p>📍 ${s.address||''}</p></div><button class="favorite-btn" onclick="event.stopPropagation(); toggleFavorite(${s.id})">${isFav?'❤️':'🤍'}</button></div>`;
    }).join('');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  window.toggleFavorite = (shopId) => {
    if (favorites.includes(shopId)) favorites = favorites.filter(id => id !== shopId);
    else favorites.push(shopId);
    localStorage.setItem('shahin_favorites', JSON.stringify(favorites));
    renderShops(shops);
  };
  
  document.getElementById('citySelect').onchange = e => { currentCityId = e.target.value; loadShops(); };
  document.getElementById('searchInput').oninput = e => renderShops(shops.filter(s => s.shop_name.includes(e.target.value)));
  document.getElementById('viewCartBtn').onclick = () => location.href = 'cart.html';
  loadCategories(); loadCities(); updateCartCount();
</script>
</body>
</html>
