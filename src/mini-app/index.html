<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | الوجهة الأسرع</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf2 100%); color: #1e1e2f; min-height:100vh; }
    .app-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom:1px solid rgba(0,0,0,0.04); position:sticky; top:0; z-index:10; }
    .app-header h1 { font-size:2.2rem; font-weight:800; background: linear-gradient(135deg, #e67e22, #f39c12); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-0.5px; }
    .badge { background:#e67e22; color:#fff; padding:6px 16px; border-radius:60px; font-size:0.8rem; font-weight:600; box-shadow:0 6px 12px rgba(230,126,34,0.2); }
    .container { padding:32px 20px; max-width:480px; margin:0 auto; }
    .hero { text-align:center; margin-bottom:40px; }
    .hero-emoji { font-size:80px; margin-bottom:12px; filter:drop-shadow(0 12px 16px rgba(230,126,34,0.15)); }
    .hero h2 { font-size:2.2rem; font-weight:800; color:#1e1e2f; margin-bottom:6px; }
    .hero p { color:#64748b; font-size:1.1rem; }
    .btn { display:block; width:100%; background:#fff; color:#1e1e2f; border:none; padding:18px 24px; margin:12px 0; border-radius:60px; font-size:1.2rem; font-weight:600; text-align:center; text-decoration:none; box-shadow:0 12px 24px -8px rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.02); backdrop-filter:blur(4px); transition:0.2s; }
    .btn-primary { background:#e67e22; color:#fff; box-shadow:0 12px 24px -6px rgba(230,126,34,0.25); }
    .btn:active { transform:scale(0.98); }
    .skeleton { background:linear-gradient(90deg, #e0e4e8 25%, #f0f2f5 50%, #e0e4e8 75%); background-size:200% 100%; animation:loading 1.5s infinite; border-radius:28px; height:90px; }
    @keyframes loading { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .empty-state { text-align:center; padding:40px 20px; color:#64748b; }
  </style>
</head>
<body>
<div class="app-header">
  <h1>🦅 شاهين</h1>
  <span class="badge">نحن أسرع إليك</span>
</div>
<div class="container">
  <div id="dynamicContent">
    <div class="skeleton"></div>
    <div class="skeleton" style="margin-top:16px; height:60px;"></div>
  </div>
</div>
<script>
  (function() {
    const tg = Telegram.WebApp; tg.ready(); tg.expand();
    if (tg.BackButton) tg.BackButton.hide();
    const API = 'https://delivery-dragon.vercel.app';
    const container = document.getElementById('dynamicContent');

    async function init() {
      try {
        const res = await fetch(`${API}/api/me`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
        if (!res.ok) throw new Error('تعذر الاتصال بالخادم');
        const user = await res.json();
        const role = user?.role || 'customer';
        const isApproved = user?.is_approved;
        const name = user?.name || 'بطل';

        if (role === 'admin') { window.location.href = 'admin-dashboard.html'; return; }
        else if (role === 'shop' && isApproved) { window.location.href = 'shop-dashboard.html'; return; }
        else if (role === 'rider' && isApproved) { window.location.href = 'rider-dashboard.html'; return; }
        else if ((role === 'shop' || role === 'rider') && !isApproved) {
          container.innerHTML = `<div class="empty-state"><div style="font-size:64px;">⏳</div><h2>قيد المراجعة</h2><p>حسابك قيد المراجعة من قبل الإدارة.</p><button class="btn btn-primary" onclick="Telegram.WebApp.close()">حسنًا</button></div>`;
          return;
        }

        if (role === 'customer' && !localStorage.getItem('shahin_onboarded')) {
          window.location.href = 'onboarding.html';
          return;
        }

        container.innerHTML = `
          <div class="hero">
            <div class="hero-emoji">👋</div>
            <h2>مرحباً ${name}!</h2>
            <p>ماذا تود أن تفعل اليوم؟</p>
          </div>
          <a href="customer-home.html" class="btn btn-primary">🍔 تصفح المتاجر</a>
          <a href="my-orders.html" class="btn">📋 طلباتي</a>
          <a href="support.html" class="btn">💬 الدعم الفني</a>
          <a href="register-shop.html" class="btn">🏪 سجل متجرك</a>
          <a href="register-rider.html" class="btn">🛵 انضم كسائق</a>
        `;
        if (typeof lucide !== 'undefined') lucide.createIcons();
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><div style="font-size:64px;">⚠️</div><p>${e.message}</p><button class="btn btn-primary" onclick="location.reload()">إعادة المحاولة</button></div>`;
      }
    }
    init();
  })();
</script>
</body>
</html>
