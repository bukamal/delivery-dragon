<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | الوجهة الأسرع</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-header">
  <h1>🦅 شاهين</h1>
  <span class="badge badge-warning">نحن أسرع إليك</span>
</div>
<div class="container">
  <div class="card" id="dynamicContent">
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="margin-top:16px; height:60px;"></div>
  </div>
</div>
<script>
  (function() {
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand(); tg.BackButton.hide();
    const API = 'https://delivery-dragon.vercel.app';
    const container = document.getElementById('dynamicContent');
    async function init() {
      try {
        const res = await fetch(`${API}/api/me`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
        if (!res.ok) throw new Error('تعذر الاتصال بالخادم');
        const user = await res.json();
        const role = user?.role || 'customer';
        const isApproved = user?.is_approved;
        const name = user?.name || 'بطل';
        
        if (role === 'customer' && !localStorage.getItem('shahin_onboarded')) {
          window.location.href = 'onboarding.html';
          return;
        }
        
        let html = '';
        if (role === 'admin') { window.location.href = 'admin-dashboard.html'; return; }
        else if (role === 'shop' && isApproved) { window.location.href = 'shop-dashboard.html'; return; }
        else if (role === 'rider' && isApproved) { window.location.href = 'rider-dashboard.html'; return; }
        else if ((role === 'shop' || role === 'rider') && !isApproved) {
          html = `<div class="empty-state"><div class="emoji" style="font-size:64px;">⏳</div><h2>قيد المراجعة</h2><p>حسابك قيد المراجعة من قبل الإدارة. سنقوم بإشعارك عند التفعيل.</p><button class="btn btn-block" onclick="window.Telegram.WebApp.close()">حسنًا</button></div>`;
        } else {
          html = `
            <div style="text-align: center; margin-bottom: 10px;">
              <span style="font-size: 56px;">👋</span>
              <h2 style="margin: 8px 0 4px;">مرحباً ${name}!</h2>
              <p style="color: var(--gray-600);">ماذا تود أن تفعل اليوم؟</p>
            </div>
            <a href="customer-home.html" class="btn btn-block">🍔 تصفح المتاجر</a>
            <a href="my-orders.html" class="btn btn-outline btn-block">📋 طلباتي</a>
            <a href="support.html" class="btn btn-outline btn-block">💬 الدعم الفني</a>
            <a href="register-shop.html" class="btn btn-outline btn-block">🏪 سجل متجرك</a>
            <a href="register-rider.html" class="btn btn-outline btn-block">🛵 انضم كسائق</a>
          `;
        }
        container.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons();
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><div style="font-size:64px;">⚠️</div><p>${e.message}</p><button class="btn btn-block" onclick="location.reload()">إعادة المحاولة</button></div>`;
      }
    }
    init();
  })();
</script>
</body>
</html>
