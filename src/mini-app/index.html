<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين - نحن أسرع إليك</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fa);color:var(--tg-theme-text-color,#1e1e2f);padding:20px 16px;min-height:100vh;display:flex;flex-direction:column}.container{max-width:480px;margin:0 auto;width:100%}.logo{text-align:center;margin-bottom:24px}.logo h1{font-size:2.8rem;font-weight:700;color:#d35400}.logo p{font-size:1.2rem;color:var(--tg-theme-hint-color,#666);margin-top:-5px}.card{background:var(--tg-theme-secondary-bg-color,white);border-radius:28px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.03);border:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.05))}.btn{display:block;width:100%;background:#e67e22;color:#fff;border:none;padding:18px 20px;margin:16px 0;border-radius:60px;font-size:1.2rem;font-weight:600;text-align:center;text-decoration:none;transition:.2s;box-shadow:0 4px 12px rgba(230,126,34,.2);cursor:pointer}.btn-secondary{background:0 0;color:var(--tg-theme-text-color,#1e1e2f);border:2px solid #e67e22;box-shadow:none}.skeleton{background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:16px;height:80px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="container"><div class="logo"><h1>🦅 شاهين</h1><p>نحن أسرع إليك</p></div><div class="card" id="dynamic-content"><div class="skeleton" style="height:100px"></div><div class="skeleton" style="margin-top:16px;height:50px"></div></div></div><script>(function(){const tg=window.Telegram.WebApp;tg.ready();tg.expand();const API='https://delivery-dragon.vercel.app';const container=document.getElementById('dynamic-content');async function init(){try{const res=await fetch(`${API}/api/me`,{headers:{'X-Telegram-Init-Data':tg.initData}});const user=await res.json();const role=user?.role||'customer';const isApproved=user?.is_approved;const name=user?.name||'بطل';let html='';if(role==='admin'){window.location.href='admin-dashboard.html';return}else if(role==='shop'&&isApproved){window.location.href='shop-dashboard.html';return}else if(role==='rider'&&isApproved){window.location.href='rider-dashboard.html';return}else if((role==='shop'||role==='rider')&&!isApproved){html=`<div style="text-align:center"><span style="font-size:48px">⏳</span><h2>قيد المراجعة</h2><p>حسابك قيد المراجعة من الإدارة.</p><button class="btn" onclick="window.Telegram.WebApp.close()">حسنًا</button></div>`}else{html=`<div style="text-align:center"><span style="font-size:48px">👋</span><h2>مرحباً ${name}!</h2></div><a href="customer-home.html" class="btn">🍔 تصفح المطاعم</a><a href="my-orders.html" class="btn btn-secondary">📋 طلباتي</a><a href="register-shop.html" class="btn btn-secondary">🏪 سجل كمحل تجاري</a><a href="register-rider.html" class="btn btn-secondary">🛵 سجل كعامل توصيل</a>`}container.innerHTML=html}catch(e){container.innerHTML='<div class="card" style="text-align:center;color:red">⚠️ خطأ في الاتصال</div>'}}init()})()</script></body></html>
