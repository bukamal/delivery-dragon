<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - طلباتي</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:#f5f7fa;padding:16px}.order-card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.02);cursor:pointer}.status{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8rem}.status.verifying{background:#f1c40f;color:#000}.status.paid{background:#3498db;color:#fff}.status.preparing{background:#e67e22;color:#fff}.status.ready{background:#2ecc71;color:#fff}.status.delivering{background:#9b59b6;color:#fff}.status.completed{background:#27ae60;color:#fff}.status.rejected{background:#e74c3c;color:#fff}.skeleton-order{height:100px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px;margin-bottom:16px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><h2>📋 طلباتي</h2><div id="ordersContainer"><div class="skeleton-order"></div><div class="skeleton-order"></div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();const API='https://delivery-dragon.vercel.app';async function loadMyOrders(){try{const res=await fetch(`${API}/api/me/orders`,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok)throw new Error('تعذر تحميل الطلبات');const orders=await res.json();const html=orders.map(o=>`<div class="order-card" onclick="location.href='tracking.html?order_id=${o.id}'"><b>طلب #${o.id}</b> - ${new Date(o.created_at).toLocaleString('ar-SY')}<br>${o.shop_name}<br>الإجمالي: ${o.total_price} ل.س<br><span class="status ${o.status}">${getStatusText(o.status)}</span></div>`).join('');document.getElementById('ordersContainer').innerHTML=html||'<p>لا توجد طلبات</p>'}catch(e){document.getElementById('ordersContainer').innerHTML=`<p style="color:red">⚠️ ${e.message}<br><button onclick="loadMyOrders()" style="margin-top:12px;padding:8px 20px;background:#e67e22;color:white;border:none;border-radius:30px;">إعادة المحاولة</button></p>`}}function getStatusText(s){const m={verifying:'بانتظار التأكيد',pending:'بانتظار المراجعة',paid:'مدفوع',preparing:'قيد التحضير',ready_for_pickup:'جاهز',delivering:'قيد التوصيل',completed:'مكتمل',rejected:'مرفوض'};return m[s]||s}loadMyOrders()</script></body></html>
