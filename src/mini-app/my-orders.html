<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين | طلباتي</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);padding:16px}.order-card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.02);border:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.03))}.status{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8rem}.status.verifying{background:#f1c40f;color:#000}.status.paid{background:#3498db;color:#fff}.status.preparing{background:#e67e22;color:#fff}.status.ready{background:#2ecc71;color:#fff}.status.delivering{background:#9b59b6;color:#fff}.status.completed{background:#27ae60;color:#fff}.status.rejected{background:#e74c3c;color:#fff}.btn{background:#e67e22;color:#fff;border:none;padding:8px 16px;border-radius:30px;cursor:pointer;margin-top:8px}.skeleton-order{height:100px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px;margin-bottom:16px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}.modal-content{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:24px;padding:24px;width:90%;max-width:400px}.stars{display:flex;justify-content:center;gap:12px;margin:16px 0;font-size:32px;cursor:pointer}.star{color:#ccc;transition:.2s}.star.active{color:#f1c40f}textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;margin:16px 0;background:var(--tg-theme-bg-color,#fff);color:inherit}</style></head><body><button onclick="history.back()" style="background:transparent;border:none;color:#e67e22;font-size:1.2rem;margin-bottom:16px">← العودة</button><h2>📋 طلباتي</h2><div id="ordersContainer"><div class="skeleton-order"></div><div class="skeleton-order"></div></div><div id="ratingModal" class="modal" style="display:none"><div class="modal-content"><h3>تقييم الطلب #<span id="modalOrderId"></span></h3><p>تقييم المطعم</p><div class="stars" id="shopStars"><span class="star" data-rating="1">★</span><span class="star" data-rating="2">★</span><span class="star" data-rating="3">★</span><span class="star" data-rating="4">★</span><span class="star" data-rating="5">★</span></div><p>تقييم السائق</p><div class="stars" id="riderStars"><span class="star" data-rating="1">★</span><span class="star" data-rating="2">★</span><span class="star" data-rating="3">★</span><span class="star" data-rating="4">★</span><span class="star" data-rating="5">★</span></div><textarea id="commentInput" placeholder="ملاحظاتك (اختياري)"></textarea><button class="btn" onclick="submitRating()" style="width:100%">إرسال التقييم</button><button class="btn" onclick="closeModal()" style="background:#95a5a6;margin-top:8px">إلغاء</button></div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';let currentOrderId=null,shopRating=0,riderRating=0;async function loadMyOrders(){try{const res=await fetch(`${API}/api/me/orders`,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok)throw new Error('تعذر تحميل الطلبات');const orders=await res.json();const html=orders.map(o=>`<div class="order-card"><b>طلب #${o.id}</b> - ${new Date(o.created_at).toLocaleString('ar-SY')}<br>${o.shop_name}<br>الإجمالي: ${o.total_price} ل.س<br><span class="status ${o.status}">${getStatusText(o.status)}</span>${o.status==='completed'?`<br><button class="btn" onclick="openRatingModal(${o.id})">⭐ تقييم الطلب</button>`:''}</div>`).join('');document.getElementById('ordersContainer').innerHTML=html||'<p>لا توجد طلبات</p>'}catch(e){document.getElementById('ordersContainer').innerHTML=`<p style="color:red">⚠️ ${e.message}</p>`}}function getStatusText(s){const m={verifying:'بانتظار التأكيد',pending:'بانتظار المراجعة',paid:'مدفوع',preparing:'قيد التحضير',ready_for_pickup:'جاهز',delivering:'قيد التوصيل',completed:'مكتمل',rejected:'مرفوض'};return m[s]||s}window.openRatingModal=orderId=>{currentOrderId=orderId;shopRating=riderRating=0;document.getElementById('modalOrderId').innerText=orderId;document.querySelectorAll('#shopStars .star').forEach(s=>s.classList.remove('active'));document.querySelectorAll('#riderStars .star').forEach(s=>s.classList.remove('active'));document.getElementById('commentInput').value='';document.getElementById('ratingModal').style.display='flex'};document.querySelectorAll('#shopStars .star').forEach(s=>{s.addEventListener('click',()=>{const r=parseInt(s.dataset.rating);shopRating=r;document.querySelectorAll('#shopStars .star').forEach((el,i)=>{if(i<r)el.classList.add('active');else el.classList.remove('active')})})});document.querySelectorAll('#riderStars .star').forEach(s=>{s.addEventListener('click',()=>{const r=parseInt(s.dataset.rating);riderRating=r;document.querySelectorAll('#riderStars .star').forEach((el,i)=>{if(i<r)el.classList.add('active');else el.classList.remove('active')})})});window.submitRating=async()=>{if(!shopRating||!riderRating){tg.showAlert('الرجاء تقييم المطعم والسائق');return}const comment=document.getElementById('commentInput').value.trim();try{await Promise.all([fetch(`${API}/api/orders/${currentOrderId}/rate`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({rating:shopRating,comment,target:'shop'})}),fetch(`${API}/api/orders/${currentOrderId}/rate`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({rating:riderRating,comment,target:'rider'})})]);tg.showAlert('شكراً لتقييمك!');closeModal();loadMyOrders()}catch(e){tg.showAlert(`❌ ${e.message}`)}};window.closeModal=()=>{document.getElementById('ratingModal').style.display='none'};loadMyOrders()</script></body></html>
