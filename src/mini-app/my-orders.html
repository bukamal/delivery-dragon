<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>طلباتي</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal';background:#f5f7fb;padding:16px}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px}.status{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8rem}.verifying{background:#f1c40f}.paid{background:#3498db;color:#fff}.preparing{background:#e67e22;color:#fff}.delivering{background:#9b59b6;color:#fff}.completed{background:#27ae60;color:#fff}.btn{background:#e67e22;color:#fff;border:none;padding:8px 16px;border-radius:30px;margin-top:8px}</style></head><body><h2>📋 طلباتي</h2><div id="orders"></div><script>const tg=Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';async function load(){const r=await fetch(`${API}/api/me/orders`,{headers:{'X-Telegram-Init-Data':tg.initData}});const orders=await r.json();const h=orders.map(o=>`<div class="card"><b>#${o.id}</b> - ${o.shop_name}<br>💰 ${o.total_price} ل.س<br><span class="status ${o.status}">${o.status}</span>${o.status==='completed'?`<br><button class="btn" onclick="rate(${o.id})">⭐ تقييم</button>`:''}${(o.status==='verifying'||o.status==='pending')?`<br><button class="btn" style="background:#e74c3c" onclick="cancel(${o.id})">❌ إلغاء</button>`:''}</div>`).join('');document.getElementById('orders').innerHTML=h||'<p>لا طلبات</p>'}window.rate=id=>{tg.showPopup({title:'تقييم',message:'قريباً'})};window.cancel=async id=>{tg.showConfirm('إلغاء الطلب؟',async ok=>{if(!ok)return;await fetch(`${API}/api/orders/${id}/cancel`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}});load()})};load()</script></body></html>
