<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | طلباتي</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .status { display:inline-block; padding:var(--space-1) var(--space-4); border-radius:var(--radius-full); font-size:var(--text-sm); font-weight:600; }
    .verifying{background:var(--warning);color:black} .paid{background:var(--info);color:white} .preparing{background:var(--primary);color:white} .ready{background:var(--success);color:white} .delivering{background:#9b59b6;color:white} .completed{background:var(--success);color:white} .rejected{background:var(--danger);color:white}
    .stars { display:flex; justify-content:center; gap:12px; margin:20px 0; font-size:36px; cursor:pointer; }
    .star { color:var(--gray-400); transition:0.2s; } .star.active { color:var(--warning); }
  </style>
</head>
<body>
<div class="app-header"><button class="back-btn" id="backBtn"><i data-lucide="arrow-right"></i></button><h1>🦅 شاهين</h1></div>
<div class="container">
  <h2 style="margin-bottom:20px;"><i data-lucide="clipboard-list"></i> طلباتي</h2>
  <div id="ordersContainer"><div class="skeleton" style="height:120px;"></div></div>
</div>
<div id="ratingModal" class="modal" style="display:none"><div class="modal-content"><h3>تقييم #<span id="modalOrderId"></span></h3><p>المطعم</p><div class="stars" id="shopStars"><span class="star" data-rating="1">★</span><span class="star" data-rating="2">★</span><span class="star" data-rating="3">★</span><span class="star" data-rating="4">★</span><span class="star" data-rating="5">★</span></div><p>السائق</p><div class="stars" id="riderStars"><span class="star" data-rating="1">★</span><span class="star" data-rating="2">★</span><span class="star" data-rating="3">★</span><span class="star" data-rating="4">★</span><span class="star" data-rating="5">★</span></div><textarea id="commentInput" placeholder="ملاحظاتك"></textarea><button class="btn btn-block" onclick="submitRating()">إرسال</button><button class="btn btn-block" onclick="closeModal()" style="background:var(--gray-500);margin-top:8px">إلغاء</button></div></div>
<script>
  const tg = Telegram.WebApp; tg.ready(); tg.BackButton.show(); tg.BackButton.onClick(()=>history.back()); document.getElementById('backBtn').onclick=()=>history.back();
  const API = 'https://delivery-dragon.vercel.app'; let currentOrderId, shopRating=0, riderRating=0;
  function getStatusProgress(s){ const steps=['paid','preparing','ready_for_pickup','delivering','completed']; const idx=steps.indexOf(s); const pct=idx>=0?(idx/(steps.length-1))*100:0; const labels={paid:'مدفوع',preparing:'تحضير',ready_for_pickup:'جاهز',delivering:'توصيل',completed:'مكتمل'}; return{percent:pct,label:labels[s]||s}; }
  async function load() {
    const r = await fetch(`${API}/api/me/orders`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const orders = await r.json();
    const h = orders.map(o=>{ const{percent,label}=getStatusProgress(o.status);
      return `<div class="card"><div class="flex-between"><b>#${o.id}</b><span class="status ${o.status}">${label}</span></div><div>${o.shop_name}</div><div>💰 ${o.total_price} ل.س</div><div style="margin-top:12px"><div class="flex-between" style="font-size:.8rem"><span>${label}</span><span>${Math.round(percent)}%</span></div><div style="background:var(--gray-300);height:6px;border-radius:6px"><div style="width:${percent}%;background:var(--primary);height:6px;border-radius:6px"></div></div></div><div>${new Date(o.created_at).toLocaleString('ar-SY')}</div>${o.status==='completed'?`<button class="btn btn-outline" onclick="openModal(${o.id})"><i data-lucide="star"></i> تقييم</button>`:''}${(o.status==='verifying'||o.status==='pending')?`<button class="btn btn-danger" onclick="cancel(${o.id})"><i data-lucide="x"></i> إلغاء</button>`:''}${o.status==='delivering'?`<button class="btn btn-outline" onclick="location.href='tracking.html?order_id=${o.id}'"><i data-lucide="map-pin"></i> تتبع</button>`:''}</div>`;
    }).join('');
    document.getElementById('ordersContainer').innerHTML = h || '<div class="empty-state"><h3>لا توجد طلبات</h3><p>ابدأ بتصفح المتاجر</p><button class="btn btn-block" onclick="location.href=\'customer-home.html\'">تصفح المتاجر</button></div>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  window.openModal = id => { currentOrderId=id; shopRating=riderRating=0; document.getElementById('modalOrderId').innerText=id; document.querySelectorAll('#shopStars .star,#riderStars .star').forEach(s=>s.classList.remove('active')); document.getElementById('commentInput').value=''; document.getElementById('ratingModal').style.display='flex'; };
  document.querySelectorAll('#shopStars .star').forEach(s=>s.onclick=()=>{ shopRating=+s.dataset.rating; document.querySelectorAll('#shopStars .star').forEach((e,i)=>{ if(i<shopRating) e.classList.add('active'); else e.classList.remove('active'); }); });
  document.querySelectorAll('#riderStars .star').forEach(s=>s.onclick=()=>{ riderRating=+s.dataset.rating; document.querySelectorAll('#riderStars .star').forEach((e,i)=>{ if(i<riderRating) e.classList.add('active'); else e.classList.remove('active'); }); });
  window.submitRating = async () => { if(!shopRating||!riderRating) return tg.showAlert('قيم الطرفين'); const c=document.getElementById('commentInput').value.trim(); await Promise.all([fetch(`${API}/api/orders/${currentOrderId}/rate`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({rating:shopRating,comment:c,target:'shop'})}),fetch(`${API}/api/orders/${currentOrderId}/rate`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({rating:riderRating,comment:c,target:'rider'})})]); tg.showAlert('شكراً!'); closeModal(); load(); };
  window.cancel = async id => { tg.showConfirm('إلغاء الطلب؟',async ok=>{ if(ok){ await fetch(`${API}/api/orders/${id}/cancel`,{method:'POST',headers:{'X-Telegram-Init-Data':tg.initData}}); load(); } }); };
  window.closeModal = () => document.getElementById('ratingModal').style.display='none';
  load();
</script>
</body>
</html>
