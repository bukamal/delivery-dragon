<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | مرحباً بك</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf2 100%); color: #1e1e2f; }
    .onboarding-container { display:flex; flex-direction:column; height:100vh; }
    .slides { flex:1; position:relative; }
    .slide { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:24px; opacity:0; transition:0.4s; }
    .slide.active { opacity:1; z-index:1; }
    .slide-icon { font-size:90px; margin-bottom:24px; filter:drop-shadow(0 12px 16px rgba(230,126,34,0.15)); }
    .slide-title { font-size:2rem; font-weight:800; margin-bottom:12px; background: linear-gradient(135deg, #e67e22, #f39c12); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .slide-desc { text-align:center; color:#64748b; font-size:1.1rem; margin-bottom:48px; }
    .dots { display:flex; justify-content:center; gap:10px; margin-bottom:32px; }
    .dot { width:10px; height:10px; border-radius:5px; background:#cbd5e1; transition:0.3s; }
    .dot.active { width:28px; background:#e67e22; }
    .onboarding-footer { padding:24px; }
    .btn { background:#fff; color:#1e1e2f; border:none; padding:18px; border-radius:60px; width:100%; font-size:1.2rem; font-weight:600; cursor:pointer; box-shadow:0 12px 24px -8px rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.02); }
    .btn-primary { background:#e67e22; color:#fff; box-shadow:0 12px 24px -6px rgba(230,126,34,0.25); margin-bottom:12px; }
  </style>
</head>
<body>
<div class="onboarding-container">
  <div class="slides">
    <div class="slide active"><div class="slide-icon">🛵</div><div class="slide-title">توصيل سريع</div><div class="slide-desc">نوصل طلبك لباب بيتك بأسرع وقت</div></div>
    <div class="slide"><div class="slide-icon">🔐</div><div class="slide-title">كود تأكيد</div><div class="slide-desc">استلم طلبك بأمان عبر كود التأكيد</div></div>
    <div class="slide"><div class="slide-icon">💬</div><div class="slide-title">دعم فوري</div><div class="slide-desc">فريق دعم جاهز لمساعدتك على مدار الساعة</div></div>
  </div>
  <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="onboarding-footer">
    <button class="btn btn-primary" id="nextBtn">التالي</button>
    <button class="btn" id="skipBtn">تخطي</button>
  </div>
</div>
<script>
  const tg = Telegram.WebApp; tg.ready(); tg.expand();
  const slides = document.querySelectorAll('.slide'), dots = document.querySelectorAll('.dot');
  let current = 0;
  function showSlide(i) {
    slides.forEach((s,idx) => { s.classList.toggle('active', idx===i); dots[idx].classList.toggle('active', idx===i); });
    document.getElementById('nextBtn').textContent = i===2 ? 'ابدأ الآن' : 'التالي';
  }
  document.getElementById('nextBtn').onclick = () => {
    if (current < 2) { current++; showSlide(current); }
    else { finish(); }
  };
  document.getElementById('skipBtn').onclick = finish;
  function finish() { localStorage.setItem('shahin_onboarded', 'true'); location.href = 'customer-home.html'; }
</script>
</body>
</html>
