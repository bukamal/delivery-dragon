<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | الملف الشخصي</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf2 100%); color: #1e1e2f; padding-bottom:90px; }
    .app-header { display:flex; align-items:center; padding:20px 24px; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border-bottom:1px solid rgba(0,0,0,0.04); position:sticky; top:0; z-index:10; }
    .app-header h1 { font-size:2.2rem; font-weight:800; background: linear-gradient(135deg, #e67e22, #f39c12); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:12px; }
    .back-btn { background:none; border:none; color:#e67e22; font-size:2rem; cursor:pointer; }
    .container { padding:20px 16px; max-width:600px; margin:0 auto; }
    .profile-header { display:flex; align-items:center; gap:20px; margin-bottom:28px; }
    .avatar { width:85px; height:85px; background:#e67e22; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:40px; box-shadow:0 12px 20px rgba(230,126,34,0.2); }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:28px 0; }
    .stat-card { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border-radius:24px; padding:20px; text-align:center; border:1px solid rgba(255,255,255,0.5); }
    .stat-value { font-size:2rem; font-weight:800; color:#e67e22; }
    .btn { background:#e67e22; color:#fff; border:none; padding:18px; border-radius:60px; width:100%; cursor:pointer; font-weight:600; box-shadow:0 12px 20px rgba(230,126,34,0.2); }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,0.8); backdrop-filter:blur(20px); display:flex; justify-content:space-around; padding:14px; border-top:1px solid rgba(0,0,0,0.04); }
    .nav-item { display:flex; flex-direction:column; align-items:center; color:#64748b; text-decoration:none; }
    .nav-item.active { color:#e67e22; }
  </style>
</head>
<body class="has-bottom-nav">
<div class="app-header">
  <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button>
  <h1>🦅 الملف الشخصي</h1>
</div>
<div class="container">
  <div id="profileContent"><div class="skeleton" style="height:200px;"></div></div>
</div>
<div class="bottom-nav">
  <a href="customer-home.html" class="nav-item"><i data-lucide="home"></i><span>الرئيسية</span></a>
  <a href="my-orders.html" class="nav-item"><i data-lucide="clipboard-list"></i><span>طلباتي</span></a>
  <a href="support.html" class="nav-item"><i data-lucide="message-circle"></i><span>الدعم</span></a>
  <a href="profile.html" class="nav-item active"><i data-lucide="user"></i><span>حسابي</span></a>
</div>
<script>
  const tg = Telegram.WebApp; tg.ready(); tg.expand();
  if (tg.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(() => history.back()); }
  const API = 'https://delivery-dragon.vercel.app';
  
  async function loadProfile() {
    const res = await fetch(`${API}/api/me`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const user = await res.json();
    const ordersRes = await fetch(`${API}/api/me/orders`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const orders = await ordersRes.json();
    const totalOrders = orders.length;
    const totalSpent = orders.reduce((sum, o) => sum + (o.status === 'completed' ? o.total_price : 0), 0);
    
    document.getElementById('profileContent').innerHTML = `
      <div class="profile-header">
        <div class="avatar">${(user.name || 'ز')[0]}</div>
        <div><h2>${user.name || 'زبون شاهين'}</h2><span class="badge">${user.role}</span></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${totalOrders}</div><div>طلب</div></div>
        <div class="stat-card"><div class="stat-value">${totalSpent}</div><div>ل.س</div></div>
      </div>
      <div class="card" style="background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border-radius:24px; padding:22px;">
        <div class="form-group" style="margin-bottom:18px;"><label style="display:block; margin-bottom:8px;">الاسم</label><input type="text" id="profileName" value="${user.name || ''}" style="width:100%; padding:16px; border-radius:60px; border:1px solid #ccc; background:rgba(255,255,255,0.5);"></div>
        <div class="form-group" style="margin-bottom:18px;"><label style="display:block; margin-bottom:8px;">رقم الهاتف</label><input type="tel" id="profilePhone" value="${user.phone || ''}" style="width:100%; padding:16px; border-radius:60px; border:1px solid #ccc; background:rgba(255,255,255,0.5);"></div>
        <button class="btn" onclick="updateProfile()">حفظ التغييرات</button>
      </div>
    `;
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  window.updateProfile = async () => {
    const name = document.getElementById('profileName').value;
    const phone = document.getElementById('profilePhone').value;
    await fetch(`${API}/api/me/update`, { method:'PUT', headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify({ name, phone }) });
    tg.showAlert('✅ تم تحديث الملف الشخصي');
  };
  loadProfile();
</script>
</body>
</html>
