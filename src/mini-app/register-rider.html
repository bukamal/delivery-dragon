<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | تسجيل سائق</title><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="styles.css?v=2.0.0"></head><body><div class="app-header"><button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button><h1>🦅 شاهين</h1></div><div class="container"><h2><i data-lucide="bike"></i> تسجيل سائق</h2><form id="f"><div class="form-group"><label>اسمك الكامل</label><input id="name" placeholder="مثال: خالد العلي" required></div><div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" placeholder="09xxxxxxxx" required><div id="phoneFeedback" class="feedback" style="font-size:var(--text-xs);margin-top:4px;"></div></div><div class="form-group"><label>نوع المركبة</label><select id="vehicle"><option value="دراجة">🚲 دراجة</option><option value="سيارة">🚗 سيارة</option></select></div><div class="form-group"><label>رقم لوحة المركبة</label><input type="text" id="plateNumber" placeholder="مثلاً: 123456"></div><button type="submit" class="btn btn-block">تقديم الطلب</button></form></div><script>const tg=Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';const phoneRegex=/^09[0-9]{8}$/;document.getElementById('phone').addEventListener('input',e=>{const v=e.target.value.trim();const fb=document.getElementById('phoneFeedback');if(phoneRegex.test(v)){fb.innerHTML='✅ رقم صحيح';fb.style.color='var(--success)'}else{fb.innerHTML='❌ يجب أن يبدأ بـ09 ويتكون من 10 أرقام';fb.style.color='var(--danger)'}});document.getElementById('f').onsubmit=async e=>{e.preventDefault();const d={name:document.getElementById('name').value,phone:document.getElementById('phone').value,vehicle_type:document.getElementById('vehicle').value,vehicle_number:document.getElementById('plateNumber').value};tg.MainButton.showProgress();try{const r=await fetch(`${API}/api/register/rider`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify(d)});if(!r.ok)throw new Error((await r.json()).error);tg.showAlert('✅ تم تقديم الطلب!');tg.close()}catch(e){tg.MainButton.hideProgress();tg.showAlert('❌ '+e.message)}}</script></body></html>
