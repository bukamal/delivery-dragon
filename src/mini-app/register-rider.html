<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تسجيل عامل توصيل</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; background: var(--tg-theme-bg-color, #f5f7fa); color: var(--tg-theme-text-color, #1e1e2f); padding: 20px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    input, select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--tg-theme-hint-color, #ccc); background: var(--tg-theme-secondary-bg-color, white); color: inherit; }
    .btn { background: var(--tg-theme-button-color, #e67e22); color: white; border: none; padding: 18px; border-radius: 60px; width: 100%; font-size: 1.2rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>
<h2>🛵 تسجيل عامل توصيل</h2>
<form id="registerForm">
  <div class="form-group"><label>اسمك الكامل</label><input type="text" id="name" required></div>
  <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" required></div>
  <div class="form-group"><label>نوع المركبة</label><select id="vehicle"><option value="دراجة">دراجة</option><option value="سيارة">سيارة</option></select></div>
  <button type="submit" class="btn">تقديم الطلب</button>
</form>
<script>
  const tg = window.Telegram.WebApp; tg.ready();
  const API = 'https://delivery-dragon.vercel.app';
  document.getElementById('registerForm').onsubmit = async (e) => {
    e.preventDefault();
    const data = {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      vehicle_type: document.getElementById('vehicle').value
    };
    const res = await fetch(`${API}/api/register/rider`, {
      method: 'POST', headers: { 'Content-Type':'application/json', 'X-Telegram-Init-Data': tg.initData }, body: JSON.stringify(data)
    });
    if (res.ok) { tg.showAlert('تم تقديم الطلب!'); tg.close(); }
    else tg.showAlert('خطأ في التسجيل');
  };
</script>
</body>
</html>
