<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | تسجيل متجر</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Tajawal', sans-serif; background: var(--tg-theme-bg-color, #f5f7fb); color: var(--tg-theme-text-color, #1a1a2c); padding: 0 0 30px; }
    .app-header { display: flex; align-items: center; padding: 16px 20px; background: var(--tg-theme-secondary-bg-color, #fff); border-bottom: 1px solid var(--tg-theme-hint-color, #ddd); position: sticky; top:0; z-index:10; }
    .app-header h1 { font-size:1.7rem; color:#e67e22; margin-right:12px; }
    .back-btn { background:none; border:none; color:#e67e22; font-size:1.8rem; cursor:pointer; }
    .container { padding:24px 16px; max-width:500px; margin:0 auto; }
    .form-group { margin-bottom:20px; }
    label { display:block; margin-bottom:8px; font-weight:500; }
    input, select { width:100%; padding:16px; border-radius:16px; border:1px solid #ccc; background:var(--tg-theme-secondary-bg-color, #fff); color:inherit; }
    .btn { background:#e67e22; color:#fff; border:none; padding:18px; border-radius:60px; width:100%; font-size:1.2rem; font-weight:700; margin-top:20px; cursor:pointer; box-shadow:0 6px 14px rgba(230,126,34,0.2); }
  </style>
</head>
<body>
<div class="app-header"><button class="back-btn" onclick="history.back()">←</button><h1>🦅 شاهين</h1></div>
<div class="container">
  <h2 style="margin-bottom:20px">🏪 تسجيل متجر جديد</h2>
  <form id="registerForm">
    <div class="form-group"><label>اسمك الكامل</label><input id="name" placeholder="مثال: أحمد محمد" required></div>
    <div class="form-group"><label>اسم المتجر</label><input id="shopName" placeholder="مثال: مطعم الشام" required></div>
    <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" placeholder="09xxxxxxxx" required></div>
    <div class="form-group"><label>المدينة</label><select id="city" required></select></div>
    <div class="form-group"><label>العنوان التفصيلي</label><input id="address" placeholder="الشارع، البناء..." required></div>
    <div class="form-group"><label>الفئة</label><select id="category" required></select></div>
    <button type="submit" class="btn">تقديم الطلب</button>
  </form>
</div>
<script>
  const tg = Telegram.WebApp; tg.ready(); tg.BackButton.show(); tg.BackButton.onClick(()=>history.back());
  const API = 'https://delivery-dragon.vercel.app';
  async function loadData() {
    const [catRes, cityRes] = await Promise.all([fetch(`${API}/api/categories`), fetch(`${API}/api/cities`)]);
    const cats = await catRes.json(), cities = await cityRes.json();
    const catSel = document.getElementById('category'), citySel = document.getElementById('city');
    cats.forEach(c => catSel.add(new Option(c.name, c.id)));
    cities.forEach(c => citySel.add(new Option(c.name, c.id)));
  }
  document.getElementById('registerForm').onsubmit = async e => {
    e.preventDefault();
    const data = { name: document.getElementById('name').value, shop_name: document.getElementById('shopName').value, phone: document.getElementById('phone').value, address: document.getElementById('address').value, category_id: document.getElementById('category').value, city_id: document.getElementById('city').value };
    tg.MainButton.showProgress();
    try {
      const res = await fetch(`${API}/api/register/shop`, { method:'POST', headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify(data) });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'فشل التسجيل'); }
      tg.showAlert('✅ تم تقديم الطلب!'); tg.close();
    } catch(e) { tg.MainButton.hideProgress(); tg.showAlert('❌ '+e.message); }
  };
  loadData();
</script>
</body>
</html>
