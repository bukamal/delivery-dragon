<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>شاهين | تسجيل متجر</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
    body{background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf2 100%);color:#1e1e2f;padding:20px}
    .app-header{display:flex;align-items:center;margin-bottom:28px}
    .back-btn{background:none;border:none;color:#e67e22;font-size:2rem;cursor:pointer}
    h1{font-size:2rem;font-weight:800;background: linear-gradient(135deg, #e67e22, #f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:12px}
    .container{max-width:500px;margin:0 auto}
    .form-group{margin-bottom:22px}
    label{display:block;margin-bottom:8px;font-weight:600}
    input,select{width:100%;padding:16px;border-radius:60px;border:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);backdrop-filter:blur(8px)}
    .btn{background:#e67e22;color:#fff;border:none;padding:18px;border-radius:60px;width:100%;font-size:1.2rem;font-weight:700;cursor:pointer;box-shadow:0 12px 20px rgba(230,126,34,0.2);margin-top:24px}
  </style>
</head>
<body>
<div class="app-header"><button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button><h1>🦅 تسجيل متجر</h1></div>
<div class="container"><form id="f">
  <div class="form-group"><label>اسمك</label><input id="name" required></div>
  <div class="form-group"><label>اسم المتجر</label><input id="shop" required></div>
  <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" required></div>
  <div class="form-group"><label>المدينة</label><select id="city" required></select></div>
  <div class="form-group"><label>العنوان</label><input id="addr" required></div>
  <div class="form-group"><label>الفئة</label><select id="cat" required></select></div>
  <div class="form-group"><label>موقع المتجر</label><button type="button" class="btn" onclick="getLocation()" style="margin-top:0;">📍 تحديد الموقع</button><input type="hidden" id="lat"><input type="hidden" id="lng"></div>
  <button type="submit" class="btn">تقديم الطلب</button>
</form></div>
<script>
const tg=Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());
const API='https://delivery-dragon.vercel.app';
function getLocation(){ navigator.geolocation.getCurrentPosition(p=>{ document.getElementById('lat').value=p.coords.latitude; document.getElementById('lng').value=p.coords.longitude; tg.showAlert('✅ تم تحديد الموقع'); }); }
(async function load(){ const [cats,cities]=await Promise.all([fetch(`${API}/api/categories`),fetch(`${API}/api/cities`)]); const c=await cats.json(), ci=await cities.json(); const cs=document.getElementById('cat'), cis=document.getElementById('city'); c.forEach(x=>cs.add(new Option(x.name,x.id))); ci.forEach(x=>cis.add(new Option(x.name,x.id))); })();
document.getElementById('f').onsubmit=async e=>{ e.preventDefault(); const d={ name:document.getElementById('name').value, shop_name:document.getElementById('shop').value, phone:document.getElementById('phone').value, address:document.getElementById('addr').value, city_id:document.getElementById('city').value, category_id:document.getElementById('cat').value, latitude:document.getElementById('lat').value, longitude:document.getElementById('lng').value }; tg.MainButton.showProgress(); try{ const r=await fetch(`${API}/api/register/shop`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify(d)}); if(!r.ok) throw new Error((await r.json()).error); tg.showAlert('✅ تم تقديم الطلب!'); tg.close(); }catch(e){ tg.MainButton.hideProgress(); tg.showAlert('❌ '+e.message); } };
</script>
</body>
</html>
