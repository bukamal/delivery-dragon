<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تسجيل متجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal';background:#f5f7fb;padding:16px}input,select{width:100%;padding:14px;border-radius:12px;border:1px solid #ccc;margin:10px 0}.btn{background:#e67e22;color:#fff;border:none;padding:16px;border-radius:40px;width:100%}</style></head><body><h2>🏪 تسجيل متجر</h2><form id="f"><input id="name" placeholder="اسمك" required><input id="shop" placeholder="اسم المتجر" required><input id="phone" placeholder="الهاتف" required><select id="city"></select><input id="addr" placeholder="العنوان" required><select id="cat"></select><button class="btn">تقديم</button></form><script>const tg=Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';async function load(){const[c,ct]=await Promise.all([fetch(`${API}/api/categories`),fetch(`${API}/api/cities`)]);const cats=await c.json(),cities=await ct.json();const cs=document.getElementById('cat'),cis=document.getElementById('city');cats.forEach(x=>cs.add(new Option(x.name,x.id)));cities.forEach(x=>cis.add(new Option(x.name,x.id)))}document.getElementById('f').onsubmit=async e=>{e.preventDefault();const d={name:document.getElementById('name').value,shop_name:document.getElementById('shop').value,phone:document.getElementById('phone').value,address:document.getElementById('addr').value,category_id:document.getElementById('cat').value,city_id:document.getElementById('city').value};await fetch(`${API}/api/register/shop`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify(d)});tg.showAlert('تم!');tg.close()};load()</script></body></html>
