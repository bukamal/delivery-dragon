<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - تسجيل محل</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:#f5f7fa;padding:20px}.form-group{margin-bottom:20px}label{display:block;margin-bottom:8px;font-weight:500}input,select{width:100%;padding:16px;border-radius:16px;border:1px solid #ccc;background:#fff}.btn{background:#e67e22;color:#fff;border:none;padding:18px;border-radius:60px;width:100%;font-size:1.2rem;font-weight:700;margin-top:20px;cursor:pointer}</style></head><body><h2>🏪 تسجيل محل تجاري</h2><form id="registerForm"><div class="form-group"><label>اسمك الكامل</label><input id="name" required></div><div class="form-group"><label>اسم المحل</label><input id="shopName" required></div><div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" required></div><div class="form-group"><label>العنوان</label><input id="address" required></div><div class="form-group"><label>الفئة</label><select id="category" required></select></div><button type="submit" class="btn">تقديم الطلب</button></form><script>const tg=window.Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';async function loadCategories(){try{const res=await fetch(`${API}/api/categories`);if(!res.ok)throw new Error('تعذر تحميل الفئات');const cats=await res.json();const sel=document.getElementById('category');cats.forEach(c=>sel.add(new Option(c.name,c.id)))}catch(e){tg.showAlert(`⚠️ ${e.message}`)}}document.getElementById('registerForm').onsubmit=async e=>{e.preventDefault();const data={name:document.getElementById('name').value,shop_name:document.getElementById('shopName').value,phone:document.getElementById('phone').value,address:document.getElementById('address').value,category_id:document.getElementById('category').value};tg.MainButton.showProgress();try{const res=await fetch(`${API}/api/register/shop`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify(data)});if(!res.ok){const err=await res.json();throw new Error(err.error||'فشل التسجيل')}tg.showAlert('تم تقديم الطلب بنجاح!');tg.close()}catch(e){tg.MainButton.hideProgress();tg.showAlert(`❌ ${e.message}`)}};loadCategories()</script></body></html>
