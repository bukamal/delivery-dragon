<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | تسجيل متجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="https://unpkg.com/lucide@latest"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);color:var(--tg-theme-text-color,#1a1a2c);padding:0 0 30px}.app-header{display:flex;align-items:center;padding:16px 20px;background:var(--tg-theme-secondary-bg-color,#fff);border-bottom:1px solid var(--tg-theme-hint-color,#ddd);position:sticky;top:0;z-index:10}.app-header h1{font-size:1.7rem;color:#e67e22;margin-right:12px}.back-btn{background:0 0;border:none;color:#e67e22;font-size:1.8rem;cursor:pointer}.container{padding:24px 16px;max-width:500px;margin:0 auto}.form-group{margin-bottom:20px}label{display:block;margin-bottom:8px;font-weight:500}input,select{width:100%;padding:16px;border-radius:16px;border:1px solid #ccc;background:var(--tg-theme-secondary-bg-color,#fff);color:inherit}.btn{background:#e67e22;color:#fff;border:none;padding:18px;border-radius:60px;width:100%;font-size:1.2rem;font-weight:700;margin-top:20px;cursor:pointer;box-shadow:0 6px 14px rgba(230,126,34,.2)}.feedback{font-size:.8rem;margin-top:4px}.checkbox-group{display:flex;gap:16px;padding:12px 0}</style></head><body><div class="app-header"><button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button><h1>🦅 شاهين</h1></div><div class="container"><h2><i data-lucide="store"></i> تسجيل متجر</h2><form id="f"><div class="form-group"><label>اسمك الكامل</label><input id="name" placeholder="مثال: أحمد محمد" required></div><div class="form-group"><label>اسم المتجر</label><input id="shop" placeholder="مثال: مطعم الشام" required></div><div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" placeholder="09xxxxxxxx" required><div id="phoneFeedback" class="feedback"></div></div><div class="form-group"><label>البريد الإلكتروني (اختياري)</label><input type="email" id="email" placeholder="example@domain.com"></div><div class="form-group"><label>المدينة</label><select id="city" required></select></div><div class="form-group"><label>العنوان التفصيلي</label><input id="addr" placeholder="الشارع، البناء..." required></div><div class="form-group"><label>الحد الأدنى للطلب (ل.س)</label><input type="number" id="minOrder" placeholder="مثلاً: 10000" value="0"></div><div class="form-group"><label>ساعات العمل</label><input type="text" id="workingHours" placeholder="مثلاً: 9 صباحاً - 10 مساءً"></div><div class="form-group"><label>وسائل الدفع المقبولة</label><div class="checkbox-group"><label><input type="checkbox" value="cash" checked> نقداً</label><label><input type="checkbox" value="shamcash"> شام كاش</label></div></div><div class="form-group"><label>الفئة</label><select id="cat" required></select></div><div class="form-group"><label>موقع المتجر على الخريطة</label><button type="button" class="btn-outline" onclick="getLocation()" style="padding:12px;"><i data-lucide="map-pin"></i> تحديد الموقع الحالي</button><input type="hidden" id="lat"><input type="hidden" id="lng"><div id="locStatus" style="margin-top:8px;"></div></div><button type="submit" class="btn">تقديم الطلب</button></form></div><script>const tg=Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';const phoneRegex=/^09[0-9]{8}$/;document.getElementById('phone').addEventListener('input',e=>{const v=e.target.value.trim();const fb=document.getElementById('phoneFeedback');if(phoneRegex.test(v)){fb.innerHTML='✅ رقم صحيح';fb.style.color='#27ae60'}else{fb.innerHTML='❌ يجب أن يبدأ بـ09 ويتكون من 10 أرقام';fb.style.color='#e74c3c'}});function getLocation(){const s=document.getElementById('locStatus');s.innerHTML='جاري تحديد الموقع...';if(!navigator.geolocation){s.innerHTML='❌ متصفحك لا يدعم تحديد الموقع';return}navigator.geolocation.getCurrentPosition(p=>{document.getElementById('lat').value=p.coords.latitude;document.getElementById('lng').value=p.coords.longitude;s.innerHTML=`✅ تم تحديد الموقع`;},e=>{s.innerHTML=`❌ فشل: ${e.message}`;})}async function load(){const[c,ct]=await Promise.all([fetch(`${API}/api/categories`),fetch(`${API}/api/cities`)]);const cats=await c.json(),cities=await ct.json();const cs=document.getElementById('cat'),cis=document.getElementById('city');cats.forEach(x=>cs.add(new Option(x.name,x.id)));cities.forEach(x=>cis.add(new Option(x.name,x.id)))}document.getElementById('f').onsubmit=async e=>{e.preventDefault();const payments=[];document.querySelectorAll('input[type=checkbox]:checked').forEach(cb=>payments.push(cb.value));const d={name:document.getElementById('name').value,shop_name:document.getElementById('shop').value,phone:document.getElementById('phone').value,email:document.getElementById('email').value,address:document.getElementById('addr').value,city_id:document.getElementById('city').value,min_order:parseFloat(document.getElementById('minOrder').value)||0,working_hours:document.getElementById('workingHours').value,payment_methods:payments,category_id:document.getElementById('cat').value,latitude:document.getElementById('lat').value||null,longitude:document.getElementById('lng').value||null};tg.MainButton.showProgress();try{const r=await fetch(`${API}/api/register/shop`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify(d)});if(!r.ok)throw new Error((await r.json()).error);tg.showAlert('✅ تم تقديم الطلب!');tg.close()}catch(e){tg.MainButton.hideProgress();tg.showAlert('❌ '+e.message)}};load();if(typeof lucide!=='undefined')lucide.createIcons()</script></body></html>
