<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين | تسجيل متجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);padding:20px}.form-group{margin-bottom:20px}label{display:block;margin-bottom:8px;font-weight:500}input,select{width:100%;padding:16px;border-radius:16px;border:1px solid #ccc;background:var(--tg-theme-secondary-bg-color,#fff);color:inherit}.btn{background:#e67e22;color:#fff;border:none;padding:18px;border-radius:60px;width:100%;font-size:1.2rem;font-weight:700;margin-top:20px;cursor:pointer}</style></head><body><button onclick="history.back()" style="background:transparent;border:none;color:#e67e22;font-size:1.2rem;margin-bottom:16px">← العودة</button><h2>🏪 تسجيل متجر جديد</h2><form id="registerForm"><div class="form-group"><label>اسمك الكامل</label><input id="name" required></div><div class="form-group"><label>اسم المتجر</label><input id="shopName" required></div><div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" required></div><div class="form-group"><label>المدينة</label><select id="city" required></select></div><div class="form-group"><label>العنوان</label><input id="address" required></div><div class="form-group"><label>الفئة</label><select id="category" required></select></div><button type="submit" class="btn">تقديم الطلب</button></form><script>const tg=window.Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';async function loadData(){try{const[catRes,cityRes]=await Promise.all([fetch(`${API}/api/categories`),fetch(`${API}/api/cities`)]);if(!catRes.ok||!cityRes.ok)throw new Error('تعذر تحميل البيانات');const cats=await catRes.json();const cities=await cityRes.json();const catSel=document.getElementById('category');cats.forEach(c=>catSel.add(new Option(c.name,c.id)));const citySel=document.getElementById('city');cities.forEach(c=>citySel.add(new Option(c.name,c.id)))}catch(e){tg.showAlert(`⚠️ ${e.message}`)}}document.getElementById('registerForm').onsubmit=async e=>{e.preventDefault();const data={name:document.getElementById('name').value,shop_name:document.getElementById('shopName').value,phone:document.getElementById('phone').value,address:document.getElementById('address').value,category_id:document.getElementById('category').value,city_id:document.getElementById('city').value};tg.MainButton.showProgress();try{const res=await fetch(`${API}/api/register/shop`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify(data)});if(!res.ok){const err=await res.json();throw new Error(err.error||'فشل التسجيل')}tg.showAlert('تم تقديم الطلب بنجاح!');tg.close()}catch(e){tg.MainButton.hideProgress();tg.showAlert(`❌ ${e.message}`)}};loadData()</script></body></html>
