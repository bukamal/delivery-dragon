<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | تسجيل متجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="styles.css"></head><body><div class="app-header"><button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button><h1>🦅 شاهين</h1></div><div class="container"><h2><i data-lucide="store"></i> تسجيل متجر</h2><form id="f"><div class="form-group"><label>اسمك الكامل</label><input id="name" placeholder="مثال: أحمد محمد" required></div><div class="form-group"><label>اسم المتجر</label><input id="shop" placeholder="مثال: مطعم الشام" required></div><div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" placeholder="09xxxxxxxx" required><div id="phoneFeedback" class="feedback" style="font-size:var(--text-xs);margin-top:4px;"></div></div><div class="form-group"><label>المدينة</label><select id="city" required></select></div><div class="form-group"><label>العنوان التفصيلي</label><input id="addr" placeholder="الشارع، البناء..." required></div><div class="form-group"><label>الفئة</label><select id="cat" required></select></div><div class="form-group"><label>موقع المتجر على الخريطة</label><button type="button" class="btn btn-outline btn-block" onclick="getLocation()"><i data-lucide="map-pin"></i> تحديد الموقع الحالي</button><input type="hidden" id="lat"><input type="hidden" id="lng"><div id="locStatus" style="margin-top:8px;"></div></div><button type="submit" class="btn btn-block">تقديم الطلب</button></form></div><script>const tg=Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';const phoneRegex=/^09[0-9]{8}$/;document.getElementById('phone').addEventListener('input',e=>{const v=e.target.value.trim();const fb=document.getElementById('phoneFeedback');if(phoneRegex.test(v)){fb.innerHTML='✅ رقم صحيح';fb.style.color='var(--success)'}else{fb.innerHTML='❌ يجب أن يبدأ بـ09 ويتكون من 10 أرقام';fb.style.color='var(--danger)'}});function getLocation(){const s=document.getElementById('locStatus');s.innerHTML='جاري تحديد الموقع...';if(!navigator.geolocation){s.innerHTML='❌ متصفحك لا يدعم تحديد الموقع';return}navigator.geolocation.getCurrentPosition(p=>{document.getElementById('lat').value=p.coords.latitude;document.getElementById('lng').value=p.coords.longitude;s.innerHTML=`✅ تم تحديد الموقع`;},e=>{s.innerHTML=`❌ فشل: ${e.message}`;})}async function load(){const[c,ct]=await Promise.all([fetch(`${API}/api/categories`),fetch(`${API}/api/cities`)]);const cats=await c.json(),cities=await ct.json();const cs=document.getElementById('cat'),cis=document.getElementById('city');cats.forEach(x=>cs.add(new Option(x.name,x.id)));cities.forEach(x=>cis.add(new Option(x.name,x.id)))}document.getElementById('f').onsubmit=async e=>{e.preventDefault();const d={name:document.getElementById('name').value,shop_name:document.getElementById('shop').value,phone:document.getElementById('phone').value,address:document.getElementById('addr').value,city_id:document.getElementById('city').value,category_id:document.getElementById('cat').value,latitude:document.getElementById('lat').value||null,longitude:document.getElementById('lng').value||null};tg.MainButton.showProgress();try{const r=await fetch(`${API}/api/register/shop`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify(d)});if(!r.ok)throw new Error((await r.json()).error);tg.showAlert('✅ تم تقديم الطلب!');tg.close()}catch(e){tg.MainButton.hideProgress();tg.showAlert('❌ '+e.message)}};load();if(typeof lucide!=='undefined')lucide.createIcons()</script></body></html>
