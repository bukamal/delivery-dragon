<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>شاهين | لوحة السائق</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf2 100%); color: #1e1e2f; }
    .app-header { display:flex; align-items:center; padding:20px 24px; background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); border-bottom:1px solid rgba(0,0,0,0.04); }
    .app-header h1 { font-size:2rem; font-weight:800; background: linear-gradient(135deg, #e67e22, #f39c12); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .back-btn { background:none; border:none; color:#e67e22; font-size:2rem; cursor:pointer; }
    .online-toggle { display:flex; align-items:center; gap:10px; margin-right:auto; }
    .switch { position:relative; display:inline-block; width:50px; height:24px; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; transition:.3s; border-radius:24px; }
    .slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background:#fff; transition:.3s; border-radius:50%; }
    input:checked + .slider { background:#27ae60; }
    input:checked + .slider:before { transform:translateX(26px); }
    .container { padding:20px; max-width:600px; margin:0 auto; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
    .stat-item { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border-radius:20px; padding:14px; text-align:center; }
    .stat-value { font-size:1.6rem; font-weight:800; color:#e67e22; }
    .tabs { display:flex; gap:10px; margin-bottom:20px; }
    .tab { flex:1; padding:14px; background:rgba(255,255,255,0.5); border-radius:40px; text-align:center; cursor:pointer; }
    .tab.active { background:#e67e22; color:#fff; }
    .panel { display:none; }
    .panel.active { display:block; }
    .order-card { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border-radius:24px; padding:18px; margin-bottom:14px; }
    .btn { background:#e67e22; color:#fff; border:none; padding:14px; border-radius:40px; cursor:pointer; font-weight:600; }
    .btn-danger { background:#e74c3c; }
    .code-box { background:#f1c40f; padding:18px; border-radius:24px; margin:18px 0; text-align:center; }
    .code-value { font-size:2.5rem; font-weight:800; letter-spacing:10px; }
    .map-mini { height:130px; border-radius:20px; background:#e0e4e8; margin:14px 0; }
    .skeleton { height:140px; background:linear-gradient(90deg,#e0e4e8 25%,#f0f2f5 50%,#e0e4e8 75%); background-size:200% 100%; animation:loading 1.5s infinite; border-radius:24px; }
    @keyframes loading { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
<div class="app-header">
  <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button>
  <h1>🦅 لوحة السائق</h1>
  <div class="online-toggle">
    <span id="onlineStatus">🟢 متصل</span>
    <label class="switch"><input type="checkbox" id="onlineSwitch" checked><span class="slider"></span></label>
  </div>
</div>
<div class="container">
  <div class="stats-grid">
    <div class="stat-item"><span class="stat-value" id="todayOrders">0</span><br>طلبات اليوم</div>
    <div class="stat-item"><span class="stat-value" id="todayEarnings">0</span><br>ل.س اليوم</div>
    <div class="stat-item"><span class="stat-value" id="rating">-</span><br>التقييم</div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="available">🟢 المتاحة</div>
    <div class="tab" data-tab="active">🔵 نشطة</div>
    <div class="tab" data-tab="history">📋 السجل</div>
    <div class="tab" data-tab="support">💬 الدعم</div>
  </div>
  <div id="availablePanel" class="panel active"></div>
  <div id="activePanel" class="panel"></div>
  <div id="historyPanel" class="panel"></div>
  <div id="supportPanel" class="panel"><div class="card" style="text-align:center; padding:40px;"><h3>الدعم الفني</h3><button class="btn" onclick="location.href='support.html'">فتح المحادثة</button></div></div>
</div>

<script>
  const tg = Telegram.WebApp; tg.ready();
  if (tg.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(() => history.back()); }
  const API = 'https://delivery-dragon.vercel.app';
  let currentPosition = null;
  const onlineSwitch = document.getElementById('onlineSwitch'), onlineStatus = document.getElementById('onlineStatus');
  
  async function setOnlineStatus(isOnline) { await fetch(`${API}/api/rider/online-status`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({is_online:isOnline})}); }
  (async function init() { onlineStatus.innerHTML = '🟢 متصل'; onlineSwitch.checked = true; await setOnlineStatus(true); loadStats(); loadAvailable(); })();
  onlineSwitch.onchange = async () => { const isOnline = onlineSwitch.checked; onlineStatus.innerHTML = isOnline ? '🟢 متصل' : '🔴 غير متصل'; await setOnlineStatus(isOnline); if (document.querySelector('.tab.active').dataset.tab === 'available') loadAvailable(); };
  
  function getCurrentPosition() { return new Promise(resolve => { if(!navigator.geolocation) return resolve(null); navigator.geolocation.getCurrentPosition(p => { currentPosition = {lat:p.coords.latitude, lng:p.coords.longitude}; resolve(currentPosition); }, () => resolve(null), {maximumAge:60000}); }); }
  function calculateDistance(lat1,lon1,lat2,lon2) { const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180; const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2); return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1); }
  
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.onclick = () => { tabs.forEach(x=>x.classList.remove('active')); t.classList.add('active'); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById(t.dataset.tab+'Panel').classList.add('active'); if(t.dataset.tab==='available') loadAvailable(); else if(t.dataset.tab==='active') loadActive(); else if(t.dataset.tab==='history') loadHistory(); });
  
  async function loadStats() { const r = await fetch(`${API}/api/rider/stats`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const s = await r.json(); document.getElementById('todayOrders').innerText = s.today_orders||0; document.getElementById('todayEarnings').innerText = s.today_earnings||0; document.getElementById('rating').innerText = s.rating ? parseFloat(s.rating).toFixed(1) : '-'; }
  
  async function loadAvailable() {
    const c = document.getElementById('availablePanel'); c.innerHTML = '<div class="skeleton"></div>';
    if (!onlineSwitch.checked) { c.innerHTML = '<div style="text-align:center;padding:40px"><h3>🔴 غير متصل</h3></div>'; return; }
    try {
      await getCurrentPosition();
      const res = await fetch(`${API}/api/rider/available-orders`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const orders = await res.json();
      if(!orders.length) { c.innerHTML = '<div style="text-align:center;padding:40px">لا توجد طلبات متاحة</div>'; return; }
      let html = '';
      orders.forEach(o => {
        let dist = '-', eta = '-';
        if (currentPosition && o.shop_lat && o.shop_lng) { const d = calculateDistance(currentPosition.lat, currentPosition.lng, o.shop_lat, o.shop_lng); dist = `${d} كم`; eta = `${Math.round(d*3)} دقيقة`; }
        html += `<div class="order-card"><div class="flex-between"><div><b>#${o.id}</b> - ${o.shop_name}</div><span>${o.delivery_fee} ل.س</span></div><div>📍 ${o.address||o.shop_address}</div><div class="flex-between"><span>${dist}</span><span>${eta}</span></div><div class="flex" style="margin-top:12px;"><button class="btn" onclick="accept('${o.id}')">قبول</button><button class="btn btn-danger" onclick="reject('${o.id}')">رفض</button></div></div>`;
      });
      c.innerHTML = html;
    } catch(e) { c.innerHTML = `<div class="error">❌ ${e.message}</div>`; }
    if(typeof lucide !== 'undefined') lucide.createIcons();
  }
  
  window.accept = async id => { tg.HapticFeedback.impactOccurred('heavy'); await fetch(`${API}/api/rider/accept-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})}); loadAvailable(); loadActive(); loadStats(); document.querySelector('[data-tab="active"]').click(); };
  window.reject = async id => { tg.showConfirm('رفض الطلب؟', async ok => { if(ok) await fetch(`${API}/api/rider/reject-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})}); loadAvailable(); }); };
  
  async function loadActive() {
    const c = document.getElementById('activePanel'); c.innerHTML = '<div class="skeleton"></div>';
    const r = await fetch(`${API}/api/rider/active-order`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const o = await r.json();
    if(!o) { c.innerHTML = '<div style="text-align:center;padding:40px">لا يوجد طلب نشط</div>'; return; }
    const s = await fetch(`${API}/api/orders/${o.id}/status`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const st = await s.json();
    c.innerHTML = `<div class="order-card"><b>#${o.id}</b> - ${o.shop_name}<br>📞 ${o.customer_phone||''}<br>📍 ${o.address}<br>💰 ${o.delivery_fee} ل.س
      <div class="code-box"><div>🔐 كود التأكيد</div><div class="code-value">${o.confirmation_code||'----'}</div>${st.code_verified?'<span class="verified-badge">✅ تم التحقق</span>':'<span>⏳ بانتظار الكود</span>'}</div>
      <button class="btn" onclick="complete(${o.id})" ${!st.code_verified?'disabled':''}>تم التوصيل</button>
      <button class="btn btn-danger" onclick="cancelOrder(${o.id})">تعذر التوصيل</button>
    </div>`;
    if(o.shop_lat&&o.shop_lng&&o.delivery_lat&&o.delivery_lng){ setTimeout(()=>{ const mapEl=document.createElement('div'); mapEl.className='map-mini'; c.querySelector('.order-card').appendChild(mapEl); const map=L.map(mapEl).setView([o.shop_lat,o.shop_lng],13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); L.marker([o.shop_lat,o.shop_lng]).addTo(map).bindPopup('🏪'); L.marker([o.delivery_lat,o.delivery_lng]).addTo(map).bindPopup('📍'); },100); }
  }
  window.complete = async id => { await fetch(`${API}/api/rider/complete-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})}); loadActive(); loadStats(); document.querySelector('[data-tab="available"]').click(); };
  window.cancelOrder = async id => { tg.showConfirm('تعذر التوصيل؟', async ok => { if(ok) await fetch(`${API}/api/rider/cancel-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})}); loadActive(); loadAvailable(); }); };
  
  async function loadHistory() {
    const c = document.getElementById('historyPanel'); c.innerHTML = '<div class="skeleton"></div>';
    const r = await fetch(`${API}/api/rider/history`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const orders = await r.json();
    c.innerHTML = orders.length ? orders.map(o=>`<div class="order-card"><b>#${o.id}</b> - ${o.shop_name}<br>💰 ${o.total_price} ل.س<br>📅 ${new Date(o.created_at).toLocaleDateString('ar-SY')}</div>`).join('') : '<div style="text-align:center;padding:40px">لا سجل</div>';
  }
</script>
</body>
</html>
