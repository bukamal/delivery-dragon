<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة السائق</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal';background:#f5f7fb;padding:16px}.tab{display:flex;gap:10px}.tab-btn{flex:1;padding:12px;background:#ddd;border-radius:30px;text-align:center}.active{background:#e67e22;color:#fff}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px}.btn{background:#e67e22;color:#fff;border:none;padding:10px 20px;border-radius:30px}</style></head><body><h2>🛵 السائق</h2><div class="tab"><div class="tab-btn active" data-tab="available">المتاحة</div><div class="tab-btn" data-tab="active">النشطة</div></div><div id="availablePanel"></div><div id="activePanel" style="display:none"></div><script>const tg=Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';const tabs=document.querySelectorAll('.tab-btn');tabs.forEach(t=>t.onclick=()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');['availablePanel','activePanel'].forEach(p=>document.getElementById(p).style.display='none');document.getElementById(t.dataset.tab+'Panel').style.display='block';if(t.dataset.tab==='available')loadAvailable();else loadActive()});async function loadAvailable(){const r=await fetch(`${API}/api/rider/available-orders`,{headers:{'X-Telegram-Init-Data':tg.initData}});const orders=await r.json();document.getElementById('availablePanel').innerHTML=orders.map(o=>`<div class="card"><b>#${o.id}</b> - ${o.shop_name}<br>📍 ${o.zone_name} - ${o.address}<br>💰 ${o.delivery_fee} ل.س<br><button class="btn" onclick="accept('${o.id}')">قبول</button></div>`).join('')||'<p>لا طلبات</p>'}window.accept=async id=>{await fetch(`${API}/api/rider/accept-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})});loadAvailable();loadActive()};async function loadActive(){const r=await fetch(`${API}/api/rider/active-order`,{headers:{'X-Telegram-Init-Data':tg.initData}});const o=await r.json();if(!o){document.getElementById('activePanel').innerHTML='<p>لا طلب نشط</p>';return}document.getElementById('activePanel').innerHTML=`<div class="card"><b>#${o.id}</b> - ${o.shop_name}<br>📍 ${o.address}<br>💰 ${o.delivery_fee} ل.س<br><button class="btn" onclick="complete(${o.id})">✅ تم التوصيل</button><button class="btn" style="background:#e74c3c" onclick="cancel(${o.id})">❌ إلغاء</button></div>`}window.complete=async id=>{await fetch(`${API}/api/rider/complete-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})});loadActive()};window.cancel=async id=>{await fetch(`${API}/api/rider/cancel-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})});loadActive();loadAvailable()};loadAvailable();setInterval(()=>{if(document.querySelector('.tab-btn.active').dataset.tab==='available')loadAvailable();else loadActive()},10000)</script></body></html>
