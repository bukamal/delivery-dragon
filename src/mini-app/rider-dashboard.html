<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين | لوحة السائق</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);padding:16px}.tabs{display:flex;gap:10px;margin-bottom:20px}.tab{flex:1;padding:14px;background:var(--tg-theme-secondary-bg-color,#ddd);border-radius:30px;text-align:center;cursor:pointer;font-weight:500}.tab.active{background:#e67e22;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.02);border:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.03))}.btn{background:#e67e22;color:#fff;border:none;padding:12px 20px;border-radius:40px;cursor:pointer;margin-right:8px}.btn-danger{background:#e74c3c}.skeleton-order{height:150px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px;margin-bottom:16px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><h2>🛵 لوحة السائق</h2><div class="tabs"><div class="tab active" data-tab="available">الطلبات المتاحة</div><div class="tab" data-tab="active">طلباتي النشطة</div></div><div id="availablePanel" class="panel active"><div id="availableContainer"><div class="skeleton-order"></div><div class="skeleton-order"></div></div></div><div id="activePanel" class="panel"><div id="activeContainer"><div class="skeleton-order"></div></div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(t.dataset.tab==='available'?'availablePanel':'activePanel').classList.add('active');if(t.dataset.tab==='available')loadAvailable();else loadActive()});async function loadAvailable(){const container=document.getElementById('availableContainer');try{const res=await fetch(`${API}/api/rider/available-orders`,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok)throw new Error('تعذر تحميل الطلبات');const orders=await res.json();if(!orders.length){container.innerHTML='<p>لا توجد طلبات متاحة حالياً.</p>';return}container.innerHTML=orders.map(o=>`<div class="card"><b>طلب #${o.id}</b> من ${o.shop_name}<br>إلى: ${o.zone_name} - ${o.address}<br>الأجرة: ${o.delivery_fee} ل.س<br><button class="btn" data-id="${o.id}" onclick="acceptOrder('${o.id}')">✅ قبول</button></div>`).join('')}catch(e){container.innerHTML=`<p style="color:red">⚠️ ${e.message}</p>`}}window.acceptOrder=async id=>{tg.showConfirm('قبول الطلب؟',async confirmed=>{if(confirmed){const res=await fetch(`${API}/api/rider/accept-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})});if(res.ok){tg.showAlert('تم قبول الطلب!');loadAvailable();loadActive()}else tg.showAlert('الطلب لم يعد متاحاً')}})};async function loadActive(){const container=document.getElementById('activeContainer');try{const res=await fetch(`${API}/api/rider/active-order`,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok)throw new Error('تعذر تحميل الطلب النشط');const order=await res.json();if(!order){container.innerHTML='<p>لا يوجد طلب نشط حالياً.</p>';return}container.innerHTML=`<div class="card"><b>طلب #${order.id}</b> من ${order.shop_name}<br>📞 ${order.customer_phone||'لا يوجد'}<br>📍 العنوان: ${order.address}<br>💰 الأجرة: ${order.delivery_fee} ل.س<br><button class="btn" onclick="completeOrder(${order.id})">✅ تم التوصيل</button><button class="btn btn-danger" onclick="cancelOrder(${order.id})">❌ إلغاء</button></div>`}catch(e){container.innerHTML=`<p style="color:red">⚠️ ${e.message}</p>`}}window.completeOrder=async id=>{tg.showConfirm('تأكيد إتمام التوصيل؟',async confirmed=>{if(confirmed){const res=await fetch(`${API}/api/rider/complete-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})});if(res.ok){tg.showAlert('تم إنهاء الرحلة بنجاح!');loadActive()}else tg.showAlert('خطأ في إنهاء الطلب')}})};window.cancelOrder=async id=>{tg.showConfirm('إلغاء الطلب؟ سيعود متاحاً للسائقين الآخرين.',async confirmed=>{if(confirmed){const res=await fetch(`${API}/api/rider/cancel-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})});if(res.ok){tg.showAlert('تم إلغاء الطلب');loadActive();loadAvailable()}else tg.showAlert('خطأ في الإلغاء')}})};loadAvailable();setInterval(()=>{if(document.querySelector('.tab.active').dataset.tab==='available')loadAvailable();else loadActive()},10000)</script></body></html>
