<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - لوحة السائق</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:#f5f7fa;padding:16px}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px}.btn{background:#e67e22;color:#fff;border:none;padding:12px 20px;border-radius:40px;cursor:pointer;margin-right:8px}</style></head><body><h2>🛵 الطلبات المتاحة</h2><div id="ordersContainer"></div><script>const tg=window.Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';async function loadOrders(){const res=await fetch(`${API}/api/rider/available-orders`,{headers:{'X-Telegram-Init-Data':tg.initData}});const orders=await res.json();document.getElementById('ordersContainer').innerHTML=orders.map(o=>`<div class="card"><b>#${o.id}</b> من ${o.shop_name}<br>إلى: ${o.zone_name} - ${o.address}<br>الأجرة: ${o.delivery_fee} ل.س<div style="margin-top:12px"><button class="btn" data-id="${o.id}" onclick="acceptOrder('${o.id}')">✅ قبول</button></div></div>`).join('')}window.acceptOrder=async id=>{const res=await fetch(`${API}/api/rider/accept-order`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({order_id:id})});if(res.ok){tg.showAlert('تم قبول الطلب!');loadOrders()}else tg.showAlert('الطلب لم يعد متاحاً')};loadOrders();setInterval(loadOrders,10000)</script></body></html>
