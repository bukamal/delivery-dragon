<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | لوحة التاجر</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .option-row { display: flex; gap: var(--space-2); align-items: center; margin-bottom: var(--space-2); }
    .image-preview { max-width: 150px; max-height: 150px; border-radius: var(--radius-md); margin-top: var(--space-2); }
    .category-item { background: var(--tg-theme-secondary-bg-color, #fff); padding: var(--space-3); border-radius: var(--radius-md); margin-bottom: var(--space-2); display: flex; align-items: center; gap: var(--space-2); }
    .order-accordion { border-bottom: 1px solid var(--gray-200); }
    .order-header { padding: var(--space-3); cursor: pointer; display: flex; justify-content: space-between; }
    .order-details { padding: var(--space-3); background: var(--gray-100); display: none; }
    .order-details.open { display: block; }
  </style>
</head>
<body>
<div class="shop-layout">
  <!-- الشريط الجانبي -->
  <div class="shop-sidebar" id="sidebar">
    <div class="sidebar-header">🏪 متجري</div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link active" data-page="overview"><i data-lucide="layout-dashboard"></i><span>نظرة عامة</span></a>
      <a href="#" class="sidebar-link" data-page="orders"><i data-lucide="shopping-bag"></i><span>الطلبات</span></a>
      <a href="#" class="sidebar-link" data-page="products"><i data-lucide="package"></i><span>المنتجات</span></a>
      <a href="#" class="sidebar-link" data-page="categories"><i data-lucide="folder"></i><span>التصنيفات</span></a>
      <a href="#" class="sidebar-link" data-page="settings"><i data-lucide="settings"></i><span>الإعدادات</span></a>
      <a href="#" class="sidebar-link" data-page="support"><i data-lucide="message-circle"></i><span>الدعم</span></a>
    </nav>
  </div>
  
  <!-- المحتوى الرئيسي -->
  <div class="shop-main">
    <div class="app-header">
      <button class="sidebar-toggle" id="sidebarToggle"><i data-lucide="menu"></i></button>
      <h1 id="pageTitle">نظرة عامة</h1>
      <div style="width:40px;"></div>
    </div>
    <div class="shop-content" id="shopContent">
      <!-- المحتوى الديناميكي -->
    </div>
  </div>
</div>

<!-- مودال المنتج -->
<div id="productModal" class="modal" style="display:none">
  <div class="modal-content">
    <h3 id="modalTitle">إضافة منتج</h3>
    <input type="hidden" id="productId">
    <div class="form-group"><label>اسم المنتج</label><input type="text" id="productName"></div>
    <div class="form-group"><label>السعر (ل.س)</label><input type="number" id="productPrice"></div>
    <div class="form-group"><label>التصنيف</label><select id="productCategory"></select></div>
    <div class="form-group"><label>صورة المنتج</label><input type="file" id="productImage" accept="image/*"><img id="imagePreview" style="max-width:100%; display:none;"></div>
    <div class="form-group"><label>الخيارات</label><div id="optionsContainer"></div><button type="button" class="btn btn-outline btn-block" onclick="addOptionRow()">➕ إضافة خيار</button></div>
    <button class="btn btn-block" onclick="saveProduct()">حفظ</button>
    <button class="btn btn-block" onclick="closeProductModal()" style="background:var(--gray-500);">إلغاء</button>
  </div>
</div>

<!-- مودال التصنيف -->
<div id="categoryModal" class="modal" style="display:none">
  <div class="modal-content">
    <h3 id="categoryModalTitle">إضافة تصنيف</h3>
    <input type="hidden" id="categoryId">
    <div class="form-group"><label>اسم التصنيف</label><input type="text" id="categoryName"></div>
    <div class="form-group"><label>ترتيب العرض</label><input type="number" id="categoryOrder" value="0"></div>
    <button class="btn btn-block" onclick="saveCategory()">حفظ</button>
    <button class="btn btn-block" onclick="closeCategoryModal()" style="background:var(--gray-500);">إلغاء</button>
  </div>
</div>

<script>
  const tg = Telegram.WebApp; tg.ready(); tg.BackButton.show(); tg.BackButton.onClick(() => history.back());
  const API = 'https://delivery-dragon.vercel.app';
  let productCategories = [], editingProduct = null;
  
  const sidebar = document.getElementById('sidebar');
  const toggleBtn = document.getElementById('sidebarToggle');
  const links = document.querySelectorAll('.sidebar-link');
  const pageTitle = document.getElementById('pageTitle');
  const contentArea = document.getElementById('shopContent');
  
  toggleBtn.onclick = () => sidebar.classList.toggle('open');
  
  links.forEach(link => {
    link.onclick = (e) => {
      e.preventDefault();
      links.forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      const page = link.dataset.page;
      pageTitle.innerText = link.querySelector('span')?.innerText || link.innerText.trim();
      loadPage(page);
      if (window.innerWidth <= 768) sidebar.classList.remove('open');
    };
  });
  
  async function loadPage(page) {
    switch(page) {
      case 'overview': loadOverview(); break;
      case 'orders': loadOrders(false); break;
      case 'products': loadProducts(); break;
      case 'categories': loadCategoriesList(); break;
      case 'settings': loadSettings(); break;
      case 'support': contentArea.innerHTML = '<div class="card" style="text-align:center"><h3>الدعم الفني</h3><p>تواصل معنا عبر صفحة الدعم</p><button class="btn" onclick="location.href=\'support.html\'">فتح الدعم</button></div>'; break;
    }
  }
  
  // نظرة عامة
  async function loadOverview() {
    contentArea.innerHTML = '<div class="skeleton" style="height:200px;"></div>';
    try {
      const [statsRes, ordersRes] = await Promise.all([
        fetch(`${API}/api/shop/stats`, { headers: { 'X-Telegram-Init-Data': tg.initData } }),
        fetch(`${API}/api/shop/orders?archived=false`, { headers: { 'X-Telegram-Init-Data': tg.initData } })
      ]);
      const stats = await statsRes.json();
      const orders = await ordersRes.json();
      contentArea.innerHTML = `
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-value">${stats.today_orders || 0}</div><div class="kpi-label">طلبات اليوم</div></div>
          <div class="kpi-card"><div class="kpi-value">${stats.today_revenue || 0} ل.س</div><div class="kpi-label">إيرادات اليوم</div></div>
          <div class="kpi-card"><div class="kpi-value">${stats.active_orders || 0}</div><div class="kpi-label">طلبات نشطة</div></div>
        </div>
        <div class="card">
          <h3>📋 آخر الطلبات</h3>
          ${orders.slice(0,5).map(o => `<div class="flex-between"><span>#${o.id} - ${o.customer_name}</span><span class="badge badge-${o.status}">${o.status}</span></div>`).join('') || '<p>لا توجد طلبات</p>'}
        </div>
      `;
    } catch(e) { contentArea.innerHTML = '<div class="empty-state">تعذر تحميل البيانات</div>'; }
  }
  
  // المنتجات
  async function loadProducts() {
    contentArea.innerHTML = '<div class="skeleton" style="height:200px;"></div>';
    const res = await fetch(`${API}/api/shop/products`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const products = await res.json();
    let html = `
      <div class="flex-between" style="margin-bottom:16px;">
        <div class="search-bar"><input type="text" id="productSearch" placeholder="بحث عن منتج..."></div>
        <button class="btn" onclick="openProductModal()"><i data-lucide="plus"></i> إضافة</button>
      </div>
      <div class="product-grid" id="productGrid">
    `;
    products.forEach(p => {
      html += `<div class="product-card">
        ${p.image_url ? `<img src="${p.image_url}">` : '<div style="height:160px; background:var(--gray-200);"></div>'}
        <div class="product-info">
          <b>${p.name}</b>
          <div class="price">${p.price} ل.س</div>
          <div class="flex" style="margin-top:8px;">
            <button class="btn" onclick="editProduct(${p.id})">✏️</button>
            <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️</button>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
    contentArea.innerHTML = html;
    document.getElementById('productSearch')?.addEventListener('input', e => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.product-card').forEach(card => card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none');
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  
  function addOptionRow(optName='', optPrice='') {
    const div = document.createElement('div'); div.className = 'option-row';
    div.innerHTML = `<input type="text" placeholder="اسم الخيار" value="${optName}" class="opt-name" style="flex:2"><input type="number" placeholder="السعر الإضافي" value="${optPrice}" class="opt-price" style="flex:1"><button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">🗑️</button>`;
    document.getElementById('optionsContainer').appendChild(div);
  }
  function openProductModal(product=null) {
    editingProduct = product;
    document.getElementById('modalTitle').innerText = product ? 'تعديل منتج' : 'إضافة منتج';
    document.getElementById('productId').value = product?.id || '';
    document.getElementById('productName').value = product?.name || '';
    document.getElementById('productPrice').value = product?.price || '';
    document.getElementById('optionsContainer').innerHTML = '';
    if (product?.options) { try { const opts = typeof product.options === 'string' ? JSON.parse(product.options) : product.options; if (Array.isArray(opts)) opts.forEach(o => addOptionRow(o.name, o.price)); } catch(e) {} }
    const preview = document.getElementById('imagePreview');
    if (product?.image_url) { preview.src = product.image_url; preview.style.display = 'block'; } else { preview.style.display = 'none'; }
    loadProductCategoriesForSelect(product?.category_id);
    document.getElementById('productModal').style.display = 'flex';
  }
  async function loadProductCategoriesForSelect(selectedId = null) {
    const res = await fetch(`${API}/api/shop/product-categories`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    productCategories = await res.json();
    const sel = document.getElementById('productCategory'); sel.innerHTML = '<option value="">بدون تصنيف</option>';
    productCategories.forEach(c => { const option = new Option(c.name, c.id); if (c.id === selectedId) option.selected = true; sel.add(option); });
  }
  function closeProductModal() { document.getElementById('productModal').style.display = 'none'; editingProduct = null; }
  async function saveProduct() {
    const id = document.getElementById('productId').value, name = document.getElementById('productName').value.trim(), price = parseFloat(document.getElementById('productPrice').value), category_id = document.getElementById('productCategory').value;
    if (!name || isNaN(price)) return tg.showAlert('يرجى إدخال اسم المنتج وسعر صحيح');
    const options = []; document.querySelectorAll('.option-row').forEach(row => { const optName = row.querySelector('.opt-name')?.value.trim(); const optPrice = parseFloat(row.querySelector('.opt-price')?.value) || 0; if (optName) options.push({ name: optName, price: optPrice }); });
    let image = null; const fileInput = document.getElementById('productImage');
    if (fileInput.files.length > 0) { const file = fileInput.files[0]; if (file.size > 5 * 1024 * 1024) return tg.showAlert('حجم الصورة كبير جداً. الحد الأقصى 5 ميجابايت.'); const reader = new FileReader(); reader.onload = async (e) => { image = e.target.result; await submitProduct({ name, price, category_id: category_id || null, image, options: options.length ? JSON.stringify(options) : null }); }; reader.readAsDataURL(file); return; }
    else if (editingProduct?.image_url) image = editingProduct.image_url;
    await submitProduct({ name, price, category_id: category_id || null, image, options: options.length ? JSON.stringify(options) : null });
  }
  async function submitProduct(data) {
    const id = document.getElementById('productId').value, url = id ? `${API}/api/shop/products/${id}` : `${API}/api/shop/products`, method = id ? 'PUT' : 'POST';
    try { const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData }, body: JSON.stringify(data) }); if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'فشل الحفظ'); } closeProductModal(); loadProducts(); }
    catch (error) { tg.showAlert('❌ ' + error.message); }
  }
  window.editProduct = async (id) => { const res = await fetch(`${API}/api/shop/products/${id}`, { headers: { 'X-Telegram-Init-Data': tg.initData } }); if (res.ok) { const product = await res.json(); openProductModal(product); } else tg.showAlert('تعذر تحميل بيانات المنتج'); };
  window.deleteProduct = async (id) => { tg.showConfirm('حذف المنتج؟', async ok => { if (!ok) return; const res = await fetch(`${API}/api/shop/products/${id}`, { method: 'DELETE', headers: { 'X-Telegram-Init-Data': tg.initData } }); if (res.ok) loadProducts(); else tg.showAlert('فشل الحذف'); }); };
  
  // التصنيفات
  async function loadCategoriesList() {
    const res = await fetch(`${API}/api/shop/product-categories`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const cats = await res.json();
    let html = `<button class="btn btn-block" onclick="openCategoryModal()">➕ إضافة تصنيف</button><div id="categoryList" style="margin-top:16px;">`;
    cats.forEach(c => { html += `<div class="category-item"><span style="flex:1">${c.name} (ترتيب: ${c.display_order})</span><button class="btn" onclick="editCategory(${c.id},'${c.name}',${c.display_order})">✏️</button><button class="btn btn-danger" onclick="deleteCategory(${c.id})">🗑️</button></div>`; });
    html += '</div>';
    contentArea.innerHTML = html;
  }
  function openCategoryModal(id=null, name='', order=0) { document.getElementById('categoryModalTitle').innerText = id ? 'تعديل تصنيف' : 'إضافة تصنيف'; document.getElementById('categoryId').value = id || ''; document.getElementById('categoryName').value = name; document.getElementById('categoryOrder').value = order; document.getElementById('categoryModal').style.display = 'flex'; }
  window.editCategory = (id, name, order) => openCategoryModal(id, name, order);
  window.closeCategoryModal = () => document.getElementById('categoryModal').style.display = 'none';
  async function saveCategory() {
    const id = document.getElementById('categoryId').value, name = document.getElementById('categoryName').value.trim(), display_order = parseInt(document.getElementById('categoryOrder').value) || 0;
    if (!name) return tg.showAlert('اسم التصنيف مطلوب');
    const url = id ? `${API}/api/shop/product-categories/${id}` : `${API}/api/shop/product-categories`, method = id ? 'PUT' : 'POST';
    try { const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData }, body: JSON.stringify({ name, display_order }) }); if (!res.ok) throw new Error((await res.json()).error); closeCategoryModal(); loadCategoriesList(); }
    catch (e) { tg.showAlert('❌ ' + e.message); }
  }
  window.deleteCategory = async (id) => { tg.showConfirm('حذف التصنيف؟', async ok => { if (!ok) return; const res = await fetch(`${API}/api/shop/product-categories/${id}`, { method: 'DELETE', headers: { 'X-Telegram-Init-Data': tg.initData } }); if (res.ok) loadCategoriesList(); else tg.showAlert('فشل الحذف'); }); };
  document.getElementById('addCategoryBtn')?.addEventListener('click', () => openCategoryModal());
  
  // الإعدادات
  async function loadSettings() {
    const res = await fetch(`${API}/api/shop/profile`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const shop = await res.json();
    contentArea.innerHTML = `
      <div class="card">
        <h3>📍 موقع المتجر</h3>
        <p id="currentLocation">${shop.latitude ? `✅ ${shop.latitude}, ${shop.longitude}` : '❌ غير محدد'}</p>
        <button class="btn btn-block" onclick="updateShopLocation()"><i data-lucide="map-pin"></i> تحديث الموقع</button>
      </div>
    `;
  }
  window.updateShopLocation = () => {
    if (!navigator.geolocation) { tg.showAlert('متصفحك لا يدعم تحديد الموقع'); return; }
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      const res = await fetch(`${API}/api/shop/location`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData }, body: JSON.stringify({ latitude: lat, longitude: lng }) });
      if (res.ok) { tg.showAlert('✅ تم تحديث موقع المتجر'); loadSettings(); }
      else { const err = await res.json(); tg.showAlert('❌ فشل التحديث: ' + (err.error || '')); }
    }, err => { tg.showAlert('❌ فشل تحديد الموقع: ' + err.message); });
  };
  
  // الطلبات
  async function loadOrders(archived=false) {
    const res = await fetch(`${API}/api/shop/orders?archived=${archived}`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
    const orders = await res.json();
    let html = `<div class="tabs"><button class="tab ${archived?'':'active'}" onclick="loadOrders(false)">النشطة</button><button class="tab ${archived?'active':''}" onclick="loadOrders(true)">المؤرشفة</button></div>`;
    orders.forEach(o => {
      let items = JSON.parse(o.items).map(i => `${i.name} ×${i.quantity}`).join('، ');
      html += `<div class="order-accordion"><div class="order-header" onclick="this.nextElementSibling.classList.toggle('open')"><span>#${o.id} - ${o.customer_name}</span><span class="badge">${o.status}</span></div><div class="order-details"><p>📦 ${items}</p><p>💰 ${o.total_price} ل.س</p>${!archived ? `<select onchange="updateOrderStatus(${o.id}, this.value)"><option value="preparing" ${o.status==='preparing'?'selected':''}>تحضير</option><option value="ready_for_pickup" ${o.status==='ready_for_pickup'?'selected':''}>جاهز</option></select>` : ''}</div></div>`;
    });
    contentArea.innerHTML = html;
  }
  window.updateOrderStatus = async (id, status) => { await fetch(`${API}/api/shop/orders/${id}/status`, { method:'POST', headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify({status}) }); loadOrders(false); };
  
  // البدء
  loadOverview();
  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
