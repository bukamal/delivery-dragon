<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | لوحة التاجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="https://unpkg.com/lucide@latest"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);color:var(--tg-theme-text-color,#1a1a2c);padding:0 0 20px}.app-header{display:flex;align-items:center;padding:16px 20px;background:var(--tg-theme-secondary-bg-color,#fff);border-bottom:1px solid #ddd;position:sticky;top:0;z-index:10}.app-header h1{font-size:1.7rem;color:#e67e22;margin-right:12px}.back-btn{background:0 0;border:none;color:#e67e22;font-size:1.8rem;cursor:pointer}.container{padding:16px;max-width:600px;margin:0 auto}.tabs{display:flex;gap:10px;margin-bottom:20px}.tab{flex:1;padding:14px;background:var(--tg-theme-secondary-bg-color,#fff);border-radius:30px;text-align:center;cursor:pointer;font-weight:500;border:1px solid #ddd}.tab.active{background:#e67e22;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.02)}.btn{background:#e67e22;color:#fff;border:none;padding:10px 20px;border-radius:30px;cursor:pointer}.btn-danger{background:#e74c3c}select{padding:8px;border-radius:12px;border:1px solid #ccc}.skeleton{height:150px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="app-header"><button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button><h1>🦅 شاهين</h1></div><div class="container"><h2>🏪 لوحة التحكم</h2><div class="tabs"><div class="tab active" data-tab="active">🟢 النشطة</div><div class="tab" data-tab="products">📦 المنتجات</div><div class="tab" data-tab="archive">📁 الأرشيف</div></div><div id="activePanel" class="panel active"></div><div id="productsPanel" class="panel"><button class="btn" id="addProductBtn" style="width:100%;margin-bottom:16px"><i data-lucide="plus"></i> إضافة منتج</button><div id="productsList"></div></div><div id="archivePanel" class="panel"></div></div><script>const tg=Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';const tabs=document.querySelectorAll('.tab');tabs.forEach(t=>t.onclick=()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');['activePanel','productsPanel','archivePanel'].forEach(p=>document.getElementById(p).classList.remove('active'));document.getElementById(t.dataset.tab+'Panel').classList.add('active');if(t.dataset.tab==='active')loadOrders(false);else if(t.dataset.tab==='archive')loadOrders(true)});function getStatusProgress(s){const steps=['paid','preparing','ready_for_pickup','delivering','completed'];const idx=steps.indexOf(s);const pct=idx>=0?(idx/(steps.length-1))*100:0;const labels={paid:'مدفوع',preparing:'تحضير',ready_for_pickup:'جاهز',delivering:'توصيل',completed:'مكتمل'};return{percent:pct,label:labels[s]||s}}async function loadOrders(archived){const c=document.getElementById(archived?'archivePanel':'activePanel');c.innerHTML='<div class="skeleton"></div>';const r=await fetch(`${API}/api/shop/orders?archived=${archived}`,{headers:{'X-Telegram-Init-Data':tg.initData}});const orders=await r.json();if(!orders.length){c.innerHTML='<div style="text-align:center;padding:40px"><svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16v16H4z"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg><h3>لا توجد طلبات</h3></div>';return}c.innerHTML=orders.map(o=>{const{percent,label}=getStatusProgress(o.status);let items=[];try{items=typeof o.items==='string'?JSON.parse(o.items):o.items}catch(e){}const itemsText=items.map(i=>`${i.name} ×${i.quantity}`).join('، ');const statusSelect=archived?'':`<select data-id="${o.id}" class="statusSelect"><option value="preparing" ${o.status==='preparing'?'selected':''}>تحضير</option><option value="ready_for_pickup" ${o.status==='ready_for_pickup'?'selected':''}>جاهز</option></select>`;const riderInfo=o.rider_name?`<br>🛵 السائق: ${o.rider_name}`:'';return`<div class="card"><b>#${o.id}</b> - ${o.customer_name}<br>📞 ${o.customer_phone||''}${riderInfo}<br>📦 ${itemsText}<br>💰 ${o.total_price} ل.س<br>📍 ${o.address}<div style="margin-top:12px"><div style="display:flex;justify-content:space-between;font-size:.8rem"><span>${label}</span><span>${Math.round(percent)}%</span></div><div style="background:var(--tg-theme-hint-color,#ddd);height:6px;border-radius:6px"><div style="width:${percent}%;background:#e67e22;height:6px;border-radius:6px"></div></div></div>${statusSelect}</div>`}).join('');if(!archived){document.querySelectorAll('.statusSelect').forEach(s=>s.onchange=async()=>{await fetch(`${API}/api/shop/orders/${s.dataset.id}/status`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({status:s.value})});loadOrders(false)})}}async function loadProducts(){const c=document.getElementById('productsList');c.innerHTML='<div class="skeleton"></div>';const r=await fetch(`${API}/api/shop/products`,{headers:{'X-Telegram-Init-Data':tg.initData}});const prods=await r.json();c.innerHTML=prods.map(p=>`<div class="card"><b>${p.name}</b> - ${p.price} ل.س <button class="btn btn-danger" onclick="deleteProduct(${p.id})"><i data-lucide="trash-2"></i></button></div>`).join('');if(typeof lucide!=='undefined')lucide.createIcons()}window.deleteProduct=async id=>{await fetch(`${API}/api/shop/products/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadProducts()};document.getElementById('addProductBtn').onclick=()=>{const n=prompt('اسم المنتج'),p=prompt('السعر');if(n&&p)fetch(`${API}/api/shop/products`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({name:n,price:p})}).then(loadProducts)};loadOrders(false);loadProducts()</script></body></html>
