<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | لوحة التاجر</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf2 100%); color: #1e1e2f; }
    .shop-layout { display:flex; height:100vh; }
    .shop-sidebar { width:280px; background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); border-left:1px solid rgba(0,0,0,0.04); display:flex; flex-direction:column; transition:0.3s; }
    .sidebar-header { padding:24px 20px; font-size:1.8rem; font-weight:800; color:#e67e22; border-bottom:1px solid rgba(0,0,0,0.04); }
    .sidebar-nav { flex:1; padding:16px; }
    .sidebar-link { display:flex; align-items:center; gap:14px; padding:14px 18px; border-radius:60px; color:#1e1e2f; text-decoration:none; margin-bottom:6px; font-weight:500; }
    .sidebar-link i { width:24px; height:24px; }
    .sidebar-link.active { background:#e67e22; color:#fff; }
    .shop-main { flex:1; overflow-y:auto; background:rgba(255,255,255,0.3); }
    .shop-main .app-header { display:flex; align-items:center; padding:20px 28px; background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); border-bottom:1px solid rgba(0,0,0,0.04); position:sticky; top:0; z-index:5; }
    .sidebar-toggle { background:none; border:none; margin-left:20px; cursor:pointer; display:none; }
    .shop-content { padding:28px; max-width:1200px; margin:0 auto; }
    .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:28px; }
    .kpi-card { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border-radius:24px; padding:24px; border:1px solid rgba(255,255,255,0.5); }
    .kpi-value { font-size:2.2rem; font-weight:800; color:#e67e22; }
    .card { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); border-radius:24px; padding:22px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.5); }
    .btn { background:#e67e22; color:#fff; border:none; padding:12px 24px; border-radius:60px; cursor:pointer; font-weight:600; }
    .btn-danger { background:#e74c3c; }
    .order-card { background:rgba(255,255,255,0.7); border-radius:20px; padding:18px; margin-bottom:14px; }
    .order-header { display:flex; justify-content:space-between; cursor:pointer; }
    .order-details { margin-top:14px; padding-top:14px; border-top:1px solid #ddd; display:none; }
    .order-details.open { display:block; }
    .status-badge { padding:6px 16px; border-radius:40px; font-size:0.85rem; font-weight:600; }
    .status-paid{background:#3498db;color:#fff} .status-preparing{background:#e67e22;color:#fff} .status-ready{background:#2ecc71;color:#fff}
    .modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .modal-content { background:#fff; border-radius:32px; padding:28px; width:90%; max-width:500px; max-height:80vh; overflow-y:auto; }
    @media (max-width:768px) {
      .shop-sidebar { position:fixed; top:0; right:0; bottom:0; z-index:100; transform:translateX(100%); }
      .shop-sidebar.open { transform:translateX(0); }
      .sidebar-toggle { display:block; }
      .kpi-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="shop-layout">
  <div class="shop-sidebar" id="sidebar">
    <div class="sidebar-header">🏪 متجري</div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link active" data-page="overview"><i data-lucide="layout-dashboard"></i><span>نظرة عامة</span></a>
      <a href="#" class="sidebar-link" data-page="orders"><i data-lucide="shopping-bag"></i><span>الطلبات</span></a>
      <a href="#" class="sidebar-link" data-page="products"><i data-lucide="package"></i><span>المنتجات</span></a>
      <a href="#" class="sidebar-link" data-page="categories"><i data-lucide="folder"></i><span>التصنيفات</span></a>
      <a href="#" class="sidebar-link" data-page="settings"><i data-lucide="settings"></i><span>الإعدادات</span></a>
      <a href="#" class="sidebar-link" data-page="support"><i data-lucide="message-circle"></i><span>الدعم</span></a>
    </nav>
  </div>
  <div class="shop-main">
    <div class="app-header">
      <button class="sidebar-toggle" id="sidebarToggle"><i data-lucide="menu"></i></button>
      <h1 id="pageTitle">نظرة عامة</h1>
    </div>
    <div class="shop-content" id="shopContent"></div>
  </div>
</div>

<div id="productModal" class="modal" style="display:none"><div class="modal-content"><h3>إضافة منتج</h3><input type="hidden" id="productId"><div class="form-group"><input type="text" id="productName" placeholder="اسم المنتج"></div><div class="form-group"><input type="number" id="productPrice" placeholder="السعر"></div><div class="form-group"><select id="productCategory"></select></div><div class="form-group"><input type="file" id="productImage" accept="image/*"><img id="imagePreview" style="max-width:100%; display:none;"></div><div class="form-group"><div id="optionsContainer"></div><button type="button" class="btn" onclick="addOptionRow()">➕ إضافة خيار</button></div><button class="btn" onclick="saveProduct()">حفظ</button><button class="btn" onclick="closeProductModal()" style="background:#95a5a6;">إلغاء</button></div></div>
<div id="categoryModal" class="modal" style="display:none"><div class="modal-content"><h3>إضافة تصنيف</h3><input type="hidden" id="categoryId"><input type="text" id="categoryName" placeholder="اسم التصنيف"><input type="number" id="categoryOrder" placeholder="الترتيب" value="0"><button class="btn" onclick="saveCategory()">حفظ</button><button class="btn" onclick="closeCategoryModal()" style="background:#95a5a6;">إلغاء</button></div></div>

<script>
  const tg = Telegram.WebApp; tg.ready();
  if (tg.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(() => history.back()); }
  const API = 'https://delivery-dragon.vercel.app';
  const sidebar = document.getElementById('sidebar'), toggleBtn = document.getElementById('sidebarToggle');
  const links = document.querySelectorAll('.sidebar-link'), pageTitle = document.getElementById('pageTitle'), contentArea = document.getElementById('shopContent');
  let productCategories = [], editingProduct = null;

  toggleBtn.onclick = () => sidebar.classList.toggle('open');
  links.forEach(link => { link.onclick = (e) => { e.preventDefault(); links.forEach(l => l.classList.remove('active')); link.classList.add('active'); pageTitle.innerText = link.querySelector('span')?.innerText; loadPage(link.dataset.page); if (window.innerWidth <= 768) sidebar.classList.remove('open'); }; });

  async function loadPage(page) {
    switch(page) {
      case 'overview': loadOverview(); break;
      case 'orders': loadOrders(false); break;
      case 'products': loadProducts(); break;
      case 'categories': loadCategoriesList(); break;
      case 'settings': loadSettings(); break;
      case 'support': contentArea.innerHTML = '<div class="card" style="text-align:center"><h3>الدعم الفني</h3><button class="btn" onclick="location.href=\'support.html\'">فتح الدعم</button></div>'; break;
    }
  }

  async function loadOverview() {
    contentArea.innerHTML = '<div class="skeleton"></div>';
    const [statsRes, ordersRes] = await Promise.all([fetch(`${API}/api/shop/stats`,{headers:{'X-Telegram-Init-Data':tg.initData}}), fetch(`${API}/api/shop/orders?archived=false`,{headers:{'X-Telegram-Init-Data':tg.initData}})]);
    const stats = await statsRes.json(); const orders = await ordersRes.json();
    contentArea.innerHTML = `<div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-value">${stats.today_orders||0}</div><div>طلبات اليوم</div></div>
      <div class="kpi-card"><div class="kpi-value">${stats.today_revenue||0} ل.س</div><div>إيرادات اليوم</div></div>
      <div class="kpi-card"><div class="kpi-value">${stats.active_orders||0}</div><div>طلبات نشطة</div></div>
    </div>
    <div class="card"><h3>آخر الطلبات</h3>${orders.slice(0,5).map(o=>`<div class="flex-between"><span>#${o.id} - ${o.customer_name}</span><span class="status-badge status-${o.status}">${o.status}</span></div>`).join('')}</div>`;
  }

  async function loadOrders(archived) {
    const res = await fetch(`${API}/api/shop/orders?archived=${archived}`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const orders = await res.json();
    let html = `<div class="tabs"><button class="tab ${!archived?'active':''}" onclick="loadOrders(false)">النشطة</button><button class="tab ${archived?'active':''}" onclick="loadOrders(true)">المؤرشفة</button></div>`;
    orders.forEach(o => {
      let items = JSON.parse(o.items).map(i=>`${i.name} ×${i.quantity}`).join('، ');
      html += `<div class="order-card"><div class="order-header" onclick="this.nextElementSibling.classList.toggle('open')"><div><b>#${o.id}</b> - ${o.customer_name}</div><span class="status-badge status-${o.status}">${o.status}</span></div>
        <div class="order-details"><p>📦 ${items}</p><p>💰 ${o.total_price} ل.س</p>${!archived?`<select onchange="updateOrderStatus('${o.id}', this.value)"><option value="preparing" ${o.status==='preparing'?'selected':''}>تحضير</option><option value="ready_for_pickup" ${o.status==='ready_for_pickup'?'selected':''}>جاهز للتوصيل</option></select>`:''}</div></div>`;
    });
    contentArea.innerHTML = html;
  }
  window.updateOrderStatus = async (id, status) => { await fetch(`${API}/api/shop/orders/${id}/status`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({status})}); loadOrders(false); };

  async function loadProducts() {
    const res = await fetch(`${API}/api/shop/products`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const products = await res.json();
    let html = `<div class="flex-between"><input type="text" id="productSearch" placeholder="بحث..."><button class="btn" onclick="openProductModal()">➕ إضافة</button></div><div class="product-grid" id="productGrid">`;
    products.forEach(p => { html += `<div class="product-card"><img src="${p.image_url||'https://via.placeholder.com/150'}"><div class="product-info"><b>${p.name}</b><div class="price">${p.price} ل.س</div><div class="flex"><button class="btn" onclick="editProduct(${p.id})">✏️</button><button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️</button></div></div></div>`; });
    html += '</div>'; contentArea.innerHTML = html;
    document.getElementById('productSearch')?.addEventListener('input', e => { const term = e.target.value.toLowerCase(); document.querySelectorAll('.product-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none'); });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  function addOptionRow(optName='', optPrice='') { const div = document.createElement('div'); div.className = 'option-row'; div.innerHTML = `<input type="text" placeholder="اسم الخيار" value="${optName}"><input type="number" placeholder="السعر" value="${optPrice}"><button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">🗑️</button>`; document.getElementById('optionsContainer').appendChild(div); }
  function openProductModal(product=null) { editingProduct = product; document.getElementById('modalTitle').innerText = product ? 'تعديل منتج' : 'إضافة منتج'; document.getElementById('productId').value = product?.id || ''; document.getElementById('productName').value = product?.name || ''; document.getElementById('productPrice').value = product?.price || ''; document.getElementById('optionsContainer').innerHTML = ''; if (product?.options) { try { const opts = typeof product.options === 'string' ? JSON.parse(product.options) : product.options; if (Array.isArray(opts)) opts.forEach(o => addOptionRow(o.name, o.price)); } catch(e) {} } const preview = document.getElementById('imagePreview'); if (product?.image_url) { preview.src = product.image_url; preview.style.display = 'block'; } else { preview.style.display = 'none'; } loadProductCategoriesForSelect(product?.category_id); document.getElementById('productModal').style.display = 'flex'; }
  async function loadProductCategoriesForSelect(selectedId = null) { const res = await fetch(`${API}/api/shop/product-categories`,{headers:{'X-Telegram-Init-Data':tg.initData}}); productCategories = await res.json(); const sel = document.getElementById('productCategory'); sel.innerHTML = '<option value="">بدون تصنيف</option>'; productCategories.forEach(c => { const opt = new Option(c.name, c.id); if (c.id === selectedId) opt.selected = true; sel.add(opt); }); }
  function closeProductModal() { document.getElementById('productModal').style.display = 'none'; editingProduct = null; }
  async function saveProduct() { const id = document.getElementById('productId').value, name = document.getElementById('productName').value.trim(), price = parseFloat(document.getElementById('productPrice').value), category_id = document.getElementById('productCategory').value; if (!name || isNaN(price)) return tg.showAlert('يرجى إدخال اسم المنتج وسعر صحيح'); const options = []; document.querySelectorAll('.option-row').forEach(row => { const n = row.querySelector('input[type="text"]')?.value.trim(); const p = parseFloat(row.querySelector('input[type="number"]')?.value)||0; if(n) options.push({name:n, price:p}); }); let image = null; const file = document.getElementById('productImage').files[0]; if (file) { if (file.size > 5*1024*1024) return tg.showAlert('حجم الصورة كبير جداً'); const reader = new FileReader(); reader.onload = async (e) => { image = e.target.result; await submitProduct({name, price, category_id: category_id||null, image, options: options.length?JSON.stringify(options):null}); }; reader.readAsDataURL(file); return; } else if (editingProduct?.image_url) image = editingProduct.image_url; await submitProduct({name, price, category_id: category_id||null, image, options: options.length?JSON.stringify(options):null}); }
  async function submitProduct(data) { const id = document.getElementById('productId').value, url = id ? `${API}/api/shop/products/${id}` : `${API}/api/shop/products`, method = id ? 'PUT' : 'POST'; try { const res = await fetch(url, {method, headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify(data)}); if(!res.ok) throw new Error((await res.json()).error); closeProductModal(); loadProducts(); } catch(e) { tg.showAlert('❌ '+e.message); } }
  window.editProduct = async (id) => { const res = await fetch(`${API}/api/shop/products/${id}`,{headers:{'X-Telegram-Init-Data':tg.initData}}); if(res.ok) openProductModal(await res.json()); else tg.showAlert('تعذر تحميل المنتج'); };
  window.deleteProduct = async (id) => { tg.showConfirm('حذف المنتج؟', async ok => { if(!ok) return; await fetch(`${API}/api/shop/products/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}}); loadProducts(); }); };

  async function loadCategoriesList() { const res = await fetch(`${API}/api/shop/product-categories`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const cats = await res.json(); let html = `<button class="btn" onclick="openCategoryModal()">➕ إضافة تصنيف</button><div id="categoryList" style="margin-top:20px;">`; cats.forEach(c => { html += `<div class="card flex-between"><div><b>${c.name}</b> (ترتيب: ${c.display_order})</div><div><button class="btn" onclick="editCategory(${c.id},'${c.name}',${c.display_order})">✏️</button><button class="btn btn-danger" onclick="deleteCategory(${c.id})">🗑️</button></div></div>`; }); html += '</div>'; contentArea.innerHTML = html; }
  function openCategoryModal(id=null, name='', order=0) { document.getElementById('categoryModalTitle').innerText = id ? 'تعديل تصنيف' : 'إضافة تصنيف'; document.getElementById('categoryId').value = id||''; document.getElementById('categoryName').value = name; document.getElementById('categoryOrder').value = order; document.getElementById('categoryModal').style.display = 'flex'; }
  window.editCategory = (id, name, order) => openCategoryModal(id, name, order);
  window.closeCategoryModal = () => document.getElementById('categoryModal').style.display = 'none';
  async function saveCategory() { const id = document.getElementById('categoryId').value, name = document.getElementById('categoryName').value.trim(), display_order = parseInt(document.getElementById('categoryOrder').value)||0; if(!name) return tg.showAlert('اسم التصنيف مطلوب'); const url = id ? `${API}/api/shop/product-categories/${id}` : `${API}/api/shop/product-categories`, method = id ? 'PUT' : 'POST'; try { const res = await fetch(url, {method, headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify({name, display_order})}); if(!res.ok) throw new Error((await res.json()).error); closeCategoryModal(); loadCategoriesList(); } catch(e) { tg.showAlert('❌ '+e.message); } }
  window.deleteCategory = async (id) => { tg.showConfirm('حذف التصنيف؟', async ok => { if(!ok) return; await fetch(`${API}/api/shop/product-categories/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}}); loadCategoriesList(); }); };

  async function loadSettings() { const res = await fetch(`${API}/api/shop/profile`,{headers:{'X-Telegram-Init-Data':tg.initData}}); const shop = await res.json(); contentArea.innerHTML = `<div class="card"><h3>📍 موقع المتجر</h3><p>${shop.latitude ? `✅ ${shop.latitude}, ${shop.longitude}` : '❌ غير محدد'}</p><button class="btn" onclick="updateShopLocation()">تحديث الموقع</button></div>`; }
  window.updateShopLocation = () => { if (!navigator.geolocation) return tg.showAlert('متصفحك لا يدعم تحديد الموقع'); navigator.geolocation.getCurrentPosition(async pos => { const {latitude, longitude} = pos.coords; const res = await fetch(`${API}/api/shop/location`,{method:'PUT',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({latitude, longitude})}); if(res.ok) { tg.showAlert('✅ تم تحديث الموقع'); loadSettings(); } else { const err = await res.json(); tg.showAlert('❌ '+ (err.error||'فشل')); } }, err => tg.showAlert('❌ فشل تحديد الموقع: '+err.message)); };

  loadOverview();
  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
