<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة التاجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal';background:#f5f7fb;padding:16px}.tab{display:flex;gap:10px;margin-bottom:20px}.tab-btn{flex:1;padding:12px;background:#ddd;border-radius:30px;text-align:center}.active{background:#e67e22;color:#fff}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px}.btn{background:#e67e22;color:#fff;border:none;padding:10px 20px;border-radius:30px}</style></head><body><h2>🏪 لوحة التاجر</h2><div class="tab"><div class="tab-btn active" data-tab="active">النشطة</div><div class="tab-btn" data-tab="products">المنتجات</div><div class="tab-btn" data-tab="archive">الأرشيف</div></div><div id="activePanel"></div><div id="productsPanel" style="display:none"><button class="btn" id="addProduct">➕ إضافة</button><div id="productsList"></div></div><div id="archivePanel" style="display:none"></div><script>const tg=Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';const tabs=document.querySelectorAll('.tab-btn');tabs.forEach(t=>t.onclick=()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');['activePanel','productsPanel','archivePanel'].forEach(p=>document.getElementById(p).style.display='none');document.getElementById(t.dataset.tab+'Panel').style.display='block';if(t.dataset.tab==='active')loadOrders(false);else if(t.dataset.tab==='archive')loadOrders(true)});async function loadOrders(archived){const r=await fetch(`${API}/api/shop/orders?archived=${archived}`,{headers:{'X-Telegram-Init-Data':tg.initData}});const orders=await r.json();const h=orders.map(o=>`<div class="card"><b>#${o.id}</b> - ${o.customer_name}<br>${JSON.parse(o.items).map(i=>`${i.name} ×${i.quantity}`).join('، ')}<br>💰 ${o.total_price} ل.س<br>${o.status}${!archived?`<select data-id="${o.id}" class="statusSelect"><option value="preparing">تحضير</option><option value="ready_for_pickup">جاهز</option></select>`:''}</div>`).join('');document.getElementById(archived?'archivePanel':'activePanel').innerHTML=h||'<p>لا طلبات</p>';if(!archived)document.querySelectorAll('.statusSelect').forEach(s=>s.onchange=async()=>{await fetch(`${API}/api/shop/orders/${s.dataset.id}/status`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({status:s.value})});loadOrders(false)})}async function loadProducts(){const r=await fetch(`${API}/api/shop/products`,{headers:{'X-Telegram-Init-Data':tg.initData}});const prods=await r.json();document.getElementById('productsList').innerHTML=prods.map(p=>`<div class="card"><b>${p.name}</b> - ${p.price} ل.س <button class="btn" onclick="deleteProduct(${p.id})">🗑️</button></div>`).join('')}window.deleteProduct=async id=>{await fetch(`${API}/api/shop/products/${id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadProducts()};document.getElementById('addProduct').onclick=()=>{const n=prompt('اسم المنتج'),p=prompt('السعر');if(n&&p)fetch(`${API}/api/shop/products`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({name:n,price:p})}).then(loadProducts)};loadOrders(false);loadProducts()</script></body></html>
