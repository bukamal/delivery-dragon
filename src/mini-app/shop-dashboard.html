<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة التاجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>body{font-family:'Segoe UI'; padding:16px; background:#f8f9fa;} .tab{display:flex; gap:8px; margin-bottom:20px;} .tab-btn{flex:1; padding:12px; background:#ddd; border-radius:20px; text-align:center; cursor:pointer;} .active{background:#e67e22; color:white;} .panel{display:none;} .active-panel{display:block;} .card{background:white; border-radius:16px; padding:16px; margin-bottom:12px;}</style></head>
<body><h2>🏪 لوحة التحكم</h2><div class="tab"><div class="tab-btn active" data-tab="orders">الطلبات</div><div class="tab-btn" data-tab="products">المنتجات</div></div>
<div id="orders-panel" class="panel active-panel"><div id="orders"></div></div>
<div id="products-panel" class="panel"><button id="addProductBtn" style="background:#e67e22; color:white; border:none; padding:12px; border-radius:40px; width:100%; margin-bottom:16px;">➕ إضافة منتج</button><div id="products"></div></div>
<script>
    const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
    const API = window.location.origin;
    document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(b.dataset.tab + '-panel').classList.add('active-panel');
    });
    async function loadOrders() {
        const res = await fetch(`${API}/api/shop/orders`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
        const orders = await res.json();
        document.getElementById('orders').innerHTML = orders.map(o => `
            <div class="card"><b>طلب #${o.id}</b> - ${o.customer_name}<br>${JSON.parse(o.items).map(i => `${i.name} x${i.quantity}`).join(', ')}<br>الإجمالي: ${o.total_price} ل.س<br>الحالة: ${o.status}
                <select data-id="${o.id}" class="status-select">
                    <option value="preparing" ${o.status==='preparing'?'selected':''}>قيد التحضير</option>
                    <option value="ready_for_pickup" ${o.status==='ready_for_pickup'?'selected':''}>جاهز للتسليم</option>
                </select>
            </div>
        `).join('');
        document.querySelectorAll('.status-select').forEach(s => s.onchange = async () => {
            await fetch(`${API}/api/shop/orders/${s.dataset.id}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData },
                body: JSON.stringify({ status: s.value })
            });
            loadOrders();
        });
    }
    async function loadProducts() {
        const res = await fetch(`${API}/api/shop/products`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
        const prods = await res.json();
        document.getElementById('products').innerHTML = prods.map(p => `<div class="card"><b>${p.name}</b> - ${p.price} ل.س <button data-id="${p.id}" class="deleteProd">🗑️</button></div>`).join('');
        document.querySelectorAll('.deleteProd').forEach(b => b.onclick = async () => {
            await fetch(`${API}/api/shop/products/${b.dataset.id}`, { method: 'DELETE', headers: { 'X-Telegram-Init-Data': tg.initData } });
            loadProducts();
        });
    }
    document.getElementById('addProductBtn').onclick = () => {
        const name = prompt('اسم المنتج'); if (!name) return;
        const price = prompt('السعر'); if (!price) return;
        fetch(`${API}/api/shop/products`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData },
            body: JSON.stringify({ name, price })
        }).then(() => loadProducts());
    };
    loadOrders();
    loadProducts();
</script></body></html>
