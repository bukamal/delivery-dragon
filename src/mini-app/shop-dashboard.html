<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - لوحة التاجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:#f5f7fa;padding:16px}.tabs{display:flex;gap:10px;margin-bottom:20px}.tab{flex:1;padding:14px;background:#ddd;border-radius:30px;text-align:center;cursor:pointer;font-weight:500}.tab.active{background:#e67e22;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.02)}.btn{background:#e67e22;color:#fff;border:none;padding:12px 20px;border-radius:40px;cursor:pointer}select{padding:8px;border-radius:12px;border:1px solid #ccc}.skeleton-order{height:150px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px;margin-bottom:16px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><h2>🏪 لوحة تحكم التاجر</h2><div class="tabs"><div class="tab active" data-tab="active">الطلبات النشطة</div><div class="tab" data-tab="products">المنتجات</div><div class="tab" data-tab="archive">الأرشيف</div></div><div id="activePanel" class="panel active"><div id="activeOrdersContainer"></div></div><div id="productsPanel" class="panel"><button class="btn" id="addProductBtn" style="width:100%;margin-bottom:20px">➕ إضافة منتج</button><div id="productsList"></div></div><div id="archivePanel" class="panel"><div id="archiveOrdersContainer"></div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();const API='https://delivery-dragon.vercel.app';document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));const panelId=t.dataset.tab==='active'?'activePanel':t.dataset.tab==='products'?'productsPanel':'archivePanel';document.getElementById(panelId).classList.add('active');if(t.dataset.tab==='active')loadOrders(false);else if(t.dataset.tab==='archive')loadOrders(true);});async function loadOrders(archived){const container=archived?document.getElementById('archiveOrdersContainer'):document.getElementById('activeOrdersContainer');container.innerHTML='<div class="skeleton-order"></div>';try{const url=archived?`${API}/api/shop/orders?archived=true`:`${API}/api/shop/orders`;const res=await fetch(url,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok)throw new Error('تعذر تحميل الطلبات');const orders=await res.json();if(!orders.length){container.innerHTML='<p>لا توجد طلبات</p>';return}container.innerHTML=orders.map(o=>{let items=[];try{items=typeof o.items==='string'?JSON.parse(o.items):o.items}catch(e){items=[]}const itemsText=items.map(i=>`${i.name} ×${i.quantity}`).join('، ');const statusOptions=archived?'':`<select data-id="${o.id}" class="statusSelect"><option value="preparing" ${o.status==='preparing'?'selected':''}>قيد التحضير</option><option value="ready_for_pickup" ${o.status==='ready_for_pickup'?'selected':''}>جاهز للتسليم</option></select>`;const riderInfo=o.rider_name?`<br>🛵 السائق: ${o.rider_name}`:'';return`<div class="card"><b>طلب #${o.id}</b> - ${o.customer_name}<br>📞 ${o.customer_phone||'لا يوجد'}${riderInfo}<br>📦 ${itemsText}<br>💰 ${o.total_price} ل.س<br>📍 ${o.address}<br>الحالة: ${o.status} ${statusOptions}</div>`}).join('');if(!archived){document.querySelectorAll('.statusSelect').forEach(s=>s.onchange=async()=>{tg.showConfirm('تغيير حالة الطلب؟',async confirmed=>{if(confirmed){await fetch(`${API}/api/shop/orders/${s.dataset.id}/status`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({status:s.value})});loadOrders(false)}})})}}catch(e){container.innerHTML=`<p style="color:red">⚠️ ${e.message}<br><button onclick="loadOrders(${archived})" class="btn">إعادة المحاولة</button></p>`}}async function loadProducts(){const container=document.getElementById('productsList');container.innerHTML='<div class="skeleton-order"></div>';try{const res=await fetch(`${API}/api/shop/products`,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok)throw new Error('تعذر تحميل المنتجات');const prods=await res.json();container.innerHTML=prods.map(p=>`<div class="card"><b>${p.name}</b> - ${p.price} ل.س <button data-id="${p.id}" class="deleteBtn">🗑️</button></div>`).join('');document.querySelectorAll('.deleteBtn').forEach(b=>b.onclick=()=>{tg.showConfirm('حذف المنتج؟',async confirmed=>{if(confirmed){await fetch(`${API}/api/shop/products/${b.dataset.id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadProducts()}})})}catch(e){container.innerHTML=`<p style="color:red">⚠️ ${e.message}<br><button onclick="loadProducts()" class="btn">إعادة المحاولة</button></p>`}}document.getElementById('addProductBtn').onclick=()=>{const name=prompt('اسم المنتج');if(!name)return;const price=prompt('السعر');if(!price)return;fetch(`${API}/api/shop/products`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({name,price})}).then(()=>{loadProducts();tg.showAlert('تمت الإضافة')}).catch(e=>tg.showAlert(`❌ ${e.message}`))};loadOrders(false);loadProducts();</script></body></html>
