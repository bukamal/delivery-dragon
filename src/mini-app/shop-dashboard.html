<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - لوحة التاجر</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:#f5f7fa;padding:16px}.tabs{display:flex;gap:10px;margin-bottom:20px}.tab{flex:1;padding:14px;background:#ddd;border-radius:30px;text-align:center;cursor:pointer;font-weight:500}.tab.active{background:#e67e22;color:#fff}.panel{display:none}.panel.active{display:block}.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.02)}.btn{background:#e67e22;color:#fff;border:none;padding:12px 20px;border-radius:40px;cursor:pointer}</style></head><body><h2>🏪 لوحة تحكم التاجر</h2><div class="tabs"><div class="tab active" data-tab="orders">الطلبات</div><div class="tab" data-tab="products">المنتجات</div></div><div id="ordersPanel" class="panel active"></div><div id="productsPanel" class="panel"><button class="btn" id="addProductBtn" style="width:100%;margin-bottom:20px">➕ إضافة منتج</button><div id="productsList"></div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();const API='https://delivery-dragon.vercel.app';document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(t.dataset.tab==='orders'?'ordersPanel':'productsPanel').classList.add('active')});async function loadOrders(){const res=await fetch(`${API}/api/shop/orders`,{headers:{'X-Telegram-Init-Data':tg.initData}});const orders=await res.json();document.getElementById('ordersPanel').innerHTML=orders.map(o=>{const items=JSON.parse(o.items).map(i=>`${i.name} ×${i.quantity}`).join('، ');return`<div class="card"><b>#${o.id}</b> - ${o.customer_name}<br>📦 ${items}<br>💰 ${o.total_price} ل.س<br>📍 ${o.address}<br>الحالة: ${o.status}<select data-id="${o.id}" class="statusSelect"><option value="preparing" ${o.status==='preparing'?'selected':''}>قيد التحضير</option><option value="ready_for_pickup" ${o.status==='ready_for_pickup'?'selected':''}>جاهز للتسليم</option></select></div>`}).join('');document.querySelectorAll('.statusSelect').forEach(s=>s.onchange=async()=>{await fetch(`${API}/api/shop/orders/${s.dataset.id}/status`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({status:s.value})});loadOrders()})}async function loadProducts(){const res=await fetch(`${API}/api/shop/products`,{headers:{'X-Telegram-Init-Data':tg.initData}});const prods=await res.json();document.getElementById('productsList').innerHTML=prods.map(p=>`<div class="card"><b>${p.name}</b> - ${p.price} ل.س <button data-id="${p.id}" class="deleteBtn">🗑️</button></div>`).join('');document.querySelectorAll('.deleteBtn').forEach(b=>b.onclick=async()=>{await fetch(`${API}/api/shop/products/${b.dataset.id}`,{method:'DELETE',headers:{'X-Telegram-Init-Data':tg.initData}});loadProducts()})}document.getElementById('addProductBtn').onclick=()=>{const name=prompt('اسم المنتج');if(!name)return;const price=prompt('السعر');if(!price)return;fetch(`${API}/api/shop/products`,{method:'POST',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData},body:JSON.stringify({name,price})}).then(loadProducts)};loadOrders();loadProducts()</script></body></html>
