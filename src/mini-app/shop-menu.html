<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - قائمة الطعام</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:#f8f9fc;padding:16px}.back-btn{background:0 0;border:none;color:#e67e22;font-size:1.2rem;margin-bottom:16px;cursor:pointer}.category{margin:24px 0 12px;font-weight:700;color:#555}.product-item{background:#fff;border-radius:20px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}.price{font-weight:700;color:#e67e22}.add-btn{background:#e67e22;color:#fff;border:none;border-radius:30px;padding:10px 22px;font-weight:700;cursor:pointer}</style></head><body><button class="back-btn" onclick="history.back()">← العودة</button><h1 id="shopName"></h1><div id="menuContainer"></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();const API='https://delivery-dragon.vercel.app';const params=new URLSearchParams(location.search);const shopId=params.get('id');const shopName=decodeURIComponent(params.get('name')||'');document.getElementById('shopName').innerText=shopName;let cart=JSON.parse(localStorage.getItem('dragon_cart'))||[];async function loadMenu(){const res=await fetch(`${API}/api/shops/${shopId}/products`);const data=await res.json();let html='';for(let cat in data.categories){html+=`<div class="category">${cat}</div>`;data.categories[cat].forEach(p=>{html+=`<div class="product-item"><div><b>${p.name}</b><br><span class="price">${p.price} ل.س</span></div><button class="add-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">➕ أضف</button></div>`})}document.getElementById('menuContainer').innerHTML=html||'<p>لا توجد منتجات</p>';document.querySelectorAll('.add-btn').forEach(btn=>{btn.onclick=()=>{const item={id:btn.dataset.id,name:btn.dataset.name,price:parseFloat(btn.dataset.price),shopId,shopName,quantity:1};const existing=cart.find(i=>i.id===item.id&&i.shopId===shopId);if(existing)existing.quantity++;else{if(cart.length&&cart[0].shopId!==shopId)cart=[];cart.push(item)}localStorage.setItem('dragon_cart',JSON.stringify(cart));tg.HapticFeedback.impactOccurred('light');tg.showPopup({title:'تمت الإضافة',message:`تم إضافة ${item.name} إلى السلة`})}})}loadMenu()</script></body></html>
