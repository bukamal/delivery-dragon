<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | قائمة الطعام</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .category { margin: var(--space-6) 0 var(--space-4); font-weight: 700; color: var(--gray-600); font-size: var(--text-lg); }
    .shop-header { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-5); flex-wrap: wrap; }
    .shop-header h2 { font-size: var(--text-3xl); }
    .rating { background: var(--tg-theme-secondary-bg-color, #fff); padding: var(--space-1) var(--space-4); border-radius: var(--radius-full); font-size: var(--text-base); }
  </style>
</head>
<body>
<div class="app-header">
  <button class="back-btn" id="backBtn"><i data-lucide="arrow-right"></i></button>
  <h1>🦅 شاهين</h1>
</div>
<div class="container">
  <div class="shop-header">
    <h2 id="shopName"></h2>
    <div id="shopRating" class="rating">⭐ جديد</div>
  </div>
  <div id="menuContainer">
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="height:90px;"></div>
  </div>
</div>
<script>
  const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
  tg.BackButton.show(); tg.BackButton.onClick(() => history.back());
  document.getElementById('backBtn').onclick = () => history.back();
  const API = 'https://delivery-dragon.vercel.app';
  const params = new URLSearchParams(location.search);
  const shopId = params.get('id'), shopName = decodeURIComponent(params.get('name') || '');
  document.getElementById('shopName').innerText = shopName;
  let cart = JSON.parse(localStorage.getItem('dragon_cart')) || [];

  async function loadMenu() {
    const container = document.getElementById('menuContainer');
    try {
      const res = await fetch(`${API}/api/shops/${shopId}/products`);
      const data = await res.json();
      let html = '';
      for (let cat in data.categories) {
        html += `<div class="category">📌 ${cat}</div>`;
        data.categories[cat].forEach(p => {
          const imgHtml = p.image_url ? `<img src="${p.image_url}" class="product-img">` : '<div class="product-img" style="display:flex; align-items:center; justify-content:center; color:#aaa;">📷</div>';
          let optionsHtml = '', optionsData = null;
          if (p.options) { try { optionsData = typeof p.options === 'string' ? JSON.parse(p.options) : p.options; if (Array.isArray(optionsData) && optionsData.length) { optionsHtml = `<select class="option-select" data-id="${p.id}">`; optionsData.forEach((opt, idx) => optionsHtml += `<option value="${opt.name}" data-price="${opt.price||0}" ${idx===0?'selected':''}>${opt.name} (+${opt.price||0} ل.س)</option>`); optionsHtml += `</select>`; } } catch(e) {} }
          html += `<div class="product-item">
            ${imgHtml}
            <div class="product-info">
              <b>${p.name}</b>
              <div class="price">${p.price} ل.س</div>
              ${optionsHtml}
            </div>
            <button class="btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-options='${JSON.stringify(optionsData)}'><i data-lucide="plus"></i> أضف</button>
          </div>`;
        });
      }
      container.innerHTML = html || '<div class="empty-state">لا توجد منتجات</div>';
      if (typeof lucide !== 'undefined') lucide.createIcons();

      document.querySelectorAll('.btn').forEach(btn => { if(btn.dataset.id) btn.onclick = () => {
        const productId = btn.dataset.id, productName = btn.dataset.name, basePrice = parseFloat(btn.dataset.price);
        let selectedOption = null, extraPrice = 0;
        const selectEl = document.querySelector(`.option-select[data-id="${productId}"]`);
        if (selectEl) { const selectedOpt = selectEl.options[selectEl.selectedIndex]; selectedOption = selectedOpt.value; extraPrice = parseFloat(selectedOpt.dataset.price) || 0; }
        const finalPrice = basePrice + extraPrice;
        const existing = cart.find(i => i.id === productId && i.shopId === shopId && i.option === selectedOption);
        if (existing) existing.quantity++;
        else { if (cart.length && cart[0].shopId !== shopId) { tg.showConfirm('السلة تحتوي منتجات من متجر آخر. هل تريد استبدال السلة؟', ok => { if(ok) { cart = []; addItem(); } }); return; } addItem(); }
        function addItem() { cart.push({ id: productId, name: productName, price: finalPrice, shopId, shopName, quantity: 1, option: selectedOption, optionName: selectedOption }); localStorage.setItem('dragon_cart', JSON.stringify(cart)); tg.HapticFeedback.impactOccurred('light'); tg.showPopup({ title: '✅ تمت الإضافة', message: `${productName} ${selectedOption ? '('+selectedOption+')' : ''} في السلة` }); }
        localStorage.setItem('dragon_cart', JSON.stringify(cart));
      }; });
    } catch(e) { container.innerHTML = `<div class="empty-state">⚠️ ${e.message}</div>`; }
  }

  async function loadRating() { try { const res = await fetch(`${API}/api/shops/${shopId}/ratings`); const data = await res.json(); if (data.count > 0) { const stars = '★'.repeat(Math.round(data.average)) + '☆'.repeat(5 - Math.round(data.average)); document.getElementById('shopRating').innerHTML = `${stars} (${data.count})`; } } catch(e) {} }
  loadMenu(); loadRating();
</script>
</body>
</html>
