<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | قائمة الطعام</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Tajawal', sans-serif; background: var(--tg-theme-bg-color, #f5f7fb); color: var(--tg-theme-text-color, #1a1a2c); padding: 0 0 20px; }
    .app-header { display: flex; align-items: center; padding: 16px 20px; background: var(--tg-theme-secondary-bg-color, #fff); border-bottom: 1px solid var(--tg-theme-hint-color, #ddd); position: sticky; top: 0; z-index: 10; }
    .app-header h1 { font-size: 1.7rem; font-weight: 700; color: #e67e22; margin-right: 12px; }
    .back-btn { background: none; border: none; color: #e67e22; font-size: 1.8rem; cursor: pointer; }
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }
    .shop-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .shop-header h2 { font-size: 1.8rem; }
    .rating { background: var(--tg-theme-secondary-bg-color, #fff); padding: 6px 16px; border-radius: 40px; font-size: 1rem; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
    .category { margin: 28px 0 16px; font-weight: 700; color: var(--tg-theme-hint-color, #7f8c8d); font-size: 1.2rem; }
    .product-item { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: 20px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--tg-theme-hint-color, rgba(0,0,0,0.03)); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    .price { font-weight: 700; color: #e67e22; font-size: 1.1rem; }
    .add-btn { background: #e67e22; color: white; border: none; border-radius: 40px; padding: 10px 22px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(230,126,34,0.15); }
    .add-btn:active { transform: scale(0.96); }
    .skeleton-item { height: 80px; background: linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 20px; margin-bottom: 12px; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .empty-state { text-align: center; padding: 40px; color: var(--tg-theme-hint-color); }
  </style>
</head>
<body>
<div class="app-header">
  <button class="back-btn" id="backBtn">←</button>
  <h1>🦅 شاهين</h1>
</div>
<div class="container">
  <div class="shop-header">
    <h2 id="shopName"></h2>
    <div id="shopRating" class="rating">⭐ جديد</div>
  </div>
  <div id="menuContainer">
    <div class="skeleton-item"></div><div class="skeleton-item"></div>
  </div>
</div>
<script>
  const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
  tg.BackButton.show(); tg.BackButton.onClick(() => history.back());
  document.getElementById('backBtn').onclick = () => history.back();
  const API = 'https://delivery-dragon.vercel.app';
  const params = new URLSearchParams(location.search);
  const shopId = params.get('id');
  const shopName = decodeURIComponent(params.get('name') || '');
  document.getElementById('shopName').innerText = shopName;
  let cart = JSON.parse(localStorage.getItem('dragon_cart')) || [];

  async function loadMenu() {
    const container = document.getElementById('menuContainer');
    try {
      const res = await fetch(`${API}/api/shops/${shopId}/products`);
      const data = await res.json();
      let html = '';
      for (let cat in data.categories) {
        html += `<div class="category">📌 ${cat}</div>`;
        data.categories[cat].forEach(p => {
          html += `<div class="product-item"><div><b>${p.name}</b><br><span class="price">${p.price} ل.س</span></div><button class="add-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">➕ أضف</button></div>`;
        });
      }
      container.innerHTML = html || '<div class="empty-state">لا توجد منتجات حالياً</div>';
      document.querySelectorAll('.add-btn').forEach(btn => {
        btn.onclick = () => {
          const item = { id: btn.dataset.id, name: btn.dataset.name, price: parseFloat(btn.dataset.price), shopId, shopName, quantity: 1 };
          const existing = cart.find(i => i.id === item.id && i.shopId === shopId);
          if (existing) existing.quantity++;
          else { if (cart.length && cart[0].shopId !== shopId) cart = []; cart.push(item); }
          localStorage.setItem('dragon_cart', JSON.stringify(cart));
          tg.HapticFeedback.impactOccurred('light');
          tg.showPopup({ title: '✅ تمت الإضافة', message: `${item.name} في السلة` });
        };
      });
    } catch(e) {
      container.innerHTML = `<div class="empty-state">⚠️ ${e.message}</div>`;
    }
  }
  async function loadRating() {
    try {
      const res = await fetch(`${API}/api/shops/${shopId}/ratings`);
      const data = await res.json();
      if (data.count > 0) {
        const stars = '★'.repeat(Math.round(data.average)) + '☆'.repeat(5 - Math.round(data.average));
        document.getElementById('shopRating').innerHTML = `${stars} (${data.count})`;
      }
    } catch(e) {}
  }
  loadMenu(); loadRating();
</script>
</body>
</html>
