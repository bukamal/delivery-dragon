<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | قائمة الطعام</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);color:var(--tg-theme-text-color,#1a1a2c);padding:0 0 20px}.app-header{display:flex;align-items:center;padding:16px 20px;background:var(--tg-theme-secondary-bg-color,#fff);border-bottom:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.05));position:sticky;top:0;z-index:10}.app-header h1{font-size:1.8rem;font-weight:700;color:#e67e22;margin-right:16px}.back-btn{background:0 0;border:none;color:#e67e22;font-size:1.5rem;cursor:pointer;padding:8px}.container{padding:16px;max-width:600px;margin:0 auto}.shop-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}.rating{background:var(--tg-theme-secondary-bg-color,#fff);padding:6px 16px;border-radius:40px}.category{margin:28px 0 16px;font-weight:700;color:var(--tg-theme-hint-color,#7f8c8d)}.product-item{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:20px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.03))}.price{font-weight:700;color:#e67e22}.add-btn{background:#e67e22;color:#fff;border:none;border-radius:40px;padding:10px 22px;font-weight:700;cursor:pointer}.skeleton{height:80px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="app-header"><button class="back-btn" onclick="history.back()">←</button><h1>🦅 شاهين</h1></div><div class="container"><div class="shop-header"><h2 id="shopName"></h2><div id="shopRating" class="rating"></div></div><div id="menuContainer"><div class="skeleton"></div><div class="skeleton"></div></div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';const p=new URLSearchParams(location.search);const shopId=p.get('id'),shopName=decodeURIComponent(p.get('name')||'');document.getElementById('shopName').innerText=shopName;let cart=JSON.parse(localStorage.getItem('dragon_cart'))||[];async function loadMenu(){const r=await fetch(`${API}/api/shops/${shopId}/products`);const data=await r.json();let h='';for(let cat in data.categories){h+=`<div class="category">${cat}</div>`;data.categories[cat].forEach(i=>{h+=`<div class="product-item"><div><b>${i.name}</b><br><span class="price">${i.price} ل.س</span></div><button class="add-btn" data-id="${i.id}" data-name="${i.name}" data-price="${i.price}">➕ أضف</button></div>`})}document.getElementById('menuContainer').innerHTML=h||'<p>لا توجد منتجات</p>';document.querySelectorAll('.add-btn').forEach(b=>b.onclick=()=>{const item={id:b.dataset.id,name:b.dataset.name,price:parseFloat(b.dataset.price),shopId,shopName,quantity:1};const ex=cart.find(i=>i.id===item.id&&i.shopId===shopId);if(ex)ex.quantity++;else{if(cart.length&&cart[0].shopId!==shopId)cart=[];cart.push(item)}localStorage.setItem('dragon_cart',JSON.stringify(cart));tg.HapticFeedback.impactOccurred('light');tg.showPopup({title:'✅ تمت الإضافة',message:`${item.name} في السلة`})})}async function loadRating(){const r=await fetch(`${API}/api/shops/${shopId}/ratings`);const d=await r.json();if(d.count>0){document.getElementById('shopRating').innerHTML=`★${d.average.toFixed(1)} (${d.count})`}}loadMenu();loadRating()</script></body></html>
