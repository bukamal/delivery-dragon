<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين | قائمة الطعام</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f5f7fb);padding:16px}.back-btn{background:transparent;border:none;color:#e67e22;font-size:1.2rem;margin-bottom:16px;cursor:pointer}.shop-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}.shop-header h1{margin:0;font-size:1.8rem}.rating{display:flex;align-items:center;gap:4px;color:#f1c40f;font-size:1.2rem}.category{margin:24px 0 12px;font-weight:700;color:var(--tg-theme-hint-color,#555)}.product-item{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:20px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--tg-theme-hint-color,rgba(0,0,0,.03))}.price{font-weight:700;color:#e67e22}.add-btn{background:#e67e22;color:#fff;border:none;border-radius:30px;padding:10px 22px;font-weight:700;cursor:pointer}.skeleton-item{height:70px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:20px;margin-bottom:12px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><button class="back-btn" onclick="history.back()">← العودة</button><div class="shop-header"><h1 id="shopName"></h1><div id="shopRating" class="rating"></div></div><div id="menuContainer"><div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item"></div></div><script>const tg=window.Telegram.WebApp;tg.ready();tg.expand();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app';const params=new URLSearchParams(location.search);const shopId=params.get('id');const shopName=decodeURIComponent(params.get('name')||'');document.getElementById('shopName').innerText=shopName;let cart=JSON.parse(localStorage.getItem('dragon_cart'))||[];async function loadMenu(){try{const res=await fetch(`${API}/api/shops/${shopId}/products`);if(!res.ok)throw new Error('تعذر تحميل القائمة');const data=await res.json();let html='';for(let cat in data.categories){html+=`<div class="category">${cat}</div>`;data.categories[cat].forEach(p=>{html+=`<div class="product-item"><div><b>${p.name}</b><br><span class="price">${p.price} ل.س</span></div><button class="add-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">➕ أضف</button></div>`})}document.getElementById('menuContainer').innerHTML=html||'<p>لا توجد منتجات</p>';document.querySelectorAll('.add-btn').forEach(btn=>{btn.onclick=()=>{const item={id:btn.dataset.id,name:btn.dataset.name,price:parseFloat(btn.dataset.price),shopId,shopName,quantity:1};const existing=cart.find(i=>i.id===item.id&&i.shopId===shopId);if(existing)existing.quantity++;else{if(cart.length&&cart[0].shopId!==shopId)cart=[];cart.push(item)}localStorage.setItem('dragon_cart',JSON.stringify(cart));tg.HapticFeedback.impactOccurred('light');tg.showPopup({title:'تمت الإضافة',message:`تم إضافة ${item.name} إلى السلة`})}})}catch(e){document.getElementById('menuContainer').innerHTML=`<p style="color:red">⚠️ ${e.message}<br><button onclick="loadMenu()" class="add-btn">إعادة المحاولة</button></p>`}}async function loadRating(){try{const res=await fetch(`${API}/api/shops/${shopId}/ratings`);if(!res.ok)return;const data=await res.json();if(data.count>0){const stars='★'.repeat(Math.round(data.average))+'☆'.repeat(5-Math.round(data.average));document.getElementById('shopRating').innerHTML=`${stars} (${data.count})`}}catch(e){}}loadMenu();loadRating()</script></body></html>
