<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | الدعم الفني</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: var(--tg-theme-bg-color, #f0f2f5); color: var(--tg-theme-text-color, #1e1e2f); }
    .app-header { display:flex; align-items:center; padding:16px 20px; background:rgba(255,255,255,0.8); backdrop-filter:blur(12px); border-bottom:1px solid rgba(0,0,0,0.05); position:sticky; top:0; z-index:10; }
    .app-header h1 { font-size:1.8rem; color:#e67e22; margin-right:12px; }
    .back-btn { background:none; border:none; color:#e67e22; font-size:2rem; cursor:pointer; }
    .chat-container { display:flex; flex-direction:column; height:calc(100vh - 70px); }
    .messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .message { max-width:80%; padding:12px 16px; border-radius:20px; }
    .message.user { align-self:flex-end; background:#e67e22; color:#fff; }
    .message.admin { align-self:flex-start; background:rgba(255,255,255,0.8); backdrop-filter:blur(4px); border:1px solid rgba(0,0,0,0.05); }
    .message-meta { font-size:0.7rem; opacity:0.8; margin-bottom:4px; }
    .input-area { display:flex; padding:16px; background:rgba(255,255,255,0.8); backdrop-filter:blur(12px); border-top:1px solid rgba(0,0,0,0.05); gap:8px; }
    .input-area input { flex:1; padding:14px; border-radius:30px; border:1px solid #ccc; background:#fff; }
    .input-area button { background:#e67e22; color:#fff; border:none; width:50px; border-radius:30px; cursor:pointer; }
    .empty-state { text-align:center; padding:40px; color:#95a5a6; }
  </style>
</head>
<body>
<div class="app-header">
  <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-right"></i></button>
  <h1>🦅 الدعم الفني</h1>
</div>
<div class="chat-container">
  <div class="messages" id="messagesContainer"><div class="empty-state">جاري تحميل المحادثة...</div></div>
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="اكتب رسالتك..." disabled>
    <button id="sendBtn" disabled><i data-lucide="send"></i></button>
  </div>
</div>
<script>
  (function() {
    const tg = Telegram.WebApp; tg.ready(); tg.expand();
    if (tg.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(() => history.back()); }
    const API = 'https://delivery-dragon.vercel.app';
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    messageInput.disabled = false; sendBtn.disabled = false;

    async function loadMessages() {
      try {
        const res = await fetch(`${API}/api/support/messages`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
        if (!res.ok) throw new Error(res.status === 401 ? 'انتهت صلاحية الجلسة' : `خطأ ${res.status}`);
        const messages = await res.json();
        renderMessages(messages);
      } catch (e) { messagesContainer.innerHTML = `<div class="empty-state">❌ ${e.message}<br><button class="btn" onclick="location.reload()">إعادة المحاولة</button></div>`; }
    }

    function renderMessages(messages) {
      if (!messages.length) { messagesContainer.innerHTML = '<div class="empty-state">ابدأ المحادثة مع فريق الدعم...</div>'; return; }
      let html = '';
      messages.forEach(m => {
        const isUser = !m.is_from_admin, sender = isUser ? 'أنت' : (m.admin_name || 'الدعم');
        const time = new Date(m.created_at).toLocaleTimeString('ar-SY', { hour:'2-digit', minute:'2-digit' });
        html += `<div class="message ${isUser ? 'user' : 'admin'}"><div class="message-meta">${sender} - ${time}</div><div>${escapeHtml(m.message)}</div></div>`;
      });
      messagesContainer.innerHTML = html; messagesContainer.scrollTop = messagesContainer.scrollHeight;
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    async function sendMessage() {
      const message = messageInput.value.trim(); if (!message) return;
      sendBtn.disabled = true;
      try {
        const res = await fetch(`${API}/api/support/messages`, { method:'POST', headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify({ message }) });
        if (!res.ok) throw new Error('فشل الإرسال');
        messageInput.value = ''; await loadMessages();
      } catch (e) { tg.showAlert('❌ ' + e.message); }
      finally { sendBtn.disabled = false; }
    }

    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    loadMessages(); setInterval(loadMessages, 15000);
  })();
</script>
</body>
</html>
