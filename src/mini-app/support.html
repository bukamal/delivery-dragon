<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | الدعم الفني</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 130px); }
    .messages { flex: 1; overflow-y: auto; padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-3); }
    .message { max-width: 80%; padding: var(--space-3) var(--space-4); border-radius: var(--radius-xl); word-wrap: break-word; }
    .message.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .message.admin { align-self: flex-start; background: var(--tg-theme-secondary-bg-color, #fff); color: inherit; border: 1px solid var(--gray-200); border-bottom-left-radius: 4px; }
    .message-meta { font-size: var(--text-xs); margin-bottom: var(--space-1); opacity: 0.8; }
  </style>
</head>
<body class="has-bottom-nav">
<div class="app-header">
  <h1>🦅 الدعم الفني</h1>
</div>
<div class="chat-container">
  <div class="messages" id="messagesContainer"><div class="empty-state">جاري تحميل المحادثة...</div></div>
  <div class="input-area" style="display:flex; padding:var(--space-4); background:var(--tg-theme-secondary-bg-color,#fff); border-top:1px solid var(--gray-200); gap:var(--space-2);">
    <input type="text" id="messageInput" placeholder="اكتب رسالتك..." disabled>
    <button class="btn" id="sendBtn" disabled><i data-lucide="send"></i></button>
  </div>
</div>
<script src="bottom-nav.js"></script>
<script>
  (function() {
    const tg = window.Telegram.WebApp;
    try { tg.ready(); tg.expand(); } catch (e) { document.getElementById('messagesContainer').innerHTML = '<div class="empty-state">⚠️ تعذر الاتصال بتطبيق تيليغرام.</div>'; return; }
    const API = 'https://delivery-dragon.vercel.app';
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    messageInput.disabled = false; sendBtn.disabled = false;

    async function loadMessages() {
      try {
        const res = await fetch(`${API}/api/support/messages`, { headers: { 'X-Telegram-Init-Data': tg.initData } });
        if (!res.ok) throw new Error(res.status === 401 ? 'انتهت صلاحية الجلسة' : `خطأ ${res.status}`);
        const messages = await res.json();
        renderMessages(messages);
      } catch (e) { messagesContainer.innerHTML = `<div class="empty-state">❌ ${e.message}<br><button class="btn btn-outline" onclick="location.reload()">إعادة المحاولة</button></div>`; }
    }

    function renderMessages(messages) {
      if (!messages.length) { messagesContainer.innerHTML = '<div class="empty-state">ابدأ المحادثة مع فريق الدعم...</div>'; return; }
      let html = '';
      messages.forEach(m => {
        const isUser = !m.is_from_admin, sender = isUser ? 'أنت' : (m.admin_name || 'الدعم');
        const time = new Date(m.created_at).toLocaleTimeString('ar-SY', { hour: '2-digit', minute: '2-digit' });
        html += `<div class="message ${isUser ? 'user' : 'admin'}"><div class="message-meta">${sender} - ${time}</div><div>${escapeHtml(m.message)}</div></div>`;
      });
      messagesContainer.innerHTML = html; messagesContainer.scrollTop = messagesContainer.scrollHeight;
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    async function sendMessage() {
      const message = messageInput.value.trim(); if (!message) return;
      sendBtn.disabled = true;
      try {
        const res = await fetch(`${API}/api/support/messages`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': tg.initData }, body: JSON.stringify({ message }) });
        if (!res.ok) throw new Error('فشل الإرسال');
        messageInput.value = ''; await loadMessages();
      } catch (e) { tg.showAlert('❌ ' + e.message); }
      finally { sendBtn.disabled = false; }
    }

    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    loadMessages(); setInterval(loadMessages, 15000);
  })();
</script>
</body>
</html>
