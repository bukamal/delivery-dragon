<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - تتبع الطلب</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f0f2f5);color:var(--tg-theme-text-color,#1e1e2f);padding:20px;text-align:center}.card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:32px;padding:32px 24px;max-width:400px;margin:20px auto;box-shadow:0 10px 30px rgba(0,0,0,.05)}.status-icon{font-size:64px;margin:20px 0}.status-text{font-size:1.8rem;font-weight:700;margin-bottom:10px}.progress{display:flex;justify-content:space-between;margin:30px 0}.step{flex:1;text-align:center;font-size:.8rem;color:var(--tg-theme-hint-color,#aaa)}.step.active{color:var(--tg-theme-button-color,#e67e22);font-weight:700}.btn{background:var(--tg-theme-button-color,#3498db);color:#fff;border:none;padding:16px;border-radius:60px;width:100%;font-size:1.1rem;margin-top:16px;cursor:pointer}.skeleton{height:200px;background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:32px}@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="card" id="trackingCard"><div class="skeleton"></div></div><script>const tg=window.Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';const params=new URLSearchParams(location.search);const orderId=params.get('order_id');if(!orderId){document.getElementById('trackingCard').innerHTML='<p>رقم الطلب غير موجود</p>'}async function fetchStatus(){try{const res=await fetch(`${API}/api/orders/${orderId}/status`,{headers:{'X-Telegram-Init-Data':tg.initData}});if(!res.ok)throw new Error('تعذر تحميل الحالة');const data=await res.json();const status=data.status;const emoji={paid:'💰',preparing:'👨‍🍳',ready_for_pickup:'📦',delivering:'🛵',completed:'✅'}[status]||'⏳';const text={paid:'مدفوع',preparing:'قيد التحضير',ready_for_pickup:'جاهز',delivering:'في الطريق',completed:'تم التوصيل'}[status]||status;document.getElementById('trackingCard').innerHTML=`<div>طلب #<span id="orderId">${orderId}</span></div><div class="status-icon" id="statusEmoji">${emoji}</div><div class="status-text" id="statusMessage">${text}</div><div class="progress"><div class="step${status==='paid'?' active':''}" id="stepPaid">✅ مدفوع</div><div class="step${status==='preparing'?' active':''}" id="stepPrep">🍳 تحضير</div><div class="step${status==='ready_for_pickup'?' active':''}" id="stepReady">📦 جاهز</div><div class="step${status==='delivering'?' active':''}" id="stepDeliver">🚴 توصيل</div></div><button class="btn" id="trackBtn">📍 عرض موقع السائق</button><button class="btn" id="refreshBtn" style="background:#95a5a6">🔄 تحديث</button>`;document.getElementById('trackBtn').onclick=async()=>{const locRes=await fetch(`${API}/api/orders/${orderId}/location`,{headers:{'X-Telegram-Init-Data':tg.initData}});const loc=await locRes.json();if(loc.latitude)tg.openLink(`https://maps.google.com/?q=${loc.latitude},${loc.longitude}`);else tg.showAlert('الموقع غير متوفر بعد')};document.getElementById('refreshBtn').onclick=fetchStatus}catch(e){document.getElementById('trackingCard').innerHTML=`<p style="color:red">⚠️ ${e.message}<br><button onclick="fetchStatus()" style="margin-top:16px;padding:12px 24px;background:#e67e22;color:white;border:none;border-radius:30px;">إعادة المحاولة</button></p>`}}fetchStatus()</script></body></html>
