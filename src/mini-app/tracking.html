<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>شاهين | تتبع الطلب</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="https://unpkg.com/lucide@latest"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal';background:var(--tg-theme-bg-color,#f5f7fb);margin:0;padding:16px;color:var(--tg-theme-text-color,#1a1a2c)}.card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:28px;padding:24px 20px;box-shadow:0 8px 24px rgba(0,0,0,.04)}.status-icon{font-size:56px;text-align:center}.status-text{font-size:1.8rem;font-weight:700;text-align:center;margin:12px 0}.progress{display:flex;justify-content:space-between;margin:28px 0}.step{flex:1;text-align:center;font-size:.8rem;color:var(--tg-theme-hint-color,#aaa)}.step.active{color:#e67e22;font-weight:700}#map{height:260px;border-radius:20px;margin-top:20px}.btn{background:#e67e22;color:#fff;border:none;padding:16px;border-radius:60px;width:100%;margin-top:16px;font-weight:700}.rider-info{background:var(--tg-theme-bg-color,#f8f9fa);padding:16px;border-radius:20px;margin:16px 0;display:flex;align-items:center;gap:16px}</style></head><body><div class="card"><div>طلب #<span id="orderId"></span></div><div class="status-icon" id="statusEmoji">⏳</div><div class="status-text" id="statusMessage">جاري التحميل...</div><div class="progress"><div class="step" id="stepPaid">✅ مدفوع</div><div class="step" id="stepPrep">🍳 تحضير</div><div class="step" id="stepReady">📦 جاهز</div><div class="step" id="stepDeliver">🚴 توصيل</div></div><div id="riderInfo" style="display:none"><div class="rider-info"><i data-lucide="bike"></i><div><b id="riderName"></b><br><span id="riderPhone"></span></div></div></div><div id="etaDisplay" style="text-align:center;margin:12px 0;padding:8px;border-radius:40px;background:var(--tg-theme-bg-color)"></div><div id="mapContainer"></div><button class="btn" id="refreshBtn"><i data-lucide="refresh-cw"></i> تحديث</button><button class="btn" id="callDriverBtn" style="background:#3498db"><i data-lucide="phone"></i> اتصال</button></div><script>const tg=Telegram.WebApp;tg.ready();tg.BackButton.show();tg.BackButton.onClick(()=>history.back());const API='https://delivery-dragon.vercel.app',orderId=new URLSearchParams(location.search).get('order_id');document.getElementById('orderId').innerText=orderId;let map,marker,riderPhone;function initMap(lat,lng){if(map)map.remove();document.getElementById('mapContainer').innerHTML='<div id="map"></div>';map=L.map('map').setView([lat,lng],15);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);marker=L.marker([lat,lng]).addTo(map).bindPopup('📍 السائق').openPopup()}async function fetchData(){const s=await fetch(`${API}/api/orders/${orderId}/status`,{headers:{'X-Telegram-Init-Data':tg.initData}});const d=await s.json();document.getElementById('statusEmoji').innerText={paid:'💰',preparing:'👨‍🍳',ready_for_pickup:'📦',delivering:'🛵',completed:'✅'}[d.status]||'⏳';document.getElementById('statusMessage').innerText={paid:'مدفوع',preparing:'تحضير',ready_for_pickup:'جاهز',delivering:'توصيل',completed:'مكتمل'}[d.status]||d.status;document.querySelectorAll('.step').forEach(el=>el.classList.remove('active'));if(d.status==='paid')document.getElementById('stepPaid').classList.add('active');if(d.status==='preparing'){document.getElementById('stepPaid').classList.add('active');document.getElementById('stepPrep').classList.add('active')}if(d.status==='ready_for_pickup'){document.getElementById('stepPaid').classList.add('active');document.getElementById('stepPrep').classList.add('active');document.getElementById('stepReady').classList.add('active')}if(d.status==='delivering'){document.getElementById('stepPaid').classList.add('active');document.getElementById('stepPrep').classList.add('active');document.getElementById('stepReady').classList.add('active');document.getElementById('stepDeliver').classList.add('active')}if(d.status==='completed')document.querySelectorAll('.step').forEach(el=>el.classList.add('active'));if(d.status==='delivering'){const l=await fetch(`${API}/api/orders/${orderId}/location`,{headers:{'X-Telegram-Init-Data':tg.initData}});const loc=await l.json();if(loc.latitude){if(!map)initMap(loc.latitude,loc.longitude);else{marker.setLatLng([loc.latitude,loc.longitude]);map.setView([loc.latitude,loc.longitude])}}if(d.rider_name){document.getElementById('riderInfo').style.display='block';document.getElementById('riderName').innerText=d.rider_name;document.getElementById('riderPhone').innerText=d.rider_phone||'';riderPhone=d.rider_phone}const eta=Math.floor(Math.random()*15)+5;document.getElementById('etaDisplay').innerHTML=`🛵 الوقت المقدر: ${eta}-${eta+5} دقيقة`}else{if(map){map.remove();map=null}document.getElementById('mapContainer').innerHTML='<p style="text-align:center;padding:20px">الخريطة غير متاحة</p>';document.getElementById('riderInfo').style.display='none';document.getElementById('etaDisplay').innerHTML=''}if(typeof lucide!=='undefined')lucide.createIcons()}fetchData();setInterval(fetchData,15000);document.getElementById('refreshBtn').onclick=fetchData;document.getElementById('callDriverBtn').onclick=()=>{if(riderPhone)tg.openLink(`tel:${riderPhone}`);else tg.showAlert('الرقم غير متوفر')}</script></body></html>
