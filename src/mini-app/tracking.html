<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>شاهين - تتبع الطلب</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;background:var(--tg-theme-bg-color,#f0f2f5);color:var(--tg-theme-text-color,#1e1e2f);padding:20px;text-align:center}.card{background:var(--tg-theme-secondary-bg-color,#fff);border-radius:32px;padding:32px 24px;max-width:400px;margin:20px auto;box-shadow:0 10px 30px rgba(0,0,0,.05)}.status-icon{font-size:64px;margin:20px 0}.status-text{font-size:1.8rem;font-weight:700;margin-bottom:10px}.progress{display:flex;justify-content:space-between;margin:30px 0}.step{flex:1;text-align:center;font-size:.8rem;color:var(--tg-theme-hint-color,#aaa)}.step.active{color:var(--tg-theme-button-color,#e67e22);font-weight:700}.btn{background:var(--tg-theme-button-color,#3498db);color:#fff;border:none;padding:16px;border-radius:60px;width:100%;font-size:1.1rem;margin-top:16px;cursor:pointer}</style></head><body><div class="card"><div>طلب #<span id="orderId"></span></div><div class="status-icon" id="statusEmoji">⏳</div><div class="status-text" id="statusMessage">جاري التحميل...</div><div class="progress"><div class="step" id="stepPaid">✅ مدفوع</div><div class="step" id="stepPrep">🍳 تحضير</div><div class="step" id="stepReady">📦 جاهز</div><div class="step" id="stepDeliver">🚴 توصيل</div></div><button class="btn" id="trackBtn">📍 عرض موقع السائق</button><button class="btn" id="refreshBtn" style="background:#95a5a6">🔄 تحديث</button></div><script>const tg=window.Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';const params=new URLSearchParams(location.search);const orderId=params.get('order_id');document.getElementById('orderId').innerText=orderId;async function fetchStatus(){try{const res=await fetch(`${API}/api/orders/${orderId}/status`,{headers:{'X-Telegram-Init-Data':tg.initData}});const data=await res.json();const status=data.status;const emoji={paid:'💰',preparing:'👨‍🍳',ready_for_pickup:'📦',delivering:'🛵',completed:'✅'}[status]||'⏳';const text={paid:'مدفوع',preparing:'قيد التحضير',ready_for_pickup:'جاهز',delivering:'في الطريق',completed:'تم التوصيل'}[status]||status;document.getElementById('statusEmoji').innerText=emoji;document.getElementById('statusMessage').innerText=text;document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));if(status==='paid')document.getElementById('stepPaid').classList.add('active');if(status==='preparing'){document.getElementById('stepPaid').classList.add('active');document.getElementById('stepPrep').classList.add('active')}if(status==='ready_for_pickup'){document.getElementById('stepPaid').classList.add('active');document.getElementById('stepPrep').classList.add('active');document.getElementById('stepReady').classList.add('active')}if(status==='delivering'){document.getElementById('stepPaid').classList.add('active');document.getElementById('stepPrep').classList.add('active');document.getElementById('stepReady').classList.add('active');document.getElementById('stepDeliver').classList.add('active')}if(status==='completed')document.querySelectorAll('.step').forEach(s=>s.classList.add('active'))}catch(e){}}document.getElementById('trackBtn').onclick=async()=>{const res=await fetch(`${API}/api/orders/${orderId}/location`,{headers:{'X-Telegram-Init-Data':tg.initData}});const loc=await res.json();if(loc.latitude)tg.openLink(`https://maps.google.com/?q=${loc.latitude},${loc.longitude}`);else tg.showAlert('الموقع غير متوفر بعد')};document.getElementById('refreshBtn').onclick=fetchStatus;fetchStatus();setInterval(fetchStatus,15000)</script></body></html>
