<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | تتبع الطلب</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--tg-theme-bg-color, #f0f2f5);
      color: var(--tg-theme-text-color, #1a1a2c);
      padding: 0;
    }
    .app-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: var(--tg-theme-secondary-bg-color, #ffffff);
      border-bottom: 1px solid var(--tg-theme-hint-color, rgba(0,0,0,0.05));
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .app-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e67e22;
      margin-right: 16px;
    }
    .back-btn {
      background: transparent;
      border: none;
      color: #e67e22;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 8px;
    }
    .container {
      padding: 20px 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: var(--tg-theme-secondary-bg-color, #ffffff);
      border-radius: 28px;
      padding: 24px 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }
    .status-icon {
      font-size: 56px;
      text-align: center;
    }
    .status-text {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin: 12px 0;
    }
    .progress {
      display: flex;
      justify-content: space-between;
      margin: 28px 0;
    }
    .step {
      flex: 1;
      text-align: center;
      font-size: 0.8rem;
      color: var(--tg-theme-hint-color, #aaa);
    }
    .step.active {
      color: #e67e22;
      font-weight: 700;
    }
    #map {
      height: 260px;
      width: 100%;
      border-radius: 20px;
      margin-top: 20px;
      z-index: 1;
    }
    .btn {
      background: #e67e22;
      color: white;
      border: none;
      padding: 16px 20px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      width: 100%;
      box-shadow: 0 6px 14px rgba(230,126,34,0.2);
    }
    .rider-info {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 20px 0;
      background: var(--tg-theme-bg-color, #f8f9fa);
      padding: 16px;
      border-radius: 20px;
    }
    .rider-icon {
      font-size: 48px;
    }
    .loading-skeleton {
      height: 260px;
      background: linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 20px;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <button class="back-btn" id="backButton">←</button>
  <h1>🦅 شاهين</h1>
</div>

<div class="container">
  <div class="card">
    <div style="text-align: center; margin-bottom: 8px;">طلب #<span id="orderId"></span></div>
    <div class="status-icon" id="statusEmoji">⏳</div>
    <div class="status-text" id="statusMessage">جاري التحميل...</div>
    <div class="progress">
      <div class="step" id="stepPaid">✅ مدفوع</div>
      <div class="step" id="stepPrep">🍳 تحضير</div>
      <div class="step" id="stepReady">📦 جاهز</div>
      <div class="step" id="stepDeliver">🚴 توصيل</div>
    </div>

    <div id="riderInfo" style="display: none;">
      <div class="rider-info">
        <span class="rider-icon">🛵</span>
        <div>
          <b>السائق: <span id="riderName"></span></b><br>
          <span id="riderPhone"></span>
        </div>
      </div>
    </div>

    <div id="mapContainer">
      <div class="loading-skeleton"></div>
    </div>

    <button class="btn" id="refreshBtn">🔄 تحديث الموقع</button>
    <button class="btn" id="callDriverBtn" style="background: #3498db;">📞 الاتصال بالسائق</button>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  tg.BackButton.show();
  tg.BackButton.onClick(() => history.back());
  document.getElementById('backButton').onclick = () => history.back();

  const API = 'https://delivery-dragon.vercel.app';
  const params = new URLSearchParams(location.search);
  const orderId = params.get('order_id');
  document.getElementById('orderId').innerText = orderId || '—';

  let map = null, marker = null, riderPhone = '';

  function initMap(lat, lng) {
    const container = document.getElementById('mapContainer');
    if (map) map.remove();
    container.innerHTML = '<div id="map"></div>';
    map = L.map('map').setView([lat, lng], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    marker = L.marker([lat, lng]).addTo(map).bindPopup('📍 موقع السائق').openPopup();
  }

  function updateMarker(lat, lng) {
    if (marker) {
      marker.setLatLng([lat, lng]);
      map.setView([lat, lng]);
    } else {
      initMap(lat, lng);
    }
  }

  async function fetchStatusAndLocation() {
    try {
      const statusRes = await fetch(`${API}/api/orders/${orderId}/status`, {
        headers: { 'X-Telegram-Init-Data': tg.initData }
      });
      if (!statusRes.ok) throw new Error('تعذر تحميل حالة الطلب');
      const statusData = await statusRes.json();
      updateStatusUI(statusData);

      if (statusData.status === 'delivering' || statusData.status === 'completed') {
        const locRes = await fetch(`${API}/api/orders/${orderId}/location`, {
          headers: { 'X-Telegram-Init-Data': tg.initData }
        });
        if (locRes.ok) {
          const locData = await locRes.json();
          if (locData.latitude && locData.longitude) {
            if (!map) initMap(locData.latitude, locData.longitude);
            else updateMarker(locData.latitude, locData.longitude);
          }
        }
        if (statusData.rider_name) {
          document.getElementById('riderInfo').style.display = 'block';
          document.getElementById('riderName').innerText = statusData.rider_name;
          document.getElementById('riderPhone').innerText = statusData.rider_phone || '';
          riderPhone = statusData.rider_phone || '';
        }
      } else {
        if (map) { map.remove(); map = null; marker = null; }
        document.getElementById('mapContainer').innerHTML = '<p style="text-align: center; padding: 20px;">الخريطة غير متاحة حالياً</p>';
        document.getElementById('riderInfo').style.display = 'none';
      }
    } catch(e) {
      tg.showAlert('⚠️ ' + e.message);
    }
  }

  function updateStatusUI(data) {
    const s = data.status;
    const emoji = { paid: '💰', preparing: '👨‍🍳', ready_for_pickup: '📦', delivering: '🛵', completed: '✅' }[s] || '⏳';
    const msg = { paid: 'مدفوع', preparing: 'قيد التحضير', ready_for_pickup: 'جاهز', delivering: 'في الطريق', completed: 'تم التوصيل' }[s] || s;
    document.getElementById('statusEmoji').innerText = emoji;
    document.getElementById('statusMessage').innerText = msg;
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    if (s === 'paid') document.getElementById('stepPaid').classList.add('active');
    if (s === 'preparing') { document.getElementById('stepPaid').classList.add('active'); document.getElementById('stepPrep').classList.add('active'); }
    if (s === 'ready_for_pickup') { document.getElementById('stepPaid').classList.add('active'); document.getElementById('stepPrep').classList.add('active'); document.getElementById('stepReady').classList.add('active'); }
    if (s === 'delivering') { document.getElementById('stepPaid').classList.add('active'); document.getElementById('stepPrep').classList.add('active'); document.getElementById('stepReady').classList.add('active'); document.getElementById('stepDeliver').classList.add('active'); }
    if (s === 'completed') document.querySelectorAll('.step').forEach(el => el.classList.add('active'));
  }

  fetchStatusAndLocation();
  const interval = setInterval(fetchStatusAndLocation, 15000);
  document.getElementById('refreshBtn').onclick = () => fetchStatusAndLocation();
  document.getElementById('callDriverBtn').onclick = () => {
    if (riderPhone) tg.openLink(`tel:${riderPhone}`);
    else tg.showAlert('رقم السائق غير متوفر');
  };
  window.addEventListener('beforeunload', () => { clearInterval(interval); if (map) map.remove(); });
</script>
</body>
</html>
