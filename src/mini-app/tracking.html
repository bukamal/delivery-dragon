<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>شاهين | تتبع الطلب</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
    body { background: var(--tg-theme-bg-color, #f0f2f5); color: var(--tg-theme-text-color, #1e1e2f); padding:16px; }
    .card { background:rgba(255,255,255,0.7); backdrop-filter:blur(12px); border-radius:28px; padding:24px 20px; border:1px solid rgba(255,255,255,0.5); box-shadow:0 8px 24px rgba(0,0,0,0.02); }
    .status-icon { font-size:56px; text-align:center; }
    .status-text { font-size:2rem; font-weight:700; text-align:center; margin:12px 0; }
    .progress { display:flex; justify-content:space-between; margin:28px 0; }
    .step { flex:1; text-align:center; font-size:0.9rem; color:#95a5a6; }
    .step.active { color:#e67e22; font-weight:700; }
    #map { height:260px; border-radius:20px; margin-top:20px; background:#e9ecef; }
    .btn { background:#e67e22; color:#fff; border:none; padding:16px; border-radius:60px; width:100%; margin-top:16px; font-weight:700; cursor:pointer; }
    .btn-outline { background:transparent; border:1px solid #e67e22; color:#e67e22; }
    .rider-info { background:rgba(0,0,0,0.02); padding:16px; border-radius:20px; margin:16px 0; display:flex; align-items:center; gap:16px; }
    .eta-badge { background:#e67e22; color:#fff; padding:8px 16px; border-radius:40px; text-align:center; }
    .code-section { margin-top:20px; padding:16px; background:rgba(0,0,0,0.02); border-radius:20px; }
    .otp-container { display:flex; gap:8px; justify-content:center; margin:16px 0; }
    .otp-input { width:60px; height:60px; text-align:center; font-size:28px; border-radius:12px; border:1px solid #ccc; background:rgba(255,255,255,0.5); }
    .verified-badge { background:#27ae60; color:#fff; padding:8px 16px; border-radius:30px; }
    .order-items { background:rgba(0,0,0,0.02); padding:12px; border-radius:16px; margin:16px 0; }
  </style>
</head>
<body>
<div class="card">
  <div style="display:flex; justify-content:space-between;">
    <span>طلب #<span id="orderId"></span></span>
    <button class="btn-outline" id="refreshBtn" style="padding:8px 16px;"><i data-lucide="refresh-cw"></i></button>
  </div>
  <div class="status-icon" id="statusEmoji">⏳</div>
  <div class="status-text" id="statusMessage">جاري التحميل...</div>
  <div class="progress">
    <div class="step" id="stepPaid">✅ مدفوع</div><div class="step" id="stepPrep">🍳 تحضير</div><div class="step" id="stepReady">📦 جاهز</div><div class="step" id="stepDeliver">🚴 توصيل</div>
  </div>
  <div id="orderItems" class="order-items"></div>
  <div id="riderInfo" style="display:none;"><div class="rider-info"><i data-lucide="bike"></i><div><b id="riderName"></b><br><span id="riderPhone"></span></div></div></div>
  <div id="etaDisplay" class="eta-badge" style="display:none;"></div>
  <div id="mapContainer"><div id="map"></div></div>
  
  <div id="codeSection" class="code-section" style="display:none;">
    <label>🔐 أدخل كود التأكيد (من السائق)</label>
    <div class="otp-container">
      <input type="text" class="otp-input" maxlength="1" id="otp1"><input type="text" class="otp-input" maxlength="1" id="otp2"><input type="text" class="otp-input" maxlength="1" id="otp3"><input type="text" class="otp-input" maxlength="1" id="otp4">
    </div>
    <button class="btn" onclick="verifyCode()">تحقق من الكود</button>
    <p id="codeError" style="color:#e74c3c; margin-top:8px;"></p>
    <div id="codeVerifiedMessage" class="verified-badge" style="display:none;">✅ تم التحقق من الكود - شكراً لثقتك!</div>
  </div>
  
  <button class="btn" id="callDriverBtn" style="background:#3498db;"><i data-lucide="phone"></i> اتصال بالسائق</button>
</div>
<script>
  const tg = Telegram.WebApp; tg.ready();
  if (tg.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(() => history.back()); }
  const API = 'https://delivery-dragon.vercel.app';
  const orderId = new URLSearchParams(location.search).get('order_id');
  document.getElementById('orderId').innerText = orderId;
  let map, marker, riderPhone;
  const statusEmojis = { paid:'💰', preparing:'👨‍🍳', ready_for_pickup:'📦', delivering:'🛵', completed:'✅' };
  const statusMessages = { paid:'مدفوع', preparing:'تحضير', ready_for_pickup:'جاهز', delivering:'توصيل', completed:'مكتمل' };

  function initMap(lat, lng) {
    if (map) { map.setView([lat, lng], 15); marker.setLatLng([lat, lng]); }
    else { document.getElementById('map').innerHTML = ''; map = L.map('map').setView([lat, lng], 15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); marker = L.marker([lat, lng]).addTo(map).bindPopup('📍 موقع السائق').openPopup(); }
  }

  async function fetchData() {
    try {
      const [statusRes, detailsRes] = await Promise.all([
        fetch(`${API}/api/orders/${orderId}/status`, { headers: { 'X-Telegram-Init-Data': tg.initData } }),
        fetch(`${API}/api/me/orders`, { headers: { 'X-Telegram-Init-Data': tg.initData } })
      ]);
      const statusData = await statusRes.json();
      const orders = await detailsRes.json();
      const order = orders.find(o => o.id == orderId);
      if (order) {
        const items = JSON.parse(order.items).map(i => `${i.name} ×${i.quantity}`).join('، ');
        document.getElementById('orderItems').innerHTML = `<b>📦 الطلب:</b> ${items}<br><b>💰 الإجمالي:</b> ${order.total_price} ل.س`;
      }
      const status = statusData.status, codeVerified = statusData.code_verified;
      document.getElementById('statusEmoji').innerText = statusEmojis[status] || '⏳';
      document.getElementById('statusMessage').innerText = statusMessages[status] || status;
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      if (status === 'paid') document.getElementById('stepPaid').classList.add('active');
      if (status === 'preparing') { document.getElementById('stepPaid').classList.add('active'); document.getElementById('stepPrep').classList.add('active'); }
      if (status === 'ready_for_pickup') { document.getElementById('stepPaid').classList.add('active'); document.getElementById('stepPrep').classList.add('active'); document.getElementById('stepReady').classList.add('active'); }
      if (status === 'delivering') { document.getElementById('stepPaid').classList.add('active'); document.getElementById('stepPrep').classList.add('active'); document.getElementById('stepReady').classList.add('active'); document.getElementById('stepDeliver').classList.add('active'); }
      if (status === 'completed') document.querySelectorAll('.step').forEach(el => el.classList.add('active'));

      if (status === 'delivering') {
        document.getElementById('codeSection').style.display = 'block';
        if (codeVerified) {
          document.querySelectorAll('.otp-input').forEach(i => i.style.display = 'none');
          document.querySelector('#codeSection .btn').style.display = 'none';
          document.getElementById('codeVerifiedMessage').style.display = 'block';
        }
        const [locationRes, etaRes] = await Promise.all([fetch(`${API}/api/orders/${orderId}/location`, { headers: { 'X-Telegram-Init-Data': tg.initData } }), fetch(`${API}/api/orders/${orderId}/eta`, { headers: { 'X-Telegram-Init-Data': tg.initData } })]);
        const locationData = await locationRes.json(), etaData = await etaRes.json();
        if (locationData.latitude) initMap(locationData.latitude, locationData.longitude);
        if (statusData.rider_name) { document.getElementById('riderInfo').style.display = 'block'; document.getElementById('riderName').innerText = statusData.rider_name; document.getElementById('riderPhone').innerText = statusData.rider_phone || ''; riderPhone = statusData.rider_phone; }
        document.getElementById('etaDisplay').style.display = 'block';
        document.getElementById('etaDisplay').innerHTML = etaData.eta_minutes ? `⏱️ الوقت المقدر: ${etaData.eta_minutes} دقيقة (${Math.round(etaData.distance_km)} كم)` : etaData.message || 'جاري حساب الوقت...';
      } else {
        document.getElementById('codeSection').style.display = 'none';
        document.getElementById('riderInfo').style.display = 'none';
        document.getElementById('etaDisplay').style.display = 'none';
      }
      if (typeof lucide !== 'undefined') lucide.createIcons();
    } catch(e) {}
  }

  window.verifyCode = async () => {
    const code = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
    if (code.length !== 4) return tg.showAlert('أدخل الكود كاملاً');
    try {
      const res = await fetch(`${API}/api/orders/${orderId}/verify-code`, { method:'POST', headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg.initData}, body:JSON.stringify({ code }) });
      if (!res.ok) throw new Error((await res.json()).error);
      tg.showAlert('✅ الكود صحيح!'); fetchData();
    } catch(e) { document.getElementById('codeError').innerText = e.message; }
  };

  const otpInputs = document.querySelectorAll('.otp-input');
  otpInputs.forEach((input, index) => {
    input.oninput = (e) => { if (e.target.value && index < 3) otpInputs[index+1].focus(); };
    input.onkeydown = (e) => { if (e.key === 'Backspace' && !e.target.value && index > 0) otpInputs[index-1].focus(); };
  });

  fetchData(); setInterval(fetchData, 10000);
  document.getElementById('refreshBtn').onclick = fetchData;
  document.getElementById('callDriverBtn').onclick = () => { if(riderPhone) tg.openLink(`tel:${riderPhone}`); else tg.showAlert('الرقم غير متوفر'); };
</script>
</body>
</html>
