<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تتبع</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://telegram.org/js/telegram-web-app.js"></script><style>body{font-family:'Tajawal';margin:0;padding:16px;background:#f5f7fb}#map{height:250px;border-radius:20px}.btn{background:#e67e22;color:#fff;border:none;padding:12px;border-radius:40px;width:100%;margin-top:10px}</style></head><body><h2>🦅 تتبع الطلب #<span id="orderId"></span></h2><div id="status"></div><div id="map"></div><button class="btn" id="refresh">تحديث</button><script>const tg=Telegram.WebApp;tg.ready();const API='https://delivery-dragon.vercel.app';const id=new URLSearchParams(location.search).get('order_id');document.getElementById('orderId').innerText=id;let map,marker;async function fetchData(){const s=await fetch(`${API}/api/orders/${id}/status`,{headers:{'X-Telegram-Init-Data':tg.initData}});const d=await s.json();document.getElementById('status').innerText={paid:'💰 مدفوع',preparing:'👨‍🍳 تحضير',ready_for_pickup:'📦 جاهز',delivering:'🛵 توصيل',completed:'✅ مكتمل'}[d.status]||d.status;if(d.status==='delivering'){const l=await fetch(`${API}/api/orders/${id}/location`,{headers:{'X-Telegram-Init-Data':tg.initData}});const loc=await l.json();if(loc.latitude){if(!map){map=L.map('map').setView([loc.latitude,loc.longitude],15);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);marker=L.marker([loc.latitude,loc.longitude]).addTo(map)}else{marker.setLatLng([loc.latitude,loc.longitude]);map.setView([loc.latitude,loc.longitude])}}}else if(map){map.remove();map=null}}fetchData();document.getElementById('refresh').onclick=fetchData;setInterval(fetchData,15000)</script></body></html>
